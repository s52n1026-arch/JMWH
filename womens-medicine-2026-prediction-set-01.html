textarea{width:100%;min-height:88px;border:1px solid var(--line);border-radius:8px;padding:10px;font:inherit;resize:vertical;background:white}button:focus-visible,input:focus-visible,textarea:focus-visible{outline:3px solid var(--focus);outline-offset:2px}

<script>
const QUESTIONS=[
{number:1,theme:"Kallmann症候群と低ゴナドトロピン性性腺機能不全",stem:"15歳女性。乳房発育が乏しく初経がない。身長は年齢相当、外性器は女性型。LH・FSHは低値、エストラジオールも低値で、幼少時からにおいを感じにくいという。この病態について正しいものを全て選べ。",choices:{A:"GnRHニューロンの発生・移動異常が病態に関与する。",B:"低ゴナドトロピン性性腺機能低下症を呈する。",C:"卵巣原発の性腺機能不全としてFSH高値を示す。",D:"嗅覚低下は診断上ほとんど意味を持たない。",E:"妊孕性獲得にはエストロゲン単独補充が標準である。"},correct:["A","B"],comments:{A:"正しい。嗅覚系の発生異常とGnRHニューロン移動異常が結びつく。",B:"正しい。中枢性にLH/FSHが低く、性ステロイドも低い。",C:"誤り。FSH高値はTurner症候群など高ゴナドトロピン性卵巣不全を示唆する。",D:"誤り。無嗅覚・嗅覚低下は重要な手がかりである。",E:"誤り。二次性徴維持には性ステロイド補充、妊孕性獲得には拍動性GnRHまたはゴナドトロピン療法を検討する。"},refs:["Boehm U, et al. Expert consensus document: European Consensus Statement on congenital hypogonadotropic hypogonadism. Nat Rev Endocrinol. 2015. DOI: 10.1038/nrendo.2015.112. PMID: 26194704. 反映: CHH/Kallmannの病態、嗅覚異常、治療選択。","Dwyer AA, et al. Isolated Gonadotropin-Releasing Hormone Deficiency. GeneReviews, updated resource. URL: https://www.ncbi.nlm.nih.gov/books/NBK1334/ . 反映: 低ゴナドトロピン性性腺機能低下と嗅覚評価。"]},
{number:2,theme:"Turner症候群と甲状腺機能",stem:"17歳女性。低身長と初経未発来でフォローされ、45,Xを含む核型が確認されている。定期管理で甲状腺について説明する際、正しいものを全て選べ。",choices:{A:"自己免疫性甲状腺疾患の合併に注意する。",B:"甲状腺機能は無症状でも定期的に評価する。",C:"甲状腺機能低下は月経、体重、脂質代謝の評価にも影響しうる。",D:"甲状腺疾患は成人期以降に限られ、小児期からの評価は不要である。",E:"甲状腺自己抗体陽性なら直ちに全例で抗甲状腺薬を開始する。"},correct:["A","B","C"],comments:{A:"正しい。橋本病を中心に自己免疫性甲状腺疾患が多い。",B:"正しい。TSHなどによる定期スクリーニングが長期管理に含まれる。",C:"正しい。甲状腺機能は婦人科・代謝の解釈に影響する。",D:"誤り。思春期から移行期、成人期まで継続評価する。",E:"誤り。抗体陽性のみで抗甲状腺薬を始めるわけではない。"},refs:["Gravholt CH, et al. Clinical practice guidelines for the care of girls and women with Turner syndrome. Eur J Endocrinol. 2024. DOI: 10.1093/ejendo/lvae050. 反映: Turner症候群の包括的長期管理と甲状腺監視。","NICE. Thyroid disease: assessment and management. NG145. Updated 2023; reviewed 2025. URL: https://www.nice.org.uk/guidance/ng145 . 反映: 甲状腺機能検査と原発性甲状腺疾患管理。"]},
{number:3,theme:"女性アスリート、禁止薬、三徴、プロゲステロンと心拍",stem:"競技スポーツに参加する19歳女性が、月経不順、疲労骨折歴、試合前の体重調整、黄体期のコンディション変化について相談した。正しいものを全て選べ。",choices:{A:"体重階級競技では、利尿薬は医師の管理下なら禁止表上の問題は生じにくい。",B:"摂食障害、無月経、骨粗鬆症が3項目そろった時点で初めて介入する。",C:"低エネルギー利用可能性は、明らかな摂食障害がなくても月経異常や骨密度低下と関連しうる。",D:"黄体期やプロゲステロン高値環境では、基礎体温上昇とともに安静時心拍数が上がる方向の変化がみられうる。",E:"月経困難症に対するホルモン療法は、競技者では一律に禁止薬として避ける。"},correct:["C","D"],comments:{A:"誤り。利尿薬・隠蔽薬はWADA禁止表で重要な禁止カテゴリーである。",B:"誤り。三徴は連続体として評価し、完成を待たず介入する。",C:"正しい。低エネルギー利用可能性はRED-S/三徴の中核である。",D:"正しい。黄体期の体温・自律神経変化として心拍上昇方向を説明できる。",E:"誤り。薬剤ごとに禁止表とTUEの要否を確認する。"},refs:["World Anti-Doping Agency. The Prohibited List. 2026. URL: https://www.wada-ama.org/en/prohibited-list . 反映: 利尿薬・隠蔽薬など禁止薬の確認。","De Souza MJ, et al. 2014 Female Athlete Triad Coalition Consensus Statement. Br J Sports Med. 2014. DOI: 10.1136/bjsports-2013-093218. PMID: 24463911. 直近5年の高品質文献を確認できず、三徴の基礎文献として使用。","Mountjoy M, et al. IOC consensus statement on RED-S. Br J Sports Med. 2014. DOI: 10.1136/bjsports-2014-093502. PMID: 24620037. 直近5年の高品質文献を確認できず、RED-Sの基礎文献として使用。"]},
{number:4,theme:"乳癌健診",stem:"40歳以上の無症状女性に対する対策型検診について、検査特性、利益・不利益、追加検査の位置づけを踏まえ、正しいものを全て選べ。",choices:{A:"死亡率低減を目的とする検診の中心的検査はマンモグラフィである。",B:"超音波を併用すると偽陽性が減るため、精密検査率はマンモグラフィ単独より低下する。",C:"高濃度乳房であれば、無症状でもMRIを一律に対策型検診へ追加する。",D:"超音波併用は発見感度を上げうるが、偽陽性や過剰診断などの不利益も評価対象となる。",E:"視触診のみを死亡率低減目的の検診として推奨する根拠は乏しい。"},correct:["A","D","E"],comments:{A:"正しい。平均リスクではマンモグラフィが検診の中心である。",B:"誤り。併用で感度が上がっても偽陽性や要精検増加が問題になる。",C:"誤り。高濃度乳房への追加検査は一律推奨ではなくリスクに応じる。",D:"正しい。利益だけでなく不利益も説明する。",E:"正しい。視触診単独は死亡率減少効果の根拠が弱い。"},refs:["US Preventive Services Task Force. Screening for Breast Cancer: Recommendation Statement. 2024. URL: https://www.uspreventiveservicestaskforce.org/uspstf/recommendation/breast-cancer-screening . 反映: 40-74歳の隔年マンモグラフィ、濃度乳房追加検査のI statement。","Ohuchi N, et al. Adjunctive ultrasonography for breast cancer screening in women aged 40-49 years. Lancet. 2016. DOI: 10.1016/S0140-6736(15)00774-6. PMID: 26547101. 直近5年外だがJ-STARTの基礎データとして使用。"]},
{number:5,theme:"性感染症、細菌性腟症、トリコモナス、クラミジア、疥癬、毛ジラミ",stem:"外来スクリーニングや検査で微生物・寄生虫が確認された。非妊娠女性で症状がなければ治療しない方針を原則考えやすいものを全て選べ。",choices:{A:"帯下、臭気、掻痒がなく、細菌性腟症が検査上疑われる。",B:"核酸増幅検査でクラミジア陽性である。",C:"核酸増幅検査でトリコモナス陽性である。",D:"同居者に疥癬があり、皮疹を伴う本人の疥癬が確認された。",E:"外陰腟症状がなく、培養でCandida属が検出された。"},correct:["A","E"],comments:{A:"正しい。BV治療は症状のある女性が中心で、無症候例を一律治療しない。",B:"誤り。クラミジアは無症状でも合併症・伝播予防のため治療する。",C:"誤り。トリコモナスは感染確認後の治療とパートナー対応が重要である。",D:"誤り。疥癬は本人と接触者評価、環境対応が必要である。",E:"正しい。無症候性Candida保菌は外陰腟カンジダ症として治療しない。"},refs:["CDC. Sexually Transmitted Infections Treatment Guidelines, 2021: Bacterial Vaginosis. URL: https://www.cdc.gov/std/treatment-guidelines/bv.htm . 反映: BV治療は症状例中心、Amsel基準。","CDC. Chlamydial Infections. URL: https://www.cdc.gov/std/treatment-guidelines/chlamydia.htm . 反映: クラミジア陽性者は速やかに治療。","CDC. Trichomoniasis and Ectoparasitic Infections. 2021. URLs: https://www.cdc.gov/std/treatment-guidelines/trichomoniasis.htm , https://www.cdc.gov/std/treatment-guidelines/ectoparasitic.htm . 反映: トリコモナス、疥癬、毛ジラミの治療・接触者対応。"]},
{number:6,theme:"性器瘻の原因とならないもの",stem:"女性の腟瘻・尿路性器瘻・直腸腟瘻の原因として、通常は直接原因と考えにくいものを全て選べ。",choices:{A:"遷延分娩による膀胱腟中隔や直腸腟中隔の虚血壊死。",B:"潰瘍性大腸炎のない状態で、子宮頸部細胞診がASC-USのみである。",C:"骨盤内悪性腫瘍に対する放射線治療後の組織障害。",D:"排卵期にみられる透明な頸管粘液の増加。",E:"子宮摘出術など骨盤内手術に伴う尿路・腸管損傷。"},correct:["B","D"],comments:{A:"誤り。閉塞分娩は産科瘻の代表的原因である。",B:"正しい。ASC-USのみで瘻孔形成の直接原因とはならない。",C:"誤り。放射線障害は遅発性瘻孔の原因になる。",D:"正しい。生理的頸管粘液増加は瘻孔形成と関係しない。",E:"誤り。骨盤手術に伴う損傷は先進国で重要な原因である。"},refs:["WHO. Obstetric fistula. URL: https://www.who.int/news-room/facts-in-pictures/detail/10-facts-on-obstetric-fistula . 反映: 閉塞分娩と産科瘻。","Wall LL. Obstetric vesicovaginal fistula as an international public-health problem. Lancet. 2006. DOI: 10.1016/S0140-6736(06)68110-4. PMID: 16488882. 直近5年の高品質文献を確認できず、基礎文献として使用。"]},
{number:7,theme:"性暴力、性犯罪、セカンドレイプ、ワンストップ支援センター",stem:"救急外来に、望まない性的行為を受けたと訴える女性が来院した。初期対応と支援資源について正しいものを全て選べ。",choices:{A:"本人の意思に反する性的行為を広く含め、刑法上の性犯罪だけに限定しない。",B:"加害者は見知らぬ人物が多いため、家族・交際相手・知人による被害は扱いにくい。",C:"打ち明けられた側が疑ったり責めたりせず、本人は悪くないと伝えることは二次被害を防ぐうえで重要である。",D:"ワンストップ支援センターは、医療、心理、警察・法的手続きなどの支援につなぐ相談窓口である。",E:"被害から72時間を過ぎると、妊娠、性感染症、証拠採取、心理支援の相談意義はほぼなくなる。"},correct:["A","C","D"],comments:{A:"正しい。性暴力は性犯罪より広い概念として扱う。",B:"誤り。身近な人からの被害も重要であり、軽視しない。",C:"正しい。責める言動はセカンドレイプになりうる。",D:"正しい。#8891などから地域のセンターにつながる。",E:"誤り。緊急避妊の時間軸だけで支援全体を打ち切らない。"},refs:["内閣府男女共同参画局. 性犯罪・性暴力被害者のためのワンストップ支援センター. URL: https://www.gender.go.jp/policy/no_violence/seibouryoku/consult.html . 反映: #8891と医療・相談支援。","内閣府男女共同参画局. 性犯罪・性暴力とは. URL: https://www.gender.go.jp/policy/no_violence/seibouryoku/index.html . 反映: 性暴力の範囲、身近な人の対応、二次被害。"]},
{number:8,theme:"骨粗鬆症、男女比較、薬物治療開始基準",stem:"70歳女性。既存椎体骨折はなく、大腿骨近位部YAM 68%、FRAX主要骨折確率17%。同年齢男性とのリスク差、治療開始基準、二次性原因を整理する。正しいものを全て選べ。",choices:{A:"原発性骨粗鬆症は男性の方が閉経後女性より有病率が高い。",B:"既存脆弱性骨折がなくても、骨密度低下とFRAX高値を組み合わせて薬物治療を検討する。",C:"閉経後女性ではエストロゲン低下により海綿骨を中心に骨量減少が進みやすい。",D:"YAMが90%以上なら椎体骨折の既往は薬物治療判断から除外する。",E:"腎機能、Ca、P、ALP、PTH、25(OH)Dなど二次性原因の評価が必要になることがある。"},correct:["B","C","E"],comments:{A:"誤り。閉経後女性で有病率が高く、男性では二次性要因の確認も重要である。",B:"正しい。日本の治療開始基準では骨密度、骨折歴、FRAXなどを組み合わせる。",C:"正しい。閉経後の急速な骨量減少は女性で重要である。",D:"誤り。骨折歴は骨密度値だけでは置き換えられない。",E:"正しい。続発性骨粗鬆症や薬剤性、CKD-MBDなどを確認する。"},refs:["骨粗鬆症の予防と治療ガイドライン作成委員会. 骨粗鬆症の予防と治療ガイドライン2015年版. 直近5年の国内高品質改訂を確認できず、薬物治療開始基準の基礎資料として使用。","LeBoff MS, et al. The clinician's guide to prevention and treatment of osteoporosis. Osteoporos Int. 2022. DOI: 10.1007/s00198-021-05900-y. PMID: 35478046. 反映: DXA、FRAX、二次性原因、薬物治療判断。"]},
{number:9,theme:"女性の狭心症症状、非心臓性胸痛症候群、閉経前発症の予後",stem:"48歳女性。胸部圧迫感と息切れを反復し、冠動脈造影で有意狭窄はない。発作時の攣縮は証明されず、微小血管障害や非心臓性胸痛との鑑別が議論された。正しいものを全て選べ。",choices:{A:"有意狭窄がなければ虚血性心疾患の予後リスクは一般集団と同じである。",B:"女性の胸痛が非典型的なら心血管評価は不要である。",C:"攣縮が証明されなければ、微小血管性狭心症やINOCAは鑑別から除外できる。",D:"閉塞性冠動脈病変がなくても、冠微小血管障害は虚血症状や予後不良と関連しうる。",E:"胃食道逆流、筋骨格性疼痛、不安関連症状など非心臓性胸痛も除外診断として扱う。"},correct:["D","E"],comments:{A:"誤り。INOCAは症状、QOL、イベントリスクと関係しうる。",B:"誤り。女性では症状が非典型でも心血管評価を省かない。",C:"誤り。攣縮陰性でも微小血管障害は残る。",D:"正しい。閉塞性狭窄の有無だけで虚血を否定しない。",E:"正しい。心臓性リスクを評価した上で非心臓性胸痛を鑑別する。"},refs:["Virani SS, et al. 2023 AHA/ACC Guideline for the Management of Patients With Chronic Coronary Disease. Circulation. 2023. DOI: 10.1161/CIR.0000000000001168. 反映: 慢性冠症候群、非閉塞性病変、リスク評価。","Kunadian V, et al. An EAPCI Expert Consensus Document on INOCA. Eur Heart J. 2020. DOI: 10.1093/eurheartj/ehaa503. PMID: 32626906. 反映: 女性に多いINOCA、微小血管・攣縮評価。"]},
{number:10,theme:"エチゾラム、ベンゾジアゼピン系、ラメルテオン",stem:"76歳女性。不眠と不安でエチゾラムを長期内服している。ふらつきが増え、ラメルテオンへの変更も相談された。正しいものを全て選べ。",choices:{A:"ラメルテオンはメラトニンMT1/MT2受容体作動薬で、ベンゾジアゼピン受容体作動薬とは作用機序が異なる。",B:"エチゾラムは依存や離脱を考慮しなくてよい睡眠薬である。",C:"高齢者では転倒予防のためベンゾジアゼピン受容体作動薬を長期第一選択にする。",D:"ラメルテオンは中途覚醒を主訴とする全例で最も速効性が高い。",E:"睡眠薬として使うベンゾジアゼピン系薬では、せん妄や認知機能への影響を考えなくてよい。"},correct:["A"],comments:{A:"正しい。睡眠覚醒リズムに関わるメラトニン受容体作動薬である。",B:"誤り。チエノジアゼピン系だがベンゾジアゼピン様に依存・離脱を考える。",C:"誤り。高齢者では転倒、せん妄、認知機能、依存に注意する。",D:"誤り。睡眠開始困難への選択肢であり、全例速効性を期待する薬ではない。",E:"誤り。高齢者の薬剤性リスクとして重要である。"},refs:["Sateia MJ, et al. Clinical Practice Guideline for the Pharmacologic Treatment of Chronic Insomnia in Adults. J Clin Sleep Med. 2017. DOI: 10.5664/jcsm.6470. PMID: 27998379. 直近5年の高品質文献を確認できず、不眠薬物療法の基礎資料として使用。","American Geriatrics Society. 2023 updated AGS Beers Criteria. J Am Geriatr Soc. 2023. DOI: 10.1111/jgs.18372. PMID: 37139824. 反映: 高齢者のベンゾジアゼピン系薬リスク。"]},
{number:11,theme:"PCOS肥満例の体重管理",stem:"29歳女性。月経不順と多毛で受診。BMI 33、血圧高値、空腹時血糖境界域。妊娠希望は現時点でない。卵巣所見と高アンドロゲン所見から診断を考えている。肥満を伴うこの病態の管理として正しいものを全て選べ。",choices:{A:"体重管理は排卵や代謝には影響しないため説明しない。",B:"耐糖能異常、脂質異常、血圧など心血管代謝リスクを評価する。",C:"月経不順があっても子宮内膜保護は考慮しない。",D:"生活習慣介入は第一選択の基盤として位置づける。",E:"メトホルミンは代謝異常を伴う例で選択肢となりうる。"},correct:["B","D","E"],comments:{A:"誤り。肥満例では体重減少が月経・排卵・代謝改善につながりうる。",B:"正しい。PCOSでは心血管代謝リスクを系統的に評価する。",C:"誤り。希発月経では内膜過形成リスクを意識する。",D:"正しい。食事、運動、行動支援が基盤になる。",E:"正しい。BMI高値や耐糖能異常で検討される。"},refs:["Teede HJ, et al. Recommendations from the 2023 International Evidence-based Guideline for PCOS. J Clin Endocrinol Metab. 2023. DOI: 10.1210/clinem/dgad463. 反映: 生活習慣、代謝評価、メトホルミン。","International Evidence-based Guideline for PCOS 2023. Monash University/ESHRE/ASRM. URL: https://www.monash.edu/medicine/mchri/pcos/guideline . 反映: 肥満例の包括管理。"]},
{number:12,theme:"甲状腺機能亢進症の症状と管理",stem:"32歳女性。動悸、体重減少、手指振戦、月経量減少を訴える。TSHは抑制、FT4・FT3は高値。びまん性甲状腺腫と眼症状を認める。説明・管理として正しいものを全て選べ。",choices:{A:"妊娠中でも放射性ヨウ素内用療法は第一選択である。",B:"TSH低値のみで、FT4やFT3を確認せず診断を確定できる。",C:"妊娠可能年齢では治療選択時に妊娠希望・避妊状況を確認する。",D:"TSH受容体抗体は原因診断や妊娠管理に有用である。",E:"抗甲状腺薬では無顆粒球症や肝障害など重篤副作用を説明する。"},correct:["C","D","E"],comments:{A:"誤り。妊娠中の放射性ヨウ素は禁忌である。",B:"誤り。FT4/FT3と原因鑑別を組み合わせる。",C:"正しい。薬剤選択、放射性ヨウ素、妊娠時期の相談に直結する。",D:"正しい。Graves病診断や胎児・新生児甲状腺機能リスク評価に関わる。",E:"正しい。発熱・咽頭痛時の受診なども指導する。"},refs:["Ross DS, et al. 2016 American Thyroid Association Guidelines for Hyperthyroidism. Thyroid. 2016. DOI: 10.1089/thy.2016.0229. PMID: 27521067. 直近5年の主要改訂を確認できず、標準管理の基礎文献として使用。","NICE. Thyroid disease: assessment and management. NG145. Updated 2023. URL: https://www.nice.org.uk/guidance/ng145 . 反映: 甲状腺中毒症の評価と管理。"]},
{number:13,theme:"ASC-US時のHPV検査施行・非施行での運用、ワクチン後検診",stem:"子宮頸部細胞診で意義不明の軽度扁平上皮異型が報告された。次の検査選択と受診者説明について正しいものを全て選べ。",choices:{A:"直ちに円錐切除を行う。",B:"高リスクHPV検査で層別化し、陽性ならコルポスコピー、陰性ならリスクに応じた経過観察へ振り分ける。",C:"HPV検査が陰性でも、全例で直ちに組織診を行う。",D:"1か月以内に細胞診を反復すれば、HPV検査やリスク層別化は不要である。",E:"ワクチン接種歴があれば、検診対象年齢でも以後の子宮頸がん検診は不要である。"},correct:["B"],comments:{A:"誤り。ASC-US相当の初期対応として侵襲的治療は過剰である。",B:"正しい。高リスクHPV検査によるトリアージが代表的運用である。",C:"誤り。陰性なら高悪性度病変リスクが低く、全例即組織診とはしない。",D:"誤り。反復細胞診のみの運用があり得ても、HPV層別化を不要と断定しない。",E:"誤り。ワクチン後も対象年齢では検診が必要である。"},refs:["Perkins RB, et al. 2019 ASCCP Risk-Based Management Consensus Guidelines. J Low Genit Tract Dis. 2020. DOI: 10.1097/LGT.0000000000000525. PMID: 32243307. 反映: HPV結果を用いたASC-US管理。","厚生労働省. HPVワクチンに関するQ&A. Updated 2026-03-25. URL: https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou/hpv_qa.html . 反映: HPVワクチン後も子宮頸がん検診を継続。"]},
{number:14,theme:"OC/LEP禁忌と糖尿病",stem:"糖尿病を有する月経困難症患者に低用量エストロゲン・プロゲスチン配合薬を検討している。処方可否の判断として正しいものを全て選べ。",choices:{A:"妊娠糖尿病の既往があるだけで、現在の耐糖能異常がなくても禁忌である。",B:"2型糖尿病では血管合併症の有無にかかわらず一律禁忌である。",C:"糖尿病性網膜症を合併する場合は、血管合併症リスクを踏まえ慎重または禁忌相当として扱う。",D:"インスリン治療中の糖尿病は、それだけで絶対禁忌である。",E:"糖尿病罹病期間が20年を超える場合は、血管合併症リスクを踏まえ原則避ける方向で評価する。"},correct:["C","E"],comments:{A:"誤り。妊娠糖尿病既往のみは現時点の血管リスクとは分ける。",B:"誤り。非血管性糖尿病と血管合併症例で扱いが異なる。",C:"正しい。腎症、網膜症、神経障害などは重要な制限因子である。",D:"誤り。インスリン使用そのものではなく、血管合併症や罹病期間を評価する。",E:"正しい。20年超ではカテゴリー3/4相当として重症度に応じ判断する。"},refs:["CDC. U.S. Medical Eligibility Criteria for Contraceptive Use, 2024. MMWR. URL: https://www.cdc.gov/mmwr/volumes/73/rr/rr7304a1.htm . 反映: CHCと糖尿病、血管合併症、20年超罹病期間の分類。","World Health Organization. Medical eligibility criteria for contraceptive use. 5th ed. 2015. 直近5年の高品質改訂を確認できず、国際分類の基礎資料として使用。"]},
{number:15,theme:"カウンセラーの態度",stem:"婦人科外来で心理的支援につなぐ際、支援者の基本的態度について適切なものを全て選べ。",choices:{A:"語りを評価や説得に先立って受け止めようとする。",B:"表面的な同意ではなく、相手の内的世界を理解しようとする。",C:"役割を演じるだけでなく、関係の中で誠実で一貫した態度を保つ。",D:"条件付きに評価するのではなく、その人として尊重する。",E:"不安を訴える患者には、早期に支援者側の価値判断を示し行動修正を指示する。"},correct:["A","B","C","D"],comments:{A:"正しい。受容的態度は支援関係の基盤である。",B:"正しい。共感的理解に相当する。",C:"正しい。自己一致・純粋性が重視される。",D:"正しい。無条件の肯定的関心に相当する。",E:"誤り。価値判断や指示を急ぐ姿勢は基本的態度として不適切である。"},refs:["Rogers CR. The necessary and sufficient conditions of therapeutic personality change. J Consult Psychol. 1957. DOI: 10.1037/h0045357. 直近5年の高品質文献を確認できず、来談者中心療法の基礎文献として使用。","American Psychological Association. APA Dictionary of Psychology: client-centered therapy. URL: https://dictionary.apa.org/client-centered-therapy . 反映: 受容、共感、自己一致の整理。"]},
{number:16,theme:"JNHS",stem:"日本における女性の健康研究としてのある看護職コホートについて説明する。研究デザインとHRT情報の扱いとして正しいものを全て選べ。",choices:{A:"日本の女性看護職を対象とした前向き観察研究である。",B:"閉経、生活習慣、月経・妊娠歴、ホルモン薬使用など女性の健康要因を追跡する研究として位置づけられる。",C:"HRTを無作為割付し、心血管イベントを主要評価項目とした介入試験である。",D:"米国のNurses' Health Studyとは別個の日本人集団情報を補う研究として扱う。",E:"HRT使用頻度や人数などの数値は、論文本文・調査票・集計表で確認できる範囲に限定して扱う。"},correct:["A","B","D","E"],comments:{A:"正しい。日本人女性看護職集団の観察研究である。",B:"正しい。女性のライフコース要因を扱う。",C:"誤り。WHIのようなHRT介入試験ではない。",D:"正しい。米国NHSとは混同しない。",E:"正しい。人数や頻度は分母、時点、解析対象で変わるため確認範囲に限定する。"},refs:["Hayashi K, et al. Design and baseline characteristics of the Japan Nurses' Health Study: a prospective occupational cohort study. J Epidemiol. 2007. DOI/PMIDは確認可能資料で再確認。直近5年の高品質文献を確認できず、研究デザインの基礎資料として使用。","Bao Y, et al. Origin, Methods, and Evolution of the Three Nurses' Health Studies. Am J Public Health. 2016. DOI: 10.2105/AJPH.2016.303338. PMID: 27459450. 反映: 米国NHSとの比較。"]},
{number:17,theme:"原発性無月経の鑑別",stem:"16歳、初経なし。乳房発育はTanner 4、身長は年齢相当。外陰部は女性型で、画像で子宮を確認できない。最も重要な追加評価として正しいものを全て選べ。",choices:{A:"GnRH負荷試験のみで視床下部性無月経と診断する。",B:"黄体ホルモン負荷試験で出血がなければ卵巣不全と確定する。",C:"染色体検査と血中テストステロン測定を行い、子宮腟欠損と完全型アンドロゲン不応症を鑑別する。",D:"プロラクチンが正常なら下垂体疾患は完全に否定できる。",E:"乳房発育があるため、性分化疾患は鑑別から除外できる。"},correct:["C"],comments:{A:"誤り。子宮欠如の評価軸を無視している。",B:"誤り。消退出血の有無だけで卵巣不全を確定しない。",C:"正しい。乳房発育あり・子宮なしでは46,XXの子宮腟欠損と46,XYの完全型アンドロゲン不応症が重要である。",D:"誤り。PRL正常だけで下垂体疾患を完全否定しない。",E:"誤り。乳房発育があっても性分化疾患は鑑別に残る。"},refs:["ASRM Practice Committee. Current evaluation of amenorrhea: a committee opinion. 2024. URL: https://www.asrm.org/practice-guidance/practice-committee-documents/current-evaluation-of-amenorrhea-a-committee-opinion-2024/ . 反映: 原発性無月経の妊娠除外、内分泌、解剖、染色体評価。","StatPearls. Amenorrhea. NCBI Bookshelf. URL: https://www.ncbi.nlm.nih.gov/books/NBK482168/ . 反映: 子宮欠如を伴う原発性無月経の鑑別。"]},
{number:18,theme:"HPVワクチン、2価・4価・9価、対象、キャッチアップ、検診",stem:"思春期女性と保護者に予防接種について説明する。対象、期待される効果、接種後の検診について正しいものを全て選べ。",choices:{A:"予防効果は既感染の治療ではなく、主に新規感染予防によって得られる。",B:"9価ワクチンはHPV16/18に加え31/33/45/52/58なども標的に含む。",C:"接種後も、対象年齢になれば子宮頸がん検診は必要である。",D:"ワクチン接種歴があれば、性器出血などの症状があっても婦人科受診は不要である。",E:"初回性交前に接種するほど予防効果を得やすい。"},correct:["A","B","C","E"],comments:{A:"正しい。HPVワクチンは治療ワクチンではない。",B:"正しい。9価は高リスク7型を含む。",C:"正しい。すべての発がん性HPVや既感染を完全にカバーしないため検診は継続する。",D:"誤り。症状があればワクチン歴にかかわらず診療対象である。",E:"正しい。曝露前接種で予防効果を得やすい。"},refs:["厚生労働省. HPVワクチン. Updated 2026. URL: https://www.mhlw.go.jp/bunya/kenkou/kekkaku-kansenshou28/index.html . 反映: 2026年度の定期接種対象、9価ワクチン、2回/3回接種。","厚生労働省. HPVワクチンのキャッチアップ接種について. URL: https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou/hpv_catch-up-vaccination.html . 反映: 2022年4月-2025年3月に1回以上接種した対象者の2026年3月末までの経過措置。","WHO. Human papillomavirus vaccines: WHO position paper, 2022 update. Wkly Epidemiol Rec. 2022. URL: https://www.who.int/publications/i/item/who-wer9750-645-672 . 反映: 接種対象と検診との補完関係。"]},
{number:19,theme:"HRT開始前の評価",stem:"52歳、閉経後2年。ホットフラッシュが強く全身ホルモン療法を希望している。開始前評価として最も適切なものを全て選べ。",choices:{A:"症状が強ければ、乳癌、血栓症、心血管疾患リスクの確認前に全例で開始する。",B:"既往歴、家族歴、血圧、体重、喫煙、血栓症・乳癌・冠動脈疾患・脳卒中リスク、子宮の有無、乳房・婦人科評価の状況を確認し、適応と禁忌を個別評価する。",C:"開始前には全例で腫瘍マーカー測定が必須である。",D:"経皮エストロゲンを選択すれば、血栓症既往の確認は不要である。",E:"子宮があるかどうかは投与設計に影響しない。"},correct:["B"],comments:{A:"誤り。症状の強さだけで禁忌確認を省略しない。",B:"正しい。HRTはリスク便益と投与設計を個別化する。",C:"誤り。腫瘍マーカー一律測定は標準的な開始前必須項目ではない。",D:"誤り。投与経路にかかわらず血栓症リスクを確認する。",E:"誤り。子宮ありでは内膜保護のため黄体ホルモン併用を考える。"},refs:["The North American Menopause Society. The 2022 Hormone Therapy Position Statement. Menopause. 2022. DOI: 10.1097/GME.0000000000002028. PMID: 35797481. 反映: 適応、禁忌、開始時期、投与経路、個別化。","日本産科婦人科学会・日本女性医学学会. ホルモン補充療法ガイドライン. 最新版確認対象。直近5年内で公開確認できる範囲では、国内運用の補助資料として扱う。"]},
{number:20,theme:"サルコペニア、握力、歩行速度、筋肉量、フレイルとの違い",stem:"75歳女性。半年で体重が4kg減り、外出頻度が低下した。握力は16kg、通常歩行速度0.8m/秒、骨格筋量も低下している。概念と判定について正しいものを全て選べ。",choices:{A:"サルコペニアでは筋力、身体機能、筋量を組み合わせて評価する。",B:"握力が低くても歩行速度が保たれれば、筋量測定は不要である。",C:"アジア人基準では女性握力18kg未満、通常歩行速度1.0m/秒未満が低下の目安として用いられる。",D:"フレイルは体重減少、疲労感、活動量低下などを含む多面的な虚弱概念で、サルコペニアと重なるが同義ではない。",E:"低栄養、転倒リスク、骨粗鬆症、薬剤、併存疾患を合わせて評価する。"},correct:["A","C","D","E"],comments:{A:"正しい。筋力低下を入口に、身体機能と筋量を確認する。",B:"誤り。筋力低下があれば筋量評価へ進む。",C:"正しい。AWGS 2019で用いられる代表的カットオフである。",D:"正しい。フレイルはより広い老年症候群である。",E:"正しい。介入は栄養、運動、転倒・骨折予防を含める。"},refs:["Chen LK, et al. Asian Working Group for Sarcopenia: 2019 Consensus Update. J Am Med Dir Assoc. 2020. DOI: 10.1016/j.jamda.2019.12.012. PMID: 32033882. 反映: 握力18kg、歩行速度1.0m/s、筋量評価。","日本サルコペニア・フレイル学会等. サルコペニア診療ガイドライン2017年版一部改訂. 直近5年の高品質改訂を確認できず、国内用語整理の補助として使用。"]}];
const STORAGE_KEY='womens_med_20260624_specified20_v1';
const LETTERS=['A','B','C','D','E'];
let state={answers:{},memos:{}},storageOk=true;
const $=s=>document.querySelector(s);
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function normalize(v){const seen=new Set();String(v||'').toUpperCase().split('').forEach(ch=>{if(LETTERS.includes(ch))seen.add(ch)});return LETTERS.filter(ch=>seen.has(ch)).join('')}
function same(a,b){return normalize(a)===LETTERS.filter(ch=>b.includes(ch)).join('')}
function warn(m){const el=$('#storage-warning');el.hidden=false;el.textContent=m}
function load(){try{const raw=localStorage.getItem(STORAGE_KEY);if(raw)state=JSON.parse(raw);state.answers=state.answers||{};state.memos=state.memos||{}}catch(e){storageOk=false;warn('保存データを読み込めませんでした。')}}
function save(){if(!storageOk)return;try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));$('#save-status').textContent='保存しました。'}catch(e){storageOk=false;warn('localStorageへ保存できませんでした。')}}
function renderQuestions(){$('#questions-root').innerHTML=QUESTIONS.map(q=>`<article class="question-card"><h3><span class="qno">第${q.number}問</span></h3><p class="stem">${esc(q.stem)}</p><div class="choices" role="group" aria-label="第${q.number}問の選択肢">${LETTERS.map(L=>`<button type="button" class="choice" data-q="${q.number}" data-choice="${L}" aria-pressed="false"><span class="letter">${L}</span><span>${esc(q.choices[L])}</span></button>`).join('')}</div><div class="answer-row"><div><label for="answer-${q.number}">回答記入欄</label><input id="answer-${q.number}" class="answer-input" data-q="${q.number}" maxlength="5" inputmode="latin" autocomplete="off" aria-label="第${q.number}問の回答記入欄"><div class="hint">A-Eのみ保存</div></div><div><label for="memo-${q.number}">メモ欄</label><textarea id="memo-${q.number}" data-q="${q.number}" aria-label="第${q.number}問のメモ欄"></textarea></div></div></article>`).join('');QUESTIONS.forEach(q=>{const a=$(`#answer-${q.number}`),m=$(`#memo-${q.number}`);a.value=normalize(state.answers[q.number]||'');m.value=state.memos[q.number]||'';updateChoice(q.number)})}
function renderExplanations(){$('#explanations-root').innerHTML=QUESTIONS.map(q=>`<article class="explain-card"><h3><span class="qno">第${q.number}問</span></h3><p><span class="theme-pill">関連テーマ：${esc(q.theme)}</span> <span class="judge blank" data-judge="${q.number}">未回答</span></p><div class="reprint"><p class="stem">${esc(q.stem)}</p><ol type="A">${LETTERS.map(L=>`<li>${esc(q.choices[L])}</li>`).join('')}</ol></div><p><strong>答案者の回答：</strong><span data-exam-answer="${q.number}">未回答</span></p><p><strong>正答：</strong>${q.correct.join('')}</p>${LETTERS.map(L=>`<div class="option-comment ${q.correct.includes(L)?'correct':''}"><strong>${L}：</strong>${esc(q.comments[L])}</div>`).join('')}<h4>根拠文献</h4><ul class="refs">${q.refs.map(r=>`<li>${esc(r)}</li>`).join('')}</ul></article>`).join('');QUESTIONS.forEach(q=>updateJudge(q.number))}
function setAnswer(n,v){const ans=normalize(v);if(ans)state.answers[n]=ans;else delete state.answers[n];const input=$(`#answer-${n}`);if(input&&input.value!==ans)input.value=ans;updateChoice(n);updateJudge(n);renderSummary();save()}
function toggle(n,L){const cur=new Set(normalize(state.answers[n]||'').split('').filter(Boolean));cur.has(L)?cur.delete(L):cur.add(L);setAnswer(n,LETTERS.filter(x=>cur.has(x)).join(''))}
function setMemo(n,v){state.memos[n]=v;renderSummary();save()}
function updateChoice(n){const ans=normalize(state.answers[n]||'');document.querySelectorAll(`.choice[data-q="${n}"]`).forEach(btn=>{const on=ans.includes(btn.dataset.choice);btn.classList.toggle('selected',on);btn.setAttribute('aria-pressed',on?'true':'false')})}
function updateJudge(n){const q=QUESTIONS.find(x=>x.number===Number(n));if(!q)return;const ans=normalize(state.answers[n]||''),a=document.querySelector(`[data-exam-answer="${n}"]`),j=document.querySelector(`[data-judge="${n}"]`);if(a)a.textContent=ans||'未回答';if(j){const ok=ans&&same(ans,q.correct);j.className='judge '+(!ans?'blank':ok?'ok':'bad');j.textContent=!ans?'未回答':ok?'正解':'不正解'}}
function renderSummary(){$('#summary-root').innerHTML=QUESTIONS.map(q=>{const ans=normalize(state.answers[q.number]||'')||'未回答',memo=state.memos[q.number]||'';return `<div class="summary-item"><strong>第${q.number}問</strong>\n回答：${esc(ans)}\nメモ：${esc(memo||'なし')}</div>`}).join('')}
function summaryText(){return QUESTIONS.map(q=>{const ans=normalize(state.answers[q.number]||'')||'未回答';const memo=state.memos[q.number]||'なし';return '第'+q.number+'問\n回答：'+ans+'\nメモ：'+memo}).join('\n\n')}
async function copySummary(){const t=summaryText(),s=$('#copy-status');try{if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(t);s.textContent='コピーしました。';return}}catch(e){}const ta=document.createElement('textarea');ta.value=t;ta.readOnly=true;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();try{s.textContent=document.execCommand('copy')?'コピーしました。':'コピーできませんでした。'}catch(e){s.textContent='コピーできませんでした。'}document.body.removeChild(ta)}
function clearAll(){if(!confirm('入力内容をすべて消去します。よろしいですか？'))return;state={answers:{},memos:{}};try{localStorage.removeItem(STORAGE_KEY)}catch(e){}QUESTIONS.forEach(q=>{const a=$(`#answer-${q.number}`),m=$(`#memo-${q.number}`);if(a)a.value='';if(m)m.value='';updateChoice(q.number);updateJudge(q.number)});renderSummary();save()}
document.addEventListener('DOMContentLoaded',()=>{load();renderQuestions();renderSummary();renderExplanations();document.addEventListener('click',e=>{const b=e.target.closest('.choice');if(b)toggle(Number(b.dataset.q),b.dataset.choice)});document.addEventListener('input',e=>{if(e.target.classList.contains('answer-input'))setAnswer(Number(e.target.dataset.q),e.target.value);if(e.target.tagName==='TEXTAREA')setMemo(Number(e.target.dataset.q),e.target.value)});document.addEventListener('keydown',e=>{if(e.target.classList.contains('choice')&&(e.key===' '||e.key==='Enter')){e.preventDefault();toggle(Number(e.target.dataset.q),e.target.dataset.choice)}});$('#copy-btn').addEventListener('click',copySummary);$('#clear-btn').addEventListener('click',clearAll)});
</script>
