<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>20260624 セット2 女性医学専門医 5択複数正答問題集</title><style>:root{--bg:#f5f7fa;--paper:#fff;--ink:#18202b;--muted:#5d6878;--line:#d7dee8;--brand:#145c72;--soft:#e8f4f7;--ok:#126b42;--bad:#9b2d2d;--warn:#806000;--focus:#f2c84b}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;line-height:1.72}header,main section{max-width:1060px;margin:0 auto;padding:24px 18px}h1{font-size:1.75rem;line-height:1.3;margin:.2em 0}h2{font-size:1.35rem;border-left:6px solid var(--brand);padding-left:12px;margin:24px 0 14px}h3{margin:0 0 10px;font-size:1.08rem}.meta,.hint,.status-line{color:var(--muted)}.question-card,.summary-card,.explain-card{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:18px;margin:16px 0;break-inside:avoid;box-shadow:0 5px 16px rgba(30,40,60,.04)}.qno{display:inline-flex;min-width:4.5rem;justify-content:center;border:1px solid var(--brand);color:var(--brand);border-radius:999px;padding:2px 10px;font-weight:800}.stem{font-weight:650;margin:10px 0 14px}.choices{display:grid;gap:9px;margin:12px 0}.choice{display:grid;grid-template-columns:38px 1fr;gap:10px;align-items:start;width:100%;border:2px solid var(--line);border-radius:8px;background:white;padding:12px;text-align:left;font:inherit;color:inherit;cursor:pointer;min-height:58px}.choice:hover{border-color:#83aebd}.choice.selected{border-color:var(--brand);background:var(--soft);box-shadow:inset 0 0 0 1px var(--brand)}.choice .letter{font-weight:900;color:var(--brand)}.choice.selected .letter:after{content:"選択中";display:block;font-size:.68rem;color:var(--ok);font-weight:800}.answer-row{display:grid;grid-template-columns:minmax(130px,190px) 1fr;gap:14px;margin-top:14px}label{display:block;font-weight:800;margin-bottom:5px}.answer-input{width:100%;max-width:190px;border:1px solid var(--line);border-radius:8px;padding:9px;font:inherit;font-weight:900;letter-spacing:.08em;text-transform:uppercase;background:white}textarea{width:100%;min-height:88px;border:1px solid var(--line);border-radius:8px;padding:10px;font:inherit;resize:vertical;background:white}button:focus-visible,input:focus-visible,textarea:focus-visible{outline:3px solid var(--focus);outline-offset:2px}.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:14px}.btn{border:1px solid var(--brand);border-radius:8px;background:var(--brand);color:white;padding:9px 14px;font:inherit;font-weight:800;cursor:pointer}.btn.secondary{background:white;color:var(--brand)}.notice{border:1px solid #e1c668;background:#fff8df;color:#5f4500;border-radius:8px;padding:10px 12px;margin-top:12px}.summary-item{border-top:1px solid var(--line);padding:10px 0;white-space:pre-wrap}.summary-item:first-child{border-top:0}.judge{display:inline-block;border-radius:999px;padding:2px 9px;font-weight:900;margin-left:6px}.judge.ok{color:var(--ok);background:#e7f5ec}.judge.bad{color:var(--bad);background:#fdecec}.judge.blank{color:var(--warn);background:#fff3cd}.theme-pill{display:inline-block;background:#f1eee7;border:1px solid #ddd2c2;color:#463829;border-radius:999px;padding:3px 9px;font-weight:800;font-size:.9rem}.reprint{background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:12px;margin:10px 0}.option-comment{border-left:4px solid var(--line);background:#fbfcfe;padding:9px 11px;margin:8px 0}.option-comment.correct{border-left-color:var(--ok);background:#f0fbf5}.refs li{margin:6px 0}@media(max-width:720px){header,main section{padding:18px 12px}.question-card,.summary-card,.explain-card{padding:14px}.choice{grid-template-columns:32px 1fr}.answer-row{grid-template-columns:1fr}.answer-input{max-width:none}}@media print{body{background:white;font-size:10.5pt}header,main section{max-width:none;padding:12mm}.btn,.toolbar,#storage-warning{display:none!important}.question-card,.summary-card,.explain-card{box-shadow:none;page-break-inside:avoid;break-inside:avoid}.answers-section{break-before:page;page-break-before:always}h2,h3{page-break-after:avoid}.choice,.option-comment{break-inside:avoid}textarea{min-height:42px}}.top-actions{display:flex;justify-content:flex-start;margin:0 0 12px}.back-link{display:inline-block;border:1px solid var(--brand);border-radius:8px;background:white;color:var(--brand);padding:7px 12px;text-decoration:none;font-weight:800}.back-link:hover{background:var(--soft)}
</style></head><body><header><div class="top-actions"><a class="back-link" href="index.html">問題集一覧へ戻る</a></div><h1>女性医学専門医 5択複数正答問題集 セット2</h1><p class="meta">作成日：2026年6月24日 / 各問A-Eから正しいものを全て選択</p><p class="hint">選択肢カードをクリックすると選択・解除できます。回答欄へ直接入力する場合は、例：AC のように入力してください。</p><div id="storage-warning" class="notice" hidden></div><div class="toolbar"><button id="clear-btn" class="btn secondary" type="button">入力内容を消去</button><span id="save-status" class="status-line" aria-live="polite"></span></div></header><main><section aria-labelledby="exam-title"><h2 id="exam-title">試験問題</h2><div id="questions-root"></div></section><section aria-labelledby="summary-title"><h2 id="summary-title">回答記録（まとめ）</h2><div id="summary-root" class="summary-card" aria-live="polite"></div><div class="toolbar"><button id="copy-btn" class="btn" type="button">回答とメモをコピー</button><span id="copy-status" class="status-line" aria-live="polite"></span></div></section><section class="answers-section" aria-labelledby="answers-title"><h2 id="answers-title">回答・解説</h2><div id="explanations-root"></div></section></main><script>const QUESTIONS=[{"number":1,"theme":"原発性無月経：高ゴナドトロピン性卵巣不全と染色体評価","stem":"15歳、乳房発育は乏しく初経未発来。FSH高値、E2低値で、低身長と翼状頸を認める。初期評価として正しいものを全て選べ。","choices":{"A":"FSH高値とE2低値の組み合わせは卵巣原発の性腺機能低下を示唆する。","B":"Y染色体成分を含む性腺異形成では性腺腫瘍リスクを評価する。","C":"乳房発育が乏しければ骨年齢や成長余地の評価は不要である。","D":"TSH測定はTurner症候群が疑われる場合でも省略できる。","E":"プロゲスチン負荷試験が陽性なら卵巣不全は否定される。"},"correct":["A","B"],"comments":{"A":"正しい。中枢性ではなく卵巣側の反応低下を考える入口になる。","B":"正しい。核型やY成分の有無は管理方針に直結する。","C":"誤り。身長、骨年齢、成長余地はエストロゲン導入時期の判断に関係する。","D":"誤り。自己免疫性甲状腺疾患の合併評価は重要である。","E":"誤り。消退出血の有無だけで性腺機能や核型異常を整理できない。"},"refs":["ASRM Practice Committee. Current evaluation of amenorrhea: a committee opinion. 2024. https://www.asrm.org/practice-guidance/practice-committee-documents/current-evaluation-of-amenorrhea-a-committee-opinion-2024/","Ross DS, et al. 2016 American Thyroid Association Guidelines for Hyperthyroidism. Thyroid. 2016;26:1343-1421.","Alexander EK, et al. 2017 ATA Guidelines for Thyroid Disease During Pregnancy and Postpartum. Thyroid. 2017;27:315-389."]},{"number":2,"theme":"原発性無月経：乳房発育あり・子宮欠如の鑑別","stem":"17歳、乳房発育はTanner 5度、陰毛は正常。初経未発来で超音波では子宮を確認しにくい。正しいものを全て選べ。","choices":{"A":"乳房発育が十分なら核型検査は診療上の意義がない。","B":"子宮がなければ卵巣機能の評価は不要である。","C":"アンドロゲン不応症では精巣由来AMHの影響で子宮を欠く。","D":"陰毛が乏しい所見は完全型アンドロゲン不応症を支持する。","E":"46,XXで腟上部・子宮欠如を認める場合、腎尿路奇形の検索を考慮する。"},"correct":["C","D","E"],"comments":{"A":"誤り。46,XXと46,XYの区別は説明、腫瘍リスク、将来設計に関わる。","B":"誤り。卵巣の有無・ホルモン産生・性腺位置を分けて評価する。","C":"正しい。乳房発育あり・子宮なしの代表的鑑別である。","D":"正しい。アンドロゲン作用不全により陰毛・腋毛が乏しくなりやすい。","E":"正しい。MRKH症候群では腎・骨格系合併の確認が問われやすい。"},"refs":["ASRM Practice Committee. Current evaluation of amenorrhea: a committee opinion. 2024. https://www.asrm.org/practice-guidance/practice-committee-documents/current-evaluation-of-amenorrhea-a-committee-opinion-2024/"]},{"number":3,"theme":"子宮頸がん検診：HPV陽性・細胞診陰性のリスクベース運用","stem":"30代女性の子宮頸がん検診でHPV検査陽性、細胞診NILMであった。検診後の説明として正しいものを全て選べ。","choices":{"A":"HPVワクチン接種歴があっても検診対象年齢では検診を継続する。","B":"閉経後の萎縮性変化は細胞診解釈に影響しうる。","C":"HPV検査で陰性なら不正出血の精査も省略してよい。","D":"HPV16/18陽性では同じNILMでも精査優先度が上がる。","E":"HPV陽性NILMは全例ただちに円錐切除の適応である。"},"correct":["A","B","D"],"comments":{"A":"正しい。ワクチンは検診を不要にするものではない。","B":"正しい。採取条件や萎縮による判定困難は実務上の論点になる。","C":"誤り。症状がある場合は検診結果と別に診断目的の評価を行う。","D":"正しい。遺伝子型によりCIN3以上リスクが異なる。","E":"誤り。治療ではなくリスクに応じた再検査・コルポスコピー判断が基本である。"},"refs":["WHO guideline for screening and treatment of cervical pre-cancer lesions for cervical cancer prevention. 2nd ed. 2021. https://www.who.int/publications/i/item/9789240030824","Perkins RB, et al. 2019 ASCCP Risk-Based Management Consensus Guidelines. J Low Genit Tract Dis. 2020;24:102-131."]},{"number":4,"theme":"乳がん検診：平均リスクと高濃度乳房の扱い","stem":"45歳、乳がん家族歴なし。自治体検診でマンモグラフィを受ける予定で、高濃度乳房について質問された。正しいものを全て選べ。","choices":{"A":"乳房痛がある場合も検診枠だけで経過観察すれば十分である。","B":"BRCA病的バリアント保有者も平均リスク女性と同じ検診間隔だけで十分である。","C":"平均リスク女性では40歳から74歳までの隔年マンモグラフィがUSPSTFで推奨される。","D":"高濃度乳房なら平均リスク女性全員に乳房MRIを毎年追加することが標準である。","E":"高濃度乳房なら死亡率低下が証明された追加超音波を全例必ず行う。"},"correct":["C"],"comments":{"A":"誤り。症状がある場合は検診ではなく診療として扱う。","B":"誤り。高リスク管理としてMRIや遺伝カウンセリングを含めて別枠で考える。","C":"正しい。2024年の主要な更新点で、40歳開始が試験向きである。","D":"誤り。追加検査は個別判断であり、平均リスク全員へのMRI追加とはならない。","E":"誤り。追加検査は検出増加と偽陽性増加のバランスを説明する。"},"refs":["US Preventive Services Task Force. Screening for Breast Cancer: Recommendation Statement. JAMA. 2024;331:1918-1930. https://www.uspreventiveservicestaskforce.org/uspstf/recommendation/breast-cancer-screening"]},{"number":5,"theme":"骨粗鬆症：CKD合併例での薬剤選択と検査値","stem":"72歳女性、eGFR 28、腰椎Tスコア -2.7。骨粗鬆症治療開始を検討する。正しいものを全て選べ。","choices":{"A":"椎体骨折の既往は将来骨折リスクを大きく上げる。","B":"CKDではCa、P、ALP、PTHなど骨ミネラル代謝の確認が重要になる。","C":"経口ビスホスホネートは高度腎機能低下でも用量調整なしに標準使用する。","D":"デノスマブ使用時は低カルシウム血症に注意する。","E":"脆弱性椎体骨折の既往があれば、骨密度値だけでなく骨折歴を重くみて治療を検討する。"},"correct":["A","B","D","E"],"comments":{"A":"正しい。既存椎体骨折は強いリスク因子である。","B":"正しい。単純なTスコアだけで薬剤を決めにくい。","C":"誤り。腎機能により使用制限や慎重投与がある。","D":"正しい。腎機能低下例では特に補正CaやビタミンD状態を見る。","E":"正しい。既存骨折は将来骨折の強い予測因子で、治療判断に大きく影響する。"},"refs":["LeBoff MS, et al. The clinician's guide to prevention and treatment of osteoporosis. Osteoporos Int. 2022;33:2049-2102."]},{"number":6,"theme":"脂質異常症：女性で見落としやすいリスク増強因子","stem":"58歳、閉経後。LDL-C 156 mg/dL、喫煙なし、血圧正常。妊娠高血圧症候群の既往がある。正しいものを全て選べ。","choices":{"A":"HDL-Cが高ければLDL-C管理目標は常に不要になる。","B":"Lp(a)高値はLDL-Cが正常なら心血管リスクと無関係である。","C":"妊娠高血圧症候群の既往は将来の心血管リスク評価で考慮する。","D":"冠動脈疾患既往があれば一次予防と同じ管理強度でよい。","E":"閉経後は脂質プロファイルが悪化しやすい。"},"correct":["C","E"],"comments":{"A":"誤り。高HDLだけでLDL-Cや総合リスク評価を帳消しにしない。","B":"誤り。Lp(a)は独立した遺伝的リスクとして扱われる。","C":"正しい。女性特有のリスク増強因子として扱われる。","D":"誤り。二次予防ではより厳格なLDL-C低下を目指す。","E":"正しい。LDL-C上昇などがみられやすい。"},"refs":["Grundy SM, et al. 2018 AHA/ACC Cholesterol Guideline. Circulation. 2019;139:e1082-e1143.","Virani SS, et al. 2022 ACC Expert Consensus Decision Pathway on Nonstatin Therapies. J Am Coll Cardiol. 2022;80:1366-1418."]},{"number":7,"theme":"糖尿病：SGLT2阻害薬と女性外陰腟感染症","stem":"60歳女性、2型糖尿病と心不全を合併しSGLT2阻害薬を提案された。正しいものを全て選べ。","choices":{"A":"心不全合併例ではSGLT2阻害薬の心腎保護効果を考慮する。","B":"尿糖が出る薬なので飲水制限を厳格に行う。","C":"SGLT2阻害薬では外陰腟カンジダ症など性器感染症が増える。","D":"反復する外陰腟感染があれば治療継続可否を個別に判断する。","E":"SGLT2阻害薬ではケトアシドーシスの説明は1型糖尿病だけで十分である。"},"correct":["A","C","D"],"comments":{"A":"正しい。血糖降下だけでなく臓器保護の観点がある。","B":"誤り。脱水やシックデイ対応を説明する方向で、機械的な飲水制限ではない。","C":"正しい。女性で説明しておくべき副作用である。","D":"正しい。メリットとQOL低下を比較して検討する。","E":"誤り。2型でもシックデイや低炭水化物摂取時などに注意する。"},"refs":["American Diabetes Association Professional Practice Committee. Standards of Care in Diabetes. Diabetes Care. 2026;49(Suppl 1). https://diabetesjournals.org/care/issue/49/Supplement_1"]},{"number":8,"theme":"心血管系：INOCA/MINOCAと更年期女性の胸痛","stem":"53歳、閉経移行期。労作時胸部圧迫感があるが冠動脈造影で高度狭窄を認めない。正しいものを全て選べ。","choices":{"A":"冠攣縮性狭心症では安静時や夜間早朝の発作が手がかりになる。","B":"閉経後のエストロゲン低下は血管機能変化と関連しうる。","C":"造影で狭窄がなければ心血管イベントリスクは一般人口と同じと説明する。","D":"胸痛が非典型的なら心血管評価は不要である。","E":"冠動脈微小血管障害は閉塞性狭窄がなくても虚血症状の原因になる。"},"correct":["A","B","E"],"comments":{"A":"正しい。症状時間帯や誘因も問われる。","B":"正しい。病態背景として問われる。","C":"誤り。INOCAでも予後やQOLへの影響がある。","D":"誤り。女性では非典型症状だけで除外しない。","E":"正しい。女性の胸痛評価で重要な論点である。"},"refs":["Virani SS, et al. 2023 AHA/ACC Guideline for Chronic Coronary Disease. Circulation. 2023;148:e9-e119.","The 2022 hormone therapy position statement of The North American Menopause Society. Menopause. 2022;29:767-794."]},{"number":9,"theme":"脳血管障害：片頭痛前兆とエストロゲン含有避妊薬","stem":"32歳、閃輝暗点を伴う片頭痛がある。月経困難へのホルモン療法を相談した。正しいものを全て選べ。","choices":{"A":"プロゲスチン単独法はエストロゲン含有法と同じ禁忌として扱う。","B":"前兆を伴う片頭痛では複合ホルモン避妊薬は脳卒中リスクの観点から避ける。","C":"喫煙や高血圧が加わると血管リスク評価はさらに重要になる。","D":"前兆の有無は避妊薬選択に影響しない。","E":"神経脱落症状が初発なら片頭痛と決めつけず鑑別する。"},"correct":["B","C","E"],"comments":{"A":"誤り。方法ごとにMEC分類が異なる。","B":"正しい。CDC MECでは重要な禁忌領域である。","C":"正しい。複数リスクの重なりで判断が変わる。","D":"誤り。前兆ありとなしで扱いが大きく異なる。","E":"正しい。TIA、脳血管障害、てんかんなどを考える。"},"refs":["CDC. U.S. Medical Eligibility Criteria for Contraceptive Use, 2024. MMWR Recomm Rep. 2024;73:1-126. https://www.cdc.gov/mmwr/volumes/73/rr/rr7304a1.htm"]},{"number":10,"theme":"骨盤臓器脱：ペッサリー管理と腟びらん","stem":"76歳、膀胱瘤主体の骨盤臓器脱にリングペッサリーを使用中。少量出血で受診した。正しいものを全て選べ。","choices":{"A":"骨盤臓器脱の重症度は尿失禁の有無だけで分類する。","B":"自己着脱が難しい患者では外来で定期的な抜去・洗浄・観察を行う。","C":"局所エストロゲンは腟萎縮が強い例で検討されることがある。","D":"ペッサリー使用中の出血では腟壁びらんや潰瘍を確認する。","E":"腟出血があればペッサリー関連と決め、悪性疾患の評価は不要である。"},"correct":["B","C","D"],"comments":{"A":"誤り。POP-Qなど解剖学的評価を用いる。","B":"正しい。放置による合併症を避ける。","C":"正しい。びらん予防や装着継続に役立つ場合がある。","D":"正しい。定期確認とサイズ適合が実務的に重要である。","E":"誤り。閉経後出血では別疾患も除外する。"},"refs":["NICE Guideline NG123. Urinary incontinence and pelvic organ prolapse in women: management. 2019, updated. https://www.nice.org.uk/guidance/ng123"]},{"number":11,"theme":"FLUTS：夜間頻尿と多尿パターンの排尿日誌","stem":"68歳女性、夜間頻尿3回。日中頻尿は軽度で、下腿浮腫と夕方の飲水量が多い。正しいものを全て選べ。","choices":{"A":"排尿日誌は夜間多尿、24時間多尿、膀胱容量低下の区別に役立つ。","B":"残尿測定は頻尿評価では常に禁忌である。","C":"夜間頻尿は全例、抗コリン薬から開始する。","D":"利尿薬の内服時刻は夜間尿に影響することがある。","E":"睡眠時無呼吸は夜間頻尿の背景になりうる。"},"correct":["A","D","E"],"comments":{"A":"正しい。症状名だけでOABと決めないための検査である。","B":"誤り。排出障害や尿閉リスク評価に有用な場合がある。","C":"誤り。多尿や睡眠障害、心不全、薬剤の評価が先に必要なことがある。","D":"正しい。内科薬の確認は女性医学でも問われる。","E":"正しい。ナトリウム利尿や睡眠分断との関連がある。"},"refs":["American Urological Association/SUFU. The diagnosis and treatment of idiopathic overactive bladder. 2024. https://www.auanet.org/guidelines-and-quality/guidelines/idiopathic-overactive-bladder"]},{"number":12,"theme":"脳機能：抗コリン負荷と認知機能","stem":"74歳、切迫性尿失禁で内服治療を希望。軽度認知障害と便秘がある。正しいものを全て選べ。","choices":{"A":"ミラベグロンなどβ3作動薬では血圧や併用薬を確認する。","B":"行動療法や膀胱訓練は薬物療法と併用しうる。","C":"抗コリン薬は口渇、便秘、認知機能への影響を説明して選択する。","D":"認知症リスクがあっても抗コリン薬の累積負荷は考慮しない。","E":"OAB治療薬開始前に尿路感染や血尿を確認する必要はない。"},"correct":["A","B","C"],"comments":{"A":"正しい。抗コリン負荷を避けたい例の選択肢になるが確認は必要である。","B":"正しい。薬だけに頼らない管理が基本である。","C":"正しい。高齢女性では副作用が設問化されやすい。","D":"誤り。睡眠薬、抗ヒスタミン薬など併用薬も含めて見る。","E":"誤り。鑑別すべき警告所見を確認する。"},"refs":["American Urological Association/SUFU. The diagnosis and treatment of idiopathic overactive bladder. 2024. https://www.auanet.org/guidelines-and-quality/guidelines/idiopathic-overactive-bladder","American Geriatrics Society 2023 updated AGS Beers Criteria. J Am Geriatr Soc. 2023;71:2052-2081."]},{"number":13,"theme":"精神疾患系：更年期うつ症状と双極性障害の見落とし","stem":"49歳、月経不順と不眠、抑うつ気分で受診。過去に数日間ほとんど眠らず活動的だった時期がある。正しいものを全て選べ。","choices":{"A":"希死念慮の確認は専門医紹介前にも行う。","B":"更年期症状があれば精神疾患の評価は不要である。","C":"ホットフラッシュがあればSSRIは禁忌である。","D":"抗うつ薬開始前に軽躁・躁病エピソードを確認する。","E":"ベンゾジアゼピン系薬は高齢になるほど転倒や認知への影響に注意する。"},"correct":["A","D","E"],"comments":{"A":"正しい。安全確保のため初診時から確認する。","B":"誤り。更年期症状と精神疾患は併存しうる。","C":"誤り。薬剤選択は症状、併存症、相互作用で判断する。","D":"正しい。双極性障害の見落としは治療選択に影響する。","E":"正しい。漫然投与を避ける論点である。"},"refs":["American Psychiatric Association. Diagnostic and Statistical Manual of Mental Disorders, Fifth Edition, Text Revision. 2022.","NICE Guideline NG222. Depression in adults: treatment and management. 2022. https://www.nice.org.uk/guidance/ng222","American Geriatrics Society 2023 updated AGS Beers Criteria. J Am Geriatr Soc. 2023;71:2052-2081."]},{"number":14,"theme":"乳がん系：内分泌療法中の骨量低下","stem":"62歳、閉経後乳がん術後でアロマターゼ阻害薬を開始予定。骨密度は大腿骨近位部Tスコア -2.2。正しいものを全て選べ。","choices":{"A":"乳がん既往があれば骨粗鬆症薬は全て禁忌である。","B":"ビスホスホネート使用時は顎骨壊死リスク説明と歯科状況確認を考慮する。","C":"治療前後で骨密度測定と骨折リスク評価を行う。","D":"タモキシフェンとアロマターゼ阻害薬の骨への影響は閉経状態にかかわらず同一である。","E":"アロマターゼ阻害薬は骨密度低下と骨折リスク増加に注意する。"},"correct":["B","C","E"],"comments":{"A":"誤り。がん治療歴を踏まえて薬剤を選ぶ。","B":"正しい。頻度は高くないが説明すべき有害事象である。","C":"正しい。長期内分泌療法ではフォローが必要である。","D":"誤り。閉経前後や薬剤により骨への作用は異なる。","E":"正しい。乳がん治療後の女性医学で重要な接点である。"},"refs":["US Preventive Services Task Force. Screening for Breast Cancer: Recommendation Statement. JAMA. 2024;331:1918-1930. https://www.uspreventiveservicestaskforce.org/uspstf/recommendation/breast-cancer-screening","LeBoff MS, et al. The clinician's guide to prevention and treatment of osteoporosis. Osteoporos Int. 2022;33:2049-2102."]},{"number":15,"theme":"検査・治療：DXA測定部位と判定の落とし穴","stem":"70歳女性、腰椎変形性変化が強く、腰椎DXAが高めに出ている。正しいものを全て選べ。","choices":{"A":"骨密度が正常なら転倒リスク評価は不要である。","B":"腰椎の変形や石灰化は骨密度を過大評価することがある。","C":"TスコアとZスコアは同じ臨床的意味を持つ。","D":"椎体骨折が疑われる身長低下では画像評価を検討する。","E":"大腿骨近位部は骨折予測と治療判断で重要な測定部位である。"},"correct":["B","D","E"],"comments":{"A":"誤り。骨折は骨強度と転倒リスクの両方で起きる。","B":"正しい。高齢者DXAの代表的な落とし穴である。","C":"誤り。Tスコアは若年成人平均、Zスコアは同年齢比較である。","D":"正しい。骨密度だけでは既存骨折を拾い切れない。","E":"正しい。腰椎だけで判断しない。"},"refs":["LeBoff MS, et al. The clinician's guide to prevention and treatment of osteoporosis. Osteoporos Int. 2022;33:2049-2102."]},{"number":16,"theme":"検査・治療：MHTの投与経路と血栓リスク","stem":"54歳、閉経後2年。強い血管運動神経症状がありMHTを希望。BMI 32で家族歴に静脈血栓症がある。正しいものを全て選べ。","choices":{"A":"経皮エストロゲンは経口薬より肝初回通過の影響が少ない。","B":"MHTは心血管疾患一次予防を主目的に開始する。","C":"血栓リスクが高いほど投与経路と代替療法の検討が重要になる。","D":"MHT開始前には乳がん、血栓症、原因不明出血などを確認する。","E":"子宮がある場合はエストロゲン単独投与で内膜保護できる。"},"correct":["A","C","D"],"comments":{"A":"正しい。凝固系や中性脂肪への影響の違いが問われる。","B":"誤り。症状治療が主目的で、予防薬として始めるものではない。","C":"正しい。個別化判断の典型問題である。","D":"正しい。禁忌・慎重投与の整理が必須である。","E":"誤り。子宮内膜増殖リスクを避けるため黄体ホルモン併用を考える。"},"refs":["The 2022 hormone therapy position statement of The North American Menopause Society. Menopause. 2022;29:767-794."]},{"number":17,"theme":"検査・治療：AMHの解釈と限界","stem":"36歳、月経周期は整。将来の妊孕性が心配でAMH測定を希望している。正しいものを全て選べ。","choices":{"A":"AMH低値ならその周期の排卵は必ず起こらない。","B":"AMHは卵巣予備能の一側面を示すが自然妊娠可能性を単独で断定しない。","C":"PCOSなどではAMHが高値になりやすい。","D":"AMHは閉経年齢を個人レベルで正確に予言する検査である。","E":"測定法や施設差があるため値の比較には注意する。"},"correct":["B","C","E"],"comments":{"A":"誤り。卵子数の目安と排卵の有無は別である。","B":"正しい。数値の独り歩きを避ける説明が重要である。","C":"正しい。卵胞数の多さを反映することがある。","D":"誤り。集団傾向はあっても個人予測には限界がある。","E":"正しい。単一カットオフで過度に判断しない。"},"refs":["ASRM Practice Committee. Current evaluation of amenorrhea: a committee opinion. 2024. https://www.asrm.org/practice-guidance/practice-committee-documents/current-evaluation-of-amenorrhea-a-committee-opinion-2024/"]},{"number":18,"theme":"検査・治療：OC/LEPの薬物相互作用","stem":"29歳、LEP服用中。結核治療開始にあたりリファンピシンを処方される予定。正しいものを全て選べ。","choices":{"A":"セントジョーンズワートは相互作用の確認対象になる。","B":"広域抗菌薬は全てリファンピシンと同程度に避妊効果を下げる。","C":"相互作用がある薬剤では追加避妊や別方法を検討する。","D":"リファンピシンは肝酵素誘導によりホルモン避妊効果を低下させうる。","E":"下痢や嘔吐が続いても内服吸収への影響は考慮しない。"},"correct":["A","C","D"],"comments":{"A":"正しい。サプリメントも聴取する。","B":"誤り。一般化は不適切で、酵素誘導薬を区別する。","C":"正しい。服薬期間だけでなく一定期間の対応を考える。","D":"正しい。抗結核薬との相互作用は頻出である。","E":"誤り。消化器症状では実質的な飲み忘れに準じた対応が必要になる。"},"refs":["CDC. U.S. Medical Eligibility Criteria for Contraceptive Use, 2024. MMWR Recomm Rep. 2024;73:1-126. https://www.cdc.gov/mmwr/volumes/73/rr/rr7304a1.htm","CDC. U.S. Selected Practice Recommendations for Contraceptive Use, 2024. MMWR Recomm Rep. 2024;73:1-77.","WHO. Violence against women health topic. https://www.who.int/health-topics/violence-against-women"]},{"number":19,"theme":"その他：帯状疱疹ワクチンと閉経後女性","stem":"57歳女性、帯状疱疹既往あり。再発予防について相談された。正しいものを全て選べ。","choices":{"A":"外陰部の帯状疱疹は性感染症と鑑別する必要がない。","B":"免疫抑制状態ではワクチン種類と接種時期を個別に確認する。","C":"帯状疱疹ワクチンは子宮頸がん検診の代替になる。","D":"組換え帯状疱疹ワクチンは帯状疱疹既往者でも接種対象になりうる。","E":"帯状疱疹後神経痛は高齢ほど問題になりやすい。"},"correct":["B","D","E"],"comments":{"A":"誤り。疼痛性皮疹ではヘルペスなどとの鑑別も行う。","B":"正しい。生ワクチンと不活化・組換えで扱いが異なる。","C":"誤り。対象疾患が全く異なる。","D":"正しい。既往があるだけで接種不要とはしない。","E":"正しい。予防の意義につながる。"},"refs":["CDC. U.S. Selected Practice Recommendations for Contraceptive Use, 2024. MMWR Recomm Rep. 2024;73:1-77.","WHO. Violence against women health topic. https://www.who.int/health-topics/violence-against-women"]},{"number":20,"theme":"その他：性暴力対応と医療記録","stem":"救急外来に性暴力被害を訴える女性が来院した。初期対応として正しいものを全て選べ。","choices":{"A":"診療録では本人の発言と医療者の所見を区別して記載する。","B":"ワンストップ支援センターは医療と無関係なので紹介しない。","C":"本人の安全確保と同意を優先し、診察や証拠採取を進める。","D":"緊急避妊、性感染症、妊娠検査、外傷評価を状況に応じて行う。","E":"警察への届出は本人の意思に関係なく医療者が必ず代行する。"},"correct":["A","C","D"],"comments":{"A":"正しい。後日の支援や法的手続きにも関わる。","B":"誤り。医療、相談、法的支援につなぐ資源である。","C":"正しい。被害者中心の対応が基本である。","D":"正しい。身体的リスクへの対応を同時に考える。","E":"誤り。生命危険など例外を除き、本人の意思と安全を尊重する。"},"refs":["CDC. U.S. Selected Practice Recommendations for Contraceptive Use, 2024. MMWR Recomm Rep. 2024;73:1-77.","WHO. Violence against women health topic. https://www.who.int/health-topics/violence-against-women"]}];const STORAGE_KEY='womens_med_20260624_set2_v1';const LETTERS=['A','B','C','D','E'];let state={answers:{},memos:{}},storageOk=true;const $=s=>document.querySelector(s);function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function normalize(v){const seen=new Set();String(v||'').toUpperCase().split('').forEach(ch=>{if(LETTERS.includes(ch))seen.add(ch)});return LETTERS.filter(ch=>seen.has(ch)).join('')}function same(a,b){return normalize(a)===LETTERS.filter(ch=>b.includes(ch)).join('')}function warn(m){const el=$('#storage-warning');el.hidden=false;el.textContent=m}function load(){try{const raw=localStorage.getItem(STORAGE_KEY);if(raw)state=JSON.parse(raw);state.answers=state.answers||{};state.memos=state.memos||{}}catch(e){storageOk=false;warn('保存データを読み込めませんでした。')}}function save(){if(!storageOk)return;try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));$('#save-status').textContent='保存しました。'}catch(e){storageOk=false;warn('localStorageへ保存できませんでした。')}}function renderQuestions(){$('#questions-root').innerHTML=QUESTIONS.map(q=>`<article class="question-card"><h3><span class="qno">第${q.number}問</span></h3><p class="stem">${esc(q.stem)}</p><div class="choices" role="group" aria-label="第${q.number}問の選択肢">${LETTERS.map(L=>`<button type="button" class="choice" data-q="${q.number}" data-choice="${L}" aria-pressed="false"><span class="letter">${L}</span><span>${esc(q.choices[L])}</span></button>`).join('')}</div><div class="answer-row"><div><label for="answer-${q.number}">回答記入欄</label><input id="answer-${q.number}" class="answer-input" data-q="${q.number}" maxlength="5" inputmode="latin" autocomplete="off" aria-label="第${q.number}問の回答記入欄"><div class="hint">A-Eのみ保存</div></div><div><label for="memo-${q.number}">メモ欄</label><textarea id="memo-${q.number}" data-q="${q.number}" aria-label="第${q.number}問のメモ欄"></textarea></div></div></article>`).join('');QUESTIONS.forEach(q=>{const a=$(`#answer-${q.number}`),m=$(`#memo-${q.number}`);a.value=normalize(state.answers[q.number]||'');m.value=state.memos[q.number]||'';updateChoice(q.number)})}function renderExplanations(){$('#explanations-root').innerHTML=QUESTIONS.map(q=>`<article class="explain-card"><h3><span class="qno">第${q.number}問</span></h3><p><span class="theme-pill">関連テーマ：${esc(q.theme)}</span> <span class="judge blank" data-judge="${q.number}">未回答</span></p><div class="reprint"><p class="stem">${esc(q.stem)}</p><ol type="A">${LETTERS.map(L=>`<li>${esc(q.choices[L])}</li>`).join('')}</ol></div><p><strong>答案者の回答：</strong><span data-exam-answer="${q.number}">未回答</span></p><p><strong>正答：</strong>${q.correct.join('')}</p>${LETTERS.map(L=>`<div class="option-comment ${q.correct.includes(L)?'correct':''}"><strong>${L}：</strong>${esc(q.comments[L])}</div>`).join('')}<h4>根拠文献</h4><ul class="refs">${q.refs.map(r=>`<li>${esc(r)}</li>`).join('')}</ul></article>`).join('');QUESTIONS.forEach(q=>updateJudge(q.number))}function setAnswer(n,v){const ans=normalize(v);if(ans)state.answers[n]=ans;else delete state.answers[n];const input=$(`#answer-${n}`);if(input&&input.value!==ans)input.value=ans;updateChoice(n);updateJudge(n);renderSummary();save()}function toggle(n,L){const cur=new Set(normalize(state.answers[n]||'').split('').filter(Boolean));cur.has(L)?cur.delete(L):cur.add(L);setAnswer(n,LETTERS.filter(x=>cur.has(x)).join(''))}function setMemo(n,v){state.memos[n]=v;renderSummary();save()}function updateChoice(n){const ans=normalize(state.answers[n]||'');document.querySelectorAll(`.choice[data-q="${n}"]`).forEach(btn=>{const on=ans.includes(btn.dataset.choice);btn.classList.toggle('selected',on);btn.setAttribute('aria-pressed',on?'true':'false')})}function updateJudge(n){const q=QUESTIONS.find(x=>x.number===Number(n));if(!q)return;const ans=normalize(state.answers[n]||''),a=document.querySelector(`[data-exam-answer="${n}"]`),j=document.querySelector(`[data-judge="${n}"]`);if(a)a.textContent=ans||'未回答';if(j){const ok=ans&&same(ans,q.correct);j.className='judge '+(!ans?'blank':ok?'ok':'bad');j.textContent=!ans?'未回答':ok?'正解':'不正解'}}function renderSummary(){$('#summary-root').innerHTML=QUESTIONS.map(q=>{const ans=normalize(state.answers[q.number]||'')||'未回答',memo=state.memos[q.number]||'';return `<div class="summary-item"><strong>第${q.number}問</strong>
回答：${esc(ans)}
メモ：${esc(memo||'なし')}</div>`}).join('')}function summaryText(){return QUESTIONS.map(q=>{const ans=normalize(state.answers[q.number]||'')||'未回答';const memo=state.memos[q.number]||'なし';return '第'+q.number+'問\n回答：'+ans+'\nメモ：'+memo}).join('\n\n')}async function copySummary(){const t=summaryText(),s=$('#copy-status');try{if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(t);s.textContent='コピーしました。';return}}catch(e){}const ta=document.createElement('textarea');ta.value=t;ta.readOnly=true;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();try{s.textContent=document.execCommand('copy')?'コピーしました。':'コピーできませんでした。'}catch(e){s.textContent='コピーできませんでした。'}document.body.removeChild(ta)}function clearAll(){if(!confirm('入力内容をすべて消去します。よろしいですか？'))return;state={answers:{},memos:{}};try{localStorage.removeItem(STORAGE_KEY)}catch(e){}QUESTIONS.forEach(q=>{const a=$(`#answer-${q.number}`),m=$(`#memo-${q.number}`);if(a)a.value='';if(m)m.value='';updateChoice(q.number);updateJudge(q.number)});renderSummary();save()}document.addEventListener('DOMContentLoaded',()=>{load();renderQuestions();renderSummary();renderExplanations();document.addEventListener('click',e=>{const b=e.target.closest('.choice');if(b)toggle(Number(b.dataset.q),b.dataset.choice)});document.addEventListener('input',e=>{if(e.target.classList.contains('answer-input'))setAnswer(Number(e.target.dataset.q),e.target.value);if(e.target.tagName==='TEXTAREA')setMemo(Number(e.target.dataset.q),e.target.value)});document.addEventListener('keydown',e=>{if(e.target.classList.contains('choice')&&(e.key===' '||e.key==='Enter')){e.preventDefault();toggle(Number(e.target.dataset.q),e.target.dataset.choice)}});$('#copy-btn').addEventListener('click',copySummary);$('#clear-btn').addEventListener('click',clearAll)});</script></body></html>
