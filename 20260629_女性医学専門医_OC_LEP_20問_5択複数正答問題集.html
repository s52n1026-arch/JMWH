<style>
:root{--bg:#f4f6f8;--paper:#fff;--ink:#18202a;--muted:#5e6875;--line:#d9e0e8;--brand:#12626f;--brand-2:#7a4a11;--soft:#e8f4f6;--soft-2:#fff6e8;--ok:#16663f;--bad:#a03535;--warn:#7a5b00;--focus:#f3c94c}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;line-height:1.72;letter-spacing:0}
header,main section{max-width:1080px;margin:0 auto;padding:24px 18px}

.qno{display:inline-flex;min-width:4.7rem;justify-content:center;border:1px solid var(--brand);color:var(--brand);border-radius:999px;padding:2px 10px;font-weight:800}

.choice .letter{font-weight:900;color:var(--brand)}
.choice.selected .letter:after{content:"選択中";display:block;font-size:.68rem;color:var(--ok);font-weight:800}
.answer-row{display:grid;grid-template-columns:minmax(130px,190px) 1fr;gap:14px;margin-top:14px}
label{display:block;font-weight:800;margin-bottom:5px}
.answer-input{width:100%;max-width:190px;border:1px solid var(--line);border-radius:8px;padding:9px;font:inherit;font-weight:900;text-transform:uppercase;background:white;letter-spacing:0}
textarea{width:100%;min-height:88px;border:1px solid var(--line);border-radius:8px;padding:10px;font:inherit;resize:vertical;background:white}
button:focus-visible,input:focus-visible,textarea:focus-visible{outline:3px solid var(--focus);outline-offset:2px}
.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:14px}
.btn{border:1px solid var(--brand);border-radius:8px;background:var(--brand);color:white;padding:9px 14px;font:inherit;font-weight:800;cursor:pointer}
.btn.secondary{background:white;color:var(--brand)}
.notice{border:1px solid #e1c668;background:#fff8df;color:#5f4500;border-radius:8px;padding:10px 12px;margin-top:12px}
.summary-grid{display:grid;gap:10px}
.summary-item{border-top:1px solid var(--line);padding:10px 0;white-space:pre-wrap}
.summary-item:first-child{border-top:0}
.judge{display:inline-block;border-radius:999px;padding:2px 9px;font-weight:900;margin-left:6px}
.judge.ok{color:var(--ok);background:#e7f5ec}
.judge.bad{color:var(--bad);background:#fdecec}
.judge.blank{color:var(--warn);background:#fff3cd}
.theme-pill{display:inline-block;background:var(--soft-2);border:1px solid #e3cda7;color:#4f310a;border-radius:999px;padding:3px 9px;font-weight:800;font-size:.9rem}
.reprint{background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:12px;margin:10px 0}
.option-comment{border-left:4px solid var(--line);background:#fbfcfe;padding:9px 11px;margin:8px 0}
.option-comment.correct{border-left-color:var(--ok);background:#f0fbf5}
.key-point{border-left:4px solid var(--brand-2);background:#fffaf2;padding:10px 12px;margin:12px 0}
.refs li{margin:6px 0;overflow-wrap:anywhere}
@media(max-width:720px){header,main section{padding:18px 12px}.question-card,.summary-card,.explain-card{padding:14px}.choice{grid-template-columns:32px 1fr}.answer-row{grid-template-columns:1fr}.answer-input{max-width:none}}
@media print{body{background:white;font-size:10.5pt}header,main section{max-width:none;padding:12mm}.btn,.toolbar,#storage-warning{display:none!important}.question-card,.summary-card,.explain-card{box-shadow:none;page-break-inside:avoid;break-inside:avoid}.answers-section{break-before:page;page-break-before:always}h2,h3{page-break-after:avoid}.choice,.option-comment{break-inside:avoid}textarea{min-height:42px}}

<script>
const QUESTIONS=[
{number:1,theme:"処方前検査",stem:"27歳女性。月経困難の治療目的でエストロゲンを含む低用量配合薬を初回処方する。健康な非喫煙者で既往歴に特記すべきことはない。開始前評価として最も正しいものを選べ。",choices:{A:"BMI測定は医学的適格性判定に必須で、測定できない場合は処方を延期する。",B:"血圧測定は安全な開始のために必須であり、体重・BMIは体重変化の相談材料として有用である。",C:"血糖、脂質、肝機能、凝固系検査を全例で実施し、結果確認後に開始する。",D:"双合診、頸部細胞診、乳房診察は全例で必須であり、省略すると安全性が評価できない。",E:"収縮期150mmHgまたは拡張期95mmHgなら、軽度高血圧なので通常通り開始してよい。"},correct:["B"],point:"処方前に必ず押さえるのは血圧。BMIは記録として有用だが、BMI測定そのものは適格性判定の必須条件ではない。血圧140/90mmHg以上はリスク評価で立ち止まる。",comments:{A:"誤り。肥満例でも多くは使用可能で、BMIは体重変化の相談に役立つ位置づけである。",B:"正しい。血圧は必須。BMIはベースラインとして有用だが、処方可否の必須検査ではない。",C:"誤り。健康な人に全例ルーチン採血を求める必要はない。",D:"誤り。内診や細胞診は避妊・治療薬開始の安全性判定に必須ではない。",E:"誤り。140-159/90-99mmHgは一般に使用を避ける方向の分類で、160/100mmHg以上は禁忌相当である。"},review:"血圧は必須。BMIは便利。採血、内診、頸部細胞診、STI検査を処方の前提にしない。",refs:["CDC. Combined Hormonal Contraceptives. https://www.cdc.gov/contraception/hcp/usspr/combined-hormonal-contraceptives.html","CDC. U.S. Medical Eligibility Criteria for Contraceptive Use, 2024. https://www.cdc.gov/mmwr/volumes/73/rr/rr7304a1.htm"]},
{number:2,theme:"内服開始タイミング",stem:"妊娠していないことが合理的に確認できる患者に、エストロゲンを含む低用量配合薬を開始する。開始日と追加避妊の説明として正しいものを全て選べ。",choices:{A:"月経開始から5日以内に開始する場合、原則として追加避妊は不要である。",B:"月経開始から5日を超えて開始しても、当日から避妊効果は完成しているため追加避妊は不要である。",C:"卵胞径が10mm程度になるまで待って開始する方が、早期開始より排卵抑制は確実である。",D:"月経開始から5日を超えて開始する場合、7日間はコンドーム等の追加避妊を勧める。",E:"周期途中での開始は常に禁忌であり、次回月経まで待つ必要がある。"},correct:["A","D"],point:"月経5日目までなら追加避妊不要。5日を超えたら7日連続内服まで追加避妊。早く始めるほど卵胞発育後の排卵リスクを下げやすい。",comments:{A:"正しい。月経開始5日以内の開始では追加避妊は不要と整理する。",B:"誤り。5日を超えたら7日間の追加避妊が必要である。",C:"誤り。卵胞活動が進む前に始める方が排卵リスクは低い。",D:"正しい。7日間連続でホルモン薬を服用するまで追加避妊を行う。",E:"誤り。妊娠が合理的に否定できればクイックスタートも可能である。"},review:"5日以内は追加なし。5日超は7日追加。卵胞発育を待たない。",refs:["CDC. U.S. Selected Practice Recommendations for Contraceptive Use, 2024. https://www.cdc.gov/mmwr/volumes/73/rr/rr7303a1.htm","CDC. Combined Hormonal Contraceptives. https://www.cdc.gov/contraception/hcp/usspr/combined-hormonal-contraceptives.html"]},
{number:3,theme:"連続投与",stem:"月経困難症の治療で、休薬期間を短縮または延長する製剤について説明する。国内で用いられる代表的な投与設計として正しいものを選べ。",choices:{A:"狭義の連続投与とは、国内では21日投与を指す。",B:"24日実薬・4日休薬の設計はジェミーナの特徴である。",C:"21日投与を基本に、24日設計、77日までの連続、120日までの連続というように製剤ごとに投与期間が分かれる。",D:"国内の低用量配合薬は、すべて1年以上の無休薬連続投与を標準として承認されている。",E:"120日まで延長する製剤では、休薬を完全に廃止しても破綻出血への対応は不要である。"},correct:["C"],point:"国内では21日投与が基本。24日設計はヤーズ、77日連続はジェミーナ、120日まで延長はヤーズフレックスとして整理する。",comments:{A:"誤り。狭義の連続投与は長期無休薬投与を指すことが多い。",B:"誤り。24/4設計はヤーズの特徴である。",C:"正しい。国内では製剤ごとに投与期間の設計が分かれている。",D:"誤り。1年以上の無休薬投与が国内標準ではない。",E:"誤り。延長投与では破綻出血の説明と対応が必要になる。"},review:"21、24、77、120日。製剤名と投与設計をセットで覚える。",refs:["添付メモ: 連続投与について","CDC. Combined Hormonal Contraceptives, bleeding irregularities with extended or continuous use. https://www.cdc.gov/contraception/hcp/usspr/combined-hormonal-contraceptives.html"]},
{number:4,theme:"飲み忘れ",stem:"28日周期の低用量配合薬を使用中の患者から、予定時刻からの遅れや複数日の未服用について相談された。避妊効果を意識した説明として正しいものを全て選べ。",choices:{A:"1錠の遅れや1錠の未服用では、その周期はただちに中止して次回月経を待つ。",B:"1錠の遅れまたは1錠の未服用なら、気づいた時点で服用し、通常時刻の分も服用してよい。追加避妊は通常不要である。",C:"2錠以上の未服用でも、過去の分をすべて一度に服用すれば追加避妊は不要である。",D:"第1週に2錠以上未服用があり無防備性交があっても、緊急避妊は検討しない。",E:"第3週に2錠以上未服用があれば、ホルモン休薬期間を置かず次シートへ進めることを考える。"},correct:["B","E"],point:"1錠ならすぐ飲んで通常ペースに戻る。2錠以上は直近の未服用分を飲み、7日間追加避妊。第1週なら緊急避妊、第3週なら休薬を飛ばす発想。",comments:{A:"誤り。1錠で中止する必要はない。",B:"正しい。1錠の遅れ・未服用では同日2錠になってもよい。",C:"誤り。過去分を全部まとめて飲むのではなく、直近の未服用分を飲んで7日間追加避妊を行う。",D:"誤り。第1週の複数未服用かつ無防備性交では緊急避妊を考える。",E:"正しい。第3週では休薬期間をなくして7日連続内服を保つ。"},review:"1錠は戻す。2錠以上は7日追加。第1週は緊急避妊、第3週は休薬飛ばし。",refs:["CDC. Combined Hormonal Contraceptives, late or missed doses. https://www.cdc.gov/contraception/hcp/usspr/combined-hormonal-contraceptives.html"]},
{number:5,theme:"AUS後の開始",stem:"妊娠初期の人工妊娠中絶後、発熱や敗血症所見はなく処置が完了した。今後の避妊としてエストロゲンを含む低用量配合薬を希望している。正しい説明を選べ。",choices:{A:"中絶後は血栓症リスクが高いため、少なくとも6週間は開始してはならない。",B:"子宮内操作後は感染予防のため、次回月経までホルモン薬は禁忌である。",C:"処置後すぐに開始すると奇形リスクがあるため、妊娠反応が完全に陰性化するまで待つ。",D:"合併症のない中絶後であれば、処置完了後ただちに開始できる。",E:"薬剤による中絶後は、避妊法の開始は常に2週間以上遅らせる。"},correct:["D"],point:"合併症のない中絶後は、英国・米国・WHO系の整理でも低用量配合薬は直後開始可能。IUDは敗血症性中絶では別扱い。",comments:{A:"誤り。産後とは異なり、合併症のない中絶後に6週間待機は不要である。",B:"誤り。感染がなければホルモン薬は直後開始できる。",C:"誤り。妊娠反応の陰性化を待つ必要はない。",D:"正しい。処置完了後または薬剤中絶開始時点から開始可能と整理される。",E:"誤り。薬剤中絶でも一律に遅らせる必要はない。"},review:"AUS後はすぐ開始可。産後6週ルールと混同しない。",refs:["CDC. U.S. Medical Eligibility Criteria for Contraceptive Use, 2024 Appendices, postabortion. https://www.cdc.gov/mmwr/volumes/73/rr/rr7304a1_appendix.htm"]},
{number:6,theme:"産後開始",stem:"産後の女性が、エストロゲンを含む低用量配合薬の再開時期を相談している。産褥期の血栓リスクと授乳を踏まえた説明として正しいものを全て選べ。",choices:{A:"非授乳であっても産後21日未満は、血栓リスクのため使用すべきでない。",B:"授乳中でも産後直後からエストロゲンを含む配合薬を第一選択として開始する。",C:"産後42日を超えると、非授乳では医学的適格性の制限は大きく下がる。",D:"授乳中のエストロゲン含有薬は、児や乳汁への配慮が不要なので産後2週で標準開始する。",E:"産後3週を過ぎれば、血栓リスク因子の有無にかかわらず全例で通常開始できる。"},correct:["A","C"],point:"産後1-6週はVTEリスクが高い。非授乳でも21日未満は避ける。授乳中は少なくとも6か月程度避けるという試験的整理と、CDCの産後日数・授乳別分類を分けて理解する。",comments:{A:"正しい。非授乳でも21日未満はCHCカテゴリー4である。",B:"誤り。授乳中の直後開始は避ける。",C:"正しい。非授乳で42日を超えるとCHCカテゴリー1となる。",D:"誤り。授乳中は乳汁・児への配慮とVTE時期を考える。",E:"誤り。21-42日ではVTEリスク因子があると制限が強くなる。"},review:"非授乳でも21日未満はだめ。42日超で制限低下。授乳中はさらに慎重。",refs:["CDC. U.S. Medical Eligibility Criteria for Contraceptive Use, 2024 Appendices, breastfeeding and postpartum. https://www.cdc.gov/mmwr/volumes/73/rr/rr7304a1_appendix.htm"]},
{number:7,theme:"手術の休薬",stem:"33歳女性。全身麻酔下で90分程度の骨盤内手術を予定し、術後もしばらく安静が必要と見込まれる。エストロゲンを含む低用量配合薬を服用中である。周術期対応として最も適切なものを選べ。",choices:{A:"小手術か大手術かにかかわらず、術当日の朝まで服用を継続するのが原則である。",B:"短時間手術でも長時間手術でも、術後の離床状況は血栓リスク評価に関係しない。",C:"術後の不動化を伴う手術では、休薬より増量して消退出血を抑える方が安全である。",D:"休薬する場合でも、手術前日から中止すれば血栓リスク低下には十分である。",E:"長時間または術後不動化を伴う大きな手術では、術前4週間程度の中止を検討する。"},correct:["E"],point:"メモ上は45分超なら4週間休薬。CDC分類では長期不動化を伴う大手術でCHCカテゴリー4。手術時間だけでなく不動化を含めて判断する。",comments:{A:"誤り。大手術・不動化では中止を検討する。",B:"誤り。不動化はVTEリスクの中心である。",C:"誤り。エストロゲン増量は血栓リスクを下げない。",D:"誤り。血栓リスク低減目的なら前日中止では遅い。",E:"正しい。4週間程度前からの休薬を考える。"},review:"長時間・不動化ありなら4週前休薬を考える。小手術・不動化なしとは別。",refs:["CDC. U.S. Medical Eligibility Criteria for Contraceptive Use, 2024 Appendices, surgery. https://www.cdc.gov/mmwr/volumes/73/rr/rr7304a1_appendix.htm","添付メモ: 手術の休薬は45分超えるなら4週間休薬"]},
{number:8,theme:"消退出血がない時",stem:"周期的に実薬と休薬を繰り返す低用量配合薬を使用している患者が、今回の休薬期間に出血がないと相談した。説明として正しいものを全て選べ。",choices:{A:"休薬時出血がない場合、妊娠は薬理学的に完全に否定できる。",B:"服薬状況や性交歴を確認し、必要に応じて妊娠反応を確認する。",C:"無出血は必ず重篤な内膜病変を意味するため、全例で直ちに内膜掻爬を行う。",D:"メモ上は出血欠如は少数であり、まれな変化として説明しつつ見逃してはいけないのは妊娠である。",E:"出血がない時は、次周期からエストロゲン量を自己判断で倍量にする。"},correct:["B","D"],point:"消退出血がない時はまず妊娠反応。出血欠如は起こり得るが、妊娠を除外するという実務が試験で問われる。",comments:{A:"誤り。妊娠は完全には否定できない。",B:"正しい。妊娠反応を確認する。",C:"誤り。全例で侵襲的検査ではない。",D:"正しい。まれな変化として説明しつつ、妊娠確認を忘れない。",E:"誤り。自己判断で増量しない。"},review:"休薬時に出血なし。まず妊娠反応。",refs:["添付メモ: OC内服中で消退出血がない時は妊娠反応","CDC. U.S. Selected Practice Recommendations for Contraceptive Use, 2024. https://www.cdc.gov/mmwr/volumes/73/rr/rr7303a1.htm"]},
{number:9,theme:"希発月経・無月経への使用",stem:"18歳女性。半年以上の希発月経、低体重、疲労骨折歴があり、低エストロゲン状態が疑われる。月経困難の訴えは乏しい。エストロゲン量の少ない低用量配合薬を漫然と開始する方針について正しいものを選べ。",choices:{A:"低エストロゲン状態の評価や原因介入を優先し、20μg程度のエチニルエストラジオール製剤だけで骨・内分泌問題を解決しようとしない。",B:"低用量配合薬を開始すれば、血清E2・FSH・LHは自然周期の評価に使いやすくなる。",C:"無月経なら妊娠の可能性はないため、開始前の妊娠確認は不要である。",D:"骨密度低下が疑われる時ほど、栄養評価や運動負荷の確認は不要になる。",E:"原発性無月経でも二次性無月経でも、超低用量製剤だけで鑑別診断は完了する。"},correct:["A"],point:"希発月経・無月経では、低用量配合薬で見かけの出血を作るだけでは不十分。低体重、視床下部性、PCOS、甲状腺、PRL、妊娠などを評価する。",comments:{A:"正しい。原因評価と十分なエストロゲン環境、栄養・骨の視点を優先する。",B:"誤り。内服中はE2・FSH・LHが抑制され、自然周期評価には不向きである。",C:"誤り。無月経でも妊娠を確認する。",D:"誤り。栄養・運動負荷・骨評価が重要である。",E:"誤り。製剤開始で鑑別診断は完了しない。"},review:"無月経に低用量をかぶせない。原因、骨、妊娠確認。",refs:["ASRM Practice Committee. Current evaluation of amenorrhea: a committee opinion, 2024. https://www.asrm.org/practice-guidance/practice-committee-documents/current-evaluation-of-amenorrhea-a-committee-opinion-2024/","添付メモ: 希発月経、無月経へのLEP,CO"]},
{number:10,theme:"EEとE2の違い",stem:"同じエストロゲン受容体を刺激する薬剤でも、避妊・月経困難治療で用いられる合成エストロゲンと、更年期症状緩和で用いる天然型エストロゲンでは臨床像が異なる。正しいものを全て選べ。",choices:{A:"エチニル基をもつ薬剤は肝代謝を全く受けないため、薬物相互作用を考えなくてよい。",B:"天然型エストラジオールは経口投与でも初回通過をほぼ受けず、常に排卵抑制が安定する。",C:"受容体は共通でも、薬物動態、肝曝露、代謝、酵素相互作用の差で臨床的な見え方が変わる。",D:"経皮エストラジオールを使えば、低用量配合薬と同等の安定した避妊効果を簡単に得られる。",E:"合成エストロゲンは少量でも経口活性と肝作用が強く、SHBG、アンジオテンシノーゲン、CRPなどに影響しうる。"},correct:["C","E"],point:"EEとE2は作用受容体だけでなく、経口活性、初回通過、肝作用、CYP相互作用で分ける。更年期は症状緩和なのでE2が扱いやすい。",comments:{A:"誤り。EEはCYP3A4で代謝され、相互作用も考える。",B:"誤り。E2は経口でE1/E1Sへ流れやすく、排卵抑制目的では不安定になりやすい。",C:"正しい。同じER刺激でも薬物動態と肝曝露が違う。",D:"誤り。経皮E2で安定した避妊製剤を簡単に作れるわけではない。",E:"正しい。少量でも肝タンパク産生などに影響しうる。"},review:"同じER、違う薬物動態。EEは少量で強く、肝作用が強い。",refs:["添付メモ: EEとE2の違い","CDC. U.S. MEC 2024 Appendices, drug interactions. https://www.cdc.gov/mmwr/volumes/73/rr/rr7304a1_appendix.htm"]},
{number:11,theme:"EEとCEEの違い",stem:"名称が似た2種類のエストロゲン製剤について説明する。合成単一成分と混合製剤の整理として最も正しいものを選べ。",choices:{A:"エチニルエストラジオールと結合型エストロゲンは、どちらも同一の単一合成エストロゲンである。",B:"エチニルエストラジオールは17α位にエチニル基をもつ単一の合成エストロゲンで、結合型エストロゲンは複数のエストロゲン硫酸抱合体を含む混合物として整理する。",C:"結合型エストロゲンは低用量配合薬の標準成分であり、避妊目的の主役である。",D:"結合型エストロゲンは常に血栓関連マーカーに中立で、経口E2より不利になることはない。",E:"両者の代表用量は同じマイクログラム単位で比較すれば臨床的に完全に同等である。"},correct:["B"],point:"EEは単一合成エストロゲン。CEEはestrone sulfate、equilin sulfateなどを含む混合物。名称の近さに引っ張られない。",comments:{A:"誤り。CEEは混合物である。",B:"正しい。構造と中身を分けて覚える。",C:"誤り。CEEは避妊目的の低用量配合薬の標準主役ではない。",D:"誤り。経口CEEは一部凝固関連マーカーで不利な報告がある。",E:"誤り。用量単位だけでは等価比較できない。"},review:"EEは単一合成。CEEは混合物。名前の雰囲気で同一視しない。",refs:["添付メモ: EEとCEEの違い","Scarabin PY. Progestogens and venous thromboembolism in menopausal women. Climacteric. 2018. https://doi.org/10.1080/13697137.2018.1439914"]},
{number:12,theme:"感染症・検査",stem:"低用量配合薬を希望する22歳女性。新しい性交パートナーがいるが無症状で、処方当日に来院した。開始前の検査と予防医療の位置づけとして正しいものを全て選べ。",choices:{A:"クラミジア検査の結果が陰性と判明するまで、薬剤開始は必ず延期する。",B:"無症状のクラミジア陽性は自然軽快を待つため、治療もパートナー対応も不要である。",C:"ホルモン薬は性感染症を予防するため、コンドーム指導は省略してよい。",D:"若年またはリスクのある女性では、クラミジアや淋菌のスクリーニングを予防医療として考える。",E:"STI検査は配合薬の安全な開始に必須ではないが、リスクに応じて同日実施し、開始を不必要に遅らせない。"},correct:["D","E"],point:"処方前安全性としての必須検査と、若年・ハイリスク女性へのSTIスクリーニングは別枠。クラミジア頸管炎はハイリスクなら拾う。",comments:{A:"誤り。STI検査結果待ちを処方開始の必須条件にしない。",B:"誤り。クラミジア陽性は無症状でも治療対象である。",C:"誤り。ホルモン薬はSTIを防がない。",D:"正しい。25歳未満またはリスクありではスクリーニングを考える。",E:"正しい。安全な開始の必須検査ではないが、予防医療として同日実施できる。"},review:"STI検査は処方の足止めではない。ハイリスクのクラミジアは別に拾う。",refs:["CDC. STI Screening Recommendations. https://www.cdc.gov/std/treatment-guidelines/screening-recommendations.htm","CDC. Combined Hormonal Contraceptives, examinations and tests before initiation. https://www.cdc.gov/contraception/hcp/usspr/combined-hormonal-contraceptives.html"]},
{number:13,theme:"薬物相互作用",stem:"低用量配合薬を服用中の患者が、併用薬について相談した。避妊効果または併用薬濃度に関する説明として最も正しいものを選べ。",choices:{A:"リファンピシンはCYP3A4を阻害するため、エチニルエストラジオール濃度を上げて副作用を増やすのが主問題である。",B:"広域抗菌薬はほとんどすべて避妊効果を大きく下げるため、全例で長期代替避妊が必要である。",C:"リファンピシンまたはリファブチンは、配合薬の効果を下げる可能性があり、長期使用では他の避妊法を勧める。",D:"SSRIは配合薬の効果を大きく下げるため、うつ病治療中は一律に禁忌である。",E:"三環系抗うつ薬は配合薬で濃度が下がるので、効果不足だけを心配すればよい。"},correct:["C"],point:"リファンピシンは酵素誘導で避妊効果低下が問題。抗てんかん薬も相互作用に注意。SSRIは大きな相互作用を通常考えにくい。三環系は濃度上昇・安全性にも注意。",comments:{A:"誤り。リファンピシンは主に酵素誘導で効果低下が問題になる。",B:"誤り。多くの広域抗菌薬では臨床的に重要な避妊効果低下は示されていない。",C:"正しい。長期使用では他法を勧める。COCを選ぶならEE 30μg以上などの整理がある。",D:"誤り。SSRIは通常、避妊効果を大きく下げる薬ではない。",E:"誤り。三環系などCYP1A2基質では濃度上昇による安全性懸念を考える。"},review:"リファンピシン、酵素誘導、避妊効果低下。三環系は濃度上昇側にも注意。",refs:["CDC. U.S. MEC 2024 Appendices, drug interactions. https://www.cdc.gov/mmwr/volumes/73/rr/rr7304a1_appendix.htm"]},
{number:14,theme:"嘔吐・下痢",stem:"低用量配合薬を服用中に胃腸炎となった患者から相談があった。吸収不良や追加避妊の説明として正しいものを全て選べ。",choices:{A:"服用後およそ3時間以内の嘔吐では、添付文書・試験的整理として1錠追加を考える。",B:"嘔吐または重い下痢が48時間以上続く場合、可能なら内服を続け、症状改善後7日間は追加避妊を行う。",C:"服用後25時間で1回嘔吐しただけでも、必ず同じ錠剤を追加服用し、以後1か月は避妊効果がない。",D:"下痢があれば軽症でも直ちにそのシートを中止し、次回月経まで再開しない。",E:"第1週に48時間以上の胃腸症状があり無防備性交があっても、緊急避妊は検討しない。"},correct:["A","B"],point:"日本の実務では服用後短時間の嘔吐を飲み忘れに準じて追加服用と教えることがある。CDCは24時間未満なら追加不要、48時間以上なら7日追加避妊という整理。矛盾はガイドライン差として解説する。",comments:{A:"正しい。メモでは3時間以内ならもう1錠という試験的整理を採用する。",B:"正しい。CDC SPRでは48時間以上続く場合、改善後7日間追加避妊を行う。",C:"誤り。25時間後の単回嘔吐で1か月無効とはしない。",D:"誤り。軽症下痢で一律中止ではない。",E:"誤り。第1週で無防備性交がある場合は緊急避妊を考える。"},review:"短時間嘔吐は追加1錠。48時間以上の胃腸症状は7日追加避妊。",refs:["CDC. Combined Hormonal Contraceptives, vomiting or severe diarrhea while using COCs. https://www.cdc.gov/contraception/hcp/usspr/combined-hormonal-contraceptives.html","添付メモ: 嘔吐や下痢の時"]},
{number:15,theme:"服用できる年齢",stem:"低用量配合薬の年齢に関する説明として、思春期から閉経移行期までを通した整理で最も適切なものを選べ。",choices:{A:"初経前から骨成長抑制を気にせず治療目的で標準開始する。",B:"初経後であっても、14歳未満ではどの国の基準でも絶対禁忌である。",C:"低用量配合薬は骨密度に一切影響しないことが確立しており、若年者で骨の話は不要である。",D:"初経発来後から使用を検討できるが、閉経移行期ではおおむね50歳を目安に心血管リスクを見直し、IUDなども選択肢に入れる。",E:"50歳以降も血圧、喫煙、片頭痛、血栓リスクの評価なしに同じ処方を継続する。"},correct:["D"],point:"開始は初経後から。初経前投与で骨端線閉鎖の問題を考える。終了側は50歳目安で心血管リスクを再評価し、IUD等を考える。",comments:{A:"誤り。初経前に標準開始する薬ではない。",B:"誤り。海外では14歳以上などの実務基準があるが、初経後かどうかが重要である。",C:"誤り。骨密度への影響は議論があり、骨折リスクまでの確定は別問題である。",D:"正しい。初経後から検討し、50歳前後ではリスクを見直す。",E:"誤り。高年齢では心血管リスク評価が重要である。"},review:"初経後から、50歳目安で見直し。若年は骨、高年齢は血管。",refs:["添付メモ: 何歳から服用できるか、何歳まで投与可能か","CDC. U.S. MEC 2024, categories and cardiovascular risk framing. https://www.cdc.gov/mmwr/volumes/73/rr/rr7304a1.htm"]},
{number:16,theme:"妊孕性",stem:"数年間の低用量配合薬使用を中止し、妊娠希望となった患者へ説明する。将来の妊娠しやすさと疾患治療目的の違いについて正しいものを全て選べ。",choices:{A:"長期使用そのものが将来の妊孕性を低下させるとは考えにくい。",B:"服用中止後は排卵再開まで必ず1年以上かかるため、不妊検査は常に待機する。",C:"子宮内膜症に対する内服治療は、治療中に妊孕性を直接改善して妊娠率を大きく上げる。",D:"中止後に月経が再開しなければ、妊娠の可能性はないので検査不要である。",E:"多くは中止後数か月以内に排卵が再開し、メモでは3か月以内に約90%という整理で覚える。"},correct:["A","E"],point:"長期服用で妊孕性を下げない。中止後は比較的早く排卵再開。内膜症治療は疼痛や病勢制御であり、妊孕性改善薬と短絡しない。",comments:{A:"正しい。長期服用が妊孕性を障害するとは考えにくい。",B:"誤り。多くは数か月以内に排卵が戻る。",C:"誤り。内膜症の内服治療は妊孕性改善を直接目的にするものではない。",D:"誤り。無月経なら妊娠確認も必要である。",E:"正しい。3か月以内に多くが排卵再開するという整理でよい。"},review:"妊孕性は下がらない。3か月以内に多くが排卵再開。内膜症の妊孕性改善とは別。",refs:["添付メモ: 妊孕性","Barnhart KT, Schreiber CA. Return to fertility following discontinuation of oral contraceptives. Fertil Steril. 2009. https://doi.org/10.1016/j.fertnstert.2009.06.063"]},
{number:17,theme:"過多月経",stem:"月経量が多く貧血も伴う患者に、避妊希望を含めた治療選択を説明する。薬物・デバイスの位置づけとして最も正しいものを選べ。",choices:{A:"過多月経ではレボノルゲストレル放出子宮内システムが強力な選択肢で、低用量配合薬は有効だが第一選択を常に置き換えるほどではない。",B:"低用量配合薬は過多月経に対してプラセボと差がないため、選択肢に入らない。",C:"レボノルゲストレル放出子宮内システムは出血量を増やすため、過多月経では禁忌である。",D:"過多月経では避妊希望の有無にかかわらず、全例で子宮摘出が第一選択である。",E:"貧血や器質性疾患の評価は治療選択に影響しないため不要である。"},correct:["A"],point:"過多月経に低用量配合薬は効くが、ミレーナがより強力な選択肢。貧血や器質性疾患を確認しながら選ぶ。",comments:{A:"正しい。LNG-IUSは強力で、低用量配合薬も有効な選択肢である。",B:"誤り。低用量配合薬も過多月経を改善しうる。",C:"誤り。LNG-IUSは月経血量を減らす。",D:"誤り。妊孕性、希望、原因に応じて保存的治療を考える。",E:"誤り。貧血や筋腫・腺筋症などの評価は重要である。"},review:"過多月経はLNG-IUSが強い。低用量配合薬も効くが位置づけを間違えない。",refs:["NICE. Heavy menstrual bleeding: assessment and management. NG88. https://www.nice.org.uk/guidance/ng88","添付メモ: 過多月経に対するLEPの立ち位置"]},
{number:18,theme:"PMDD",stem:"月経前の気分症状と浮腫感が強く、日常生活に支障がある患者に、低用量配合薬の選択肢を説明する。薬剤特性として最も正しいものを選べ。",choices:{A:"月経前不快気分症状には、どの黄体ホルモンでも同じ効果なので製剤差は考えない。",B:"ドロスピレノンはアンドロゲン作用が強いため、にきびや浮腫を悪化させやすい。",C:"ドロスピレノン含有24/4設計は、抗アルドステロン作用・抗アンドロゲン作用とホルモン変動の小ささから選択肢になる。",D:"休薬期間を長くするほどホルモン変動が少なくなり、月経前症状は必ず軽くなる。",E:"気分症状が主訴なら、妊娠希望や自殺念慮の確認は不要で薬剤だけ決めればよい。"},correct:["C"],point:"PMDDではDRSP含有製剤、特に24/4設計を押さえる。スピロノラクトン類似の抗アルドステロン作用、抗アンドロゲン作用がポイント。",comments:{A:"誤り。DRSPなど製剤差が問われる。",B:"誤り。DRSPは抗アンドロゲン作用をもつ。",C:"正しい。ヤーズの設計とDRSPの特性がPMDDで問われる。",D:"誤り。休薬が長いほどホルモン低下が大きくなる。",E:"誤り。気分症状では安全評価と精神科的リスク確認も大切である。"},review:"PMDDはDRSP、24/4、抗アルドステロン、抗アンドロゲン。",refs:["添付メモ: PMDDに対してはDRSP","Yonkers KA, et al. Efficacy of a new low-dose oral contraceptive with drospirenone in PMDD. Obstet Gynecol. 2005. https://doi.org/10.1097/01.AOG.0000163034.77215.2e"]},
{number:19,theme:"内服中のホルモン検査",stem:"49歳女性。低用量配合薬を継続中で、閉経が近いかどうかを血液検査で知りたいと希望している。検査値の解釈として最も適切なものを選べ。",choices:{A:"服用中の血清E2、FSH、LHは自然周期をそのまま反映するため、いつ測っても閉経判定に使える。",B:"服用中にFSHが低ければ、卵巣予備能が十分に保たれていると断定できる。",C:"服用中は排卵抑制がないため、LHサージを確認すれば閉経移行期かどうかが分かる。",D:"ホルモン検査のためには、必ず6か月以上中止してからでなければ意味がない。",E:"服用中はE2、FSH、LHが抑制されやすく、測るなら中止後しばらく置いてから評価するという整理にする。"},correct:["E"],point:"低用量配合薬中は視床下部-下垂体-卵巣系が抑制され、自然周期評価が難しい。メモでは中止後2週間程度あけて測る整理。",comments:{A:"誤り。服用中の値は自然周期を反映しにくい。",B:"誤り。低FSHは薬剤性抑制でも起きる。",C:"誤り。LHサージは抑制される。",D:"誤り。6か月が必須という整理ではない。",E:"正しい。中止後しばらく置いて評価する。"},review:"服用中のE2/FSH/LHは抑制。閉経評価にはそのまま使いにくい。",refs:["添付メモ: ホルモン検査は基本的に血清E2, FSH, LHは抑制されている","FSRH. Contraception for women aged over 40 years. https://www.fsrh.org/standards-and-guidance/documents/fsrh-guideline-contraception-for-women-aged-over-40-years-august-2017/"]},
{number:20,theme:"血管系リスク",stem:"39歳女性。月経困難に対してエストロゲンを含む低用量配合薬を希望している。血圧は複数回測定で142/92mmHg、喫煙なし、片頭痛なし。処方判断として最も正しいものを選べ。",choices:{A:"拡張期90mmHg台は正常範囲なので、血圧は処方判断に影響しない。",B:"140/90mmHg以上では血管系リスクを考え、開始前に血圧管理や他選択肢を検討する。",C:"160/100mmHg以上でも、低用量なら血栓・脳卒中リスクは上がらない。",D:"血圧を測定しない方が、急性心筋梗塞や脳卒中のリスク評価として安全である。",E:"血圧が高い場合でも、BMIが正常なら血管系リスクは相殺される。"},correct:["B"],point:"血圧140/90以下であることを確認する、というメモの核心。CDCでは140-159/90-99mmHgはCHCカテゴリー3、160/100mmHg以上または血管病変はカテゴリー4。",comments:{A:"誤り。拡張期90mmHg台はリスク評価に入る。",B:"正しい。血圧管理、プロゲスチン単独、IUDなどを検討する。",C:"誤り。160/100mmHg以上は禁忌相当である。",D:"誤り。血圧未測定で開始した群では心血管イベントリスクが高い報告がある。",E:"誤り。正常BMIで高血圧リスクは相殺されない。"},review:"140/90で立ち止まる。160/100は禁忌相当。血圧測定は家訓。",refs:["CDC. Combined Hormonal Contraceptives, blood pressure before initiation. https://www.cdc.gov/contraception/hcp/usspr/combined-hormonal-contraceptives.html","CDC. U.S. MEC 2024. https://www.cdc.gov/mmwr/volumes/73/rr/rr7304a1.htm"]}
];
const STORAGE_KEY="womens_med_20260629_oc_lep_20q_v1";
const LETTERS=["A","B","C","D","E"];
let state={answers:{},memos:{}};
let storageOk=true;
const $=s=>document.querySelector(s);
function esc(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
function normalize(v){const seen=new Set();String(v||"").toUpperCase().split("").forEach(ch=>{if(LETTERS.includes(ch))seen.add(ch)});return LETTERS.filter(ch=>seen.has(ch)).join("")}
function same(a,b){return normalize(a)===LETTERS.filter(ch=>b.includes(ch)).join("")}
function warn(m){const el=$("#storage-warning");el.hidden=false;el.textContent=m}
function load(){try{const raw=localStorage.getItem(STORAGE_KEY);if(raw)state=JSON.parse(raw);state.answers=state.answers||{};state.memos=state.memos||{}}catch(e){storageOk=false;warn("保存データを読み込めませんでした。")}}
function save(){if(!storageOk)return;try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));$("#save-status").textContent="保存しました。"}catch(e){storageOk=false;warn("localStorageへ保存できませんでした。")}}
function renderQuestions(){
  $("#questions-root").innerHTML=QUESTIONS.map(q=>`<article class="question-card" data-question="${q.number}"><h3><span class="qno">第${q.number}問</span></h3><p class="stem">${esc(q.stem)}</p><div class="choices" role="group" aria-label="第${q.number}問の選択肢">${LETTERS.map(L=>`<button type="button" class="choice" data-q="${q.number}" data-choice="${L}" aria-pressed="false"><span class="letter">${L}</span><span>${esc(q.choices[L])}</span></button>`).join("")}</div><div class="answer-row"><div><label for="answer-${q.number}">回答記入欄</label><input id="answer-${q.number}" class="answer-input" data-q="${q.number}" maxlength="5" inputmode="latin" autocomplete="off" aria-label="第${q.number}問の回答記入欄"><div class="hint">A-Eのみ保存</div></div><div><label for="memo-${q.number}">メモ欄</label><textarea id="memo-${q.number}" data-q="${q.number}" aria-label="第${q.number}問のメモ欄"></textarea></div></div></article>`).join("");
  QUESTIONS.forEach(q=>{const a=$(`#answer-${q.number}`),m=$(`#memo-${q.number}`);a.value=normalize(state.answers[q.number]||"");m.value=state.memos[q.number]||"";updateChoice(q.number)});
}
function renderExplanations(){
  $("#explanations-root").innerHTML=QUESTIONS.map(q=>`<article class="explain-card" data-explanation="${q.number}"><h3><span class="qno">第${q.number}問</span></h3><p><span class="theme-pill">関連テーマ：${esc(q.theme)}</span> <span class="judge blank" data-judge="${q.number}">未回答</span></p><div class="reprint"><p class="stem">${esc(q.stem)}</p><ol type="A">${LETTERS.map(L=>`<li>${esc(q.choices[L])}</li>`).join("")}</ol></div><p><strong>答案者の回答：</strong><span data-exam-answer="${q.number}">未回答</span></p><p><strong>正答：</strong>${q.correct.join("")}</p><div class="key-point"><strong>要点：</strong>${esc(q.point)}</div>${LETTERS.map(L=>`<div class="option-comment ${q.correct.includes(L)?"correct":""}"><strong>${L}：</strong>${esc(q.comments[L])}</div>`).join("")}<div class="key-point"><strong>30秒復習：</strong>${esc(q.review)}</div><h4>根拠・参照</h4><ul class="refs">${q.refs.map(r=>`<li>${esc(r)}</li>`).join("")}</ul></article>`).join("");
  QUESTIONS.forEach(q=>updateJudge(q.number));
}
function setAnswer(n,v){const ans=normalize(v);if(ans)state.answers[n]=ans;else delete state.answers[n];const input=$(`#answer-${n}`);if(input&&input.value!==ans)input.value=ans;updateChoice(n);updateJudge(n);renderSummary();save()}
function toggle(n,L){const cur=new Set(normalize(state.answers[n]||"").split("").filter(Boolean));cur.has(L)?cur.delete(L):cur.add(L);setAnswer(n,LETTERS.filter(x=>cur.has(x)).join(""))}
function setMemo(n,v){state.memos[n]=v;renderSummary();save()}
function updateChoice(n){const ans=normalize(state.answers[n]||"");document.querySelectorAll(`.choice[data-q="${n}"]`).forEach(btn=>{const on=ans.includes(btn.dataset.choice);btn.classList.toggle("selected",on);btn.setAttribute("aria-pressed",on?"true":"false")})}
function updateJudge(n){const q=QUESTIONS.find(x=>x.number===Number(n));if(!q)return;const ans=normalize(state.answers[n]||""),a=document.querySelector(`[data-exam-answer="${n}"]`),j=document.querySelector(`[data-judge="${n}"]`);if(a)a.textContent=ans||"未回答";if(j){const ok=ans&&same(ans,q.correct);j.className="judge "+(!ans?"blank":ok?"ok":"bad");j.textContent=!ans?"未回答":ok?"正解":"不正解"}}
function renderSummary(){$("#summary-root").innerHTML=QUESTIONS.map(q=>{const ans=normalize(state.answers[q.number]||"")||"未回答",memo=state.memos[q.number]||"";return `<div class="summary-item"><strong>第${q.number}問</strong>\n回答：${esc(ans)}\nメモ：${esc(memo||"なし")}</div>`}).join("")}
function summaryText(){return QUESTIONS.map(q=>{const ans=normalize(state.answers[q.number]||"")||"未回答";const memo=state.memos[q.number]||"なし";return "第"+q.number+"問\n回答："+ans+"\nメモ："+memo}).join("\n\n")}
async function copySummary(){const t=summaryText(),s=$("#copy-status");try{if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(t);s.textContent="コピーしました。";return}}catch(e){}const ta=document.createElement("textarea");ta.value=t;ta.readOnly=true;ta.style.position="fixed";ta.style.left="-9999px";document.body.appendChild(ta);ta.select();try{s.textContent=document.execCommand("copy")?"コピーしました。":"コピーできませんでした。"}catch(e){s.textContent="コピーできませんでした。"}document.body.removeChild(ta)}
function clearAll(){if(!confirm("入力内容をすべて消去します。よろしいですか？"))return;state={answers:{},memos:{}};try{localStorage.removeItem(STORAGE_KEY)}catch(e){}QUESTIONS.forEach(q=>{const a=$(`#answer-${q.number}`),m=$(`#memo-${q.number}`);if(a)a.value="";if(m)m.value="";updateChoice(q.number);updateJudge(q.number)});renderSummary();save()}
document.addEventListener("DOMContentLoaded",()=>{load();renderQuestions();renderSummary();renderExplanations();document.addEventListener("click",e=>{const b=e.target.closest(".choice");if(b)toggle(Number(b.dataset.q),b.dataset.choice)});document.addEventListener("input",e=>{if(e.target.classList.contains("answer-input"))setAnswer(Number(e.target.dataset.q),e.target.value);if(e.target.tagName==="TEXTAREA")setMemo(Number(e.target.dataset.q),e.target.value)});$("#copy-btn").addEventListener("click",copySummary);$("#clear-btn").addEventListener("click",clearAll)});
</script>
</body>
</html>
