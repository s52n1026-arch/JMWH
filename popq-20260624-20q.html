*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;line-height:1.72}

.answer-row{display:grid;grid-template-columns:minmax(130px,190px) 1fr;gap:14px;margin-top:14px}label{display:block;font-weight:800;margin-bottom:5px}.answer-input{width:100%;max-width:190px;border:1px solid var(--line);border-radius:8px;padding:9px;font:inherit;font-weight:900;letter-spacing:.08em;text-transform:uppercase;background:white}
textarea{width:100%;min-height:88px;border:1px solid var(--line);border-radius:8px;padding:10px;font:inherit;resize:vertical;background:white}button:focus-visible,input:focus-visible,textarea:focus-visible{outline:3px solid var(--focus);outline-offset:2px}
.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:14px}.btn{border:1px solid var(--brand);border-radius:8px;background:var(--brand);color:white;padding:9px 14px;font:inherit;font-weight:800;cursor:pointer}.btn.secondary{background:white;color:var(--brand)}
.notice{border:1px solid #e1c668;background:#fff8df;color:#5f4500;border-radius:8px;padding:10px 12px;margin-top:12px}.summary-item{border-top:1px solid var(--line);padding:10px 0;white-space:pre-wrap}.summary-item:first-child{border-top:0}.judge{display:inline-block;border-radius:999px;padding:2px 9px;font-weight:900;margin-left:6px}.judge.ok{color:var(--ok);background:#e7f5ec}.judge.bad{color:var(--bad);background:#fdecec}.judge.blank{color:var(--warn);background:#fff3cd}
.theme-pill{display:inline-block;background:#f1eee7;border:1px solid #ddd2c2;color:#463829;border-radius:999px;padding:3px 9px;font-weight:800;font-size:.9rem}.reprint{background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:12px;margin:10px 0}.option-comment{border-left:4px solid var(--line);background:#fbfcfe;padding:9px 11px;margin:8px 0}.option-comment.correct{border-left-color:var(--ok);background:#f0fbf5}.refs li{margin:6px 0}
@media(max-width:720px){header,main section{padding:18px 12px}.question-card,.summary-card,.explain-card{padding:14px}.choice{grid-template-columns:32px 1fr}.answer-row{grid-template-columns:1fr}.answer-input{max-width:none}}

<script>
const QUESTIONS=[
{number:1,theme:"POP-Qの基準点と符号",stem:"68歳女性。腟入口部の膨隆感で紹介され、前医の記録には「先進部は処女膜より2cm内側」「別紙では-2cm」とある。診察記録の読み替えについて正しいものを全て選べ。",choices:{A:"基準面は処女膜面であり、同一面は0cmとして扱う。",B:"腟口より外側を陰性、内側を陽性として全点を記録する。",C:"処女膜より口側に2cmなら、値は-2cmと表記する。",D:"基準点は尿道口であり、前腟壁点だけ処女膜面を使う。",E:"外側へ出た距離は症状名で記録し、cm値にはしない。"},correct:["A","C"],comments:{A:"正しい。POP-Qでは処女膜面を固定基準として、そこを0cmにする。",B:"誤り。口側・近位側を陰性、遠位側・処女膜外を陽性で記録する。",C:"正しい。処女膜より2cm近位なら-2cm、2cm遠位なら+2cmである。",D:"誤り。尿道口はgh測定の一端にはなるが、全体の基準面ではない。",E:"誤り。症状名だけでなく、cm単位の客観的測定値を残す。"},refs:["Bump RC, Mattiasson A, Bo K, et al. The standardization of terminology of female pelvic organ prolapse and pelvic floor dysfunction. Am J Obstet Gynecol. 1996;175:10-17. DOI: 10.1016/S0002-9378(96)70243-0. PMID: 8694033. 反映: 処女膜面を0cmとする符号規則。","Persu C, Chapple CR, Cauni V, et al. Pelvic Organ Prolapse Quantification System (POP-Q) - a new era in pelvic prolapse staging. J Med Life. 2011;4:75-81. PMID: 21505577. 反映: 処女膜面、陰性・陽性表記、9点記録。","直近5年でPOP-Q符号規則を置き換える高品質更新は確認できず、基礎文献を使用。"]},
{number:2,theme:"POP-Qの9測定項目",stem:"72歳女性。紹介状には前壁、尖部、後壁の支持を数値で示したいとある。記録用紙の9マスへ入れる値として正しいものを全て選べ。",choices:{A:"Aa、Ba、C、D、Ap、Bpに加え、尿道長、子宮長、直腸径を記録する。",B:"Aa、Ba、C、D、Ap、Bpに加え、gh、pb、tvlを記録する。",C:"左右差を主評価にするため、Aa右、Aa左、Ap右、Ap左を別欄で記録する。",D:"各測定値は原則としてcm単位で、処女膜面との位置関係をそろえる。",E:"gh、pb、tvlは前後壁の点ではないが、同じ記録枠に含める。"},correct:["B","D","E"],comments:{A:"誤り。尿道長、子宮長、直腸径はPOP-Qの標準9項目ではない。",B:"正しい。6点と3計測、合計9項目を記録する。",C:"誤り。POP-Qは正中の定義点を用いるため、左右別記録が標準ではない。",D:"正しい。cmで記録し、陰性・陽性の符号規則を統一する。",E:"正しい。gh、pb、tvlは距離・長さの補助計測として9項目に含まれる。"},refs:["Bump RC, Mattiasson A, Bo K, et al. Am J Obstet Gynecol. 1996;175:10-17. DOI: 10.1016/S0002-9378(96)70243-0. PMID: 8694033. 反映: POP-Qの9項目記録。","Persu C, Chapple CR, Cauni V, et al. J Med Life. 2011;4:75-81. PMID: 21505577. 反映: Aa/Ba/C/D/Ap/Bpとgh/pb/tvlの整理。","直近5年で9項目構成を変更する高品質更新は確認できず、基礎文献を使用。"]},
{number:3,theme:"診察条件と最大下降の確認",stem:"64歳女性。外来では膨隆を認めないが、夕方の立位や排便時に腟外へ出ると訴える。数値記録の取り方として正しいものを全て選べ。",choices:{A:"安静時に見えなければ、怒責時を参考値にとどめ0cmで統一する。",B:"腟鏡で壁を強く保持した状態の最小下降を標準値として採用する。",C:"怒責で最大下降を得られない場合、立位やしゃがみ位で再評価を考える。",D:"診察台の角度や姿勢は再現性への影響が小さいため、記録から省く。",E:"原則は砕石位で怒責させ、必要なら最大下降が出る条件を工夫する。"},correct:["C","E"],comments:{A:"誤り。症状と所見が合わない場合は最大下降を出す工夫が必要である。",B:"誤り。保持で下降を抑えた値ではなく、怒責時の最大下降を記録する。",C:"正しい。NICEも診察所見で説明できない症状では立位・しゃがみ位や別時点の再診察を考慮する。",D:"誤り。姿勢や怒責の程度は測定値と再現性に影響しうる。",E:"正しい。標準的には砕石位で怒責時に測定し、最大下降を確認する。"},refs:["Persu C, Chapple CR, Cauni V, et al. J Med Life. 2011;4:75-81. PMID: 21505577. 反映: 砕石位、怒責時測定、姿勢の影響。","NICE. Urinary incontinence and pelvic organ prolapse in women: management. NG123. Published 2019; last reviewed 2025. 反映: 診察で説明できない症状では立位・しゃがみ位や別時点の診察を考慮。"]},
{number:4,theme:"Aaの定義",stem:"58歳女性。前腟壁遠位部の支持を記録するため、処女膜面から近位3cmの正中点を確認している。この点の扱いとして正しいものを全て選べ。",choices:{A:"正常支持では-3cmとして記録される。",B:"最大下降値は全腟長に等しくなりうるため、+8cmまで許容する。",C:"子宮摘出後はこの点を省略し、腟断端のみ記録する。",D:"前腟壁正中の固定点で、処女膜面から3cm口側に定義される。",E:"尿道口から後方処女膜輪までの距離を示す。"},correct:["A","D"],comments:{A:"正しい。Aaは固定点で、正常では-3cmである。",B:"誤り。Aaは固定点のため、標準的な範囲は-3cmから+3cmである。",C:"誤り。子宮摘出後も前腟壁点としてAaは記録する。",D:"正しい。Aaは前腟壁正中、処女膜から3cm近位の点である。",E:"誤り。尿道口から後方処女膜輪までの距離はghである。"},refs:["Bump RC, Mattiasson A, Bo K, et al. Am J Obstet Gynecol. 1996;175:10-17. DOI: 10.1016/S0002-9378(96)70243-0. PMID: 8694033. 反映: Aaの定義と範囲。","Persu C, Chapple CR, Cauni V, et al. J Med Life. 2011;4:75-81. PMID: 21505577. 反映: Aaは前腟壁3cm近位の定義点。","直近5年でAa定義を置き換える高品質更新は確認できず、基礎文献を使用。"]},
{number:5,theme:"Baの定義",stem:"70歳女性。前壁の膨隆が主訴で、遠位固定点は-1cmだが、怒責時に前壁中央部が+4cmまで下降した。前壁の最下降部の記録について正しいものを全て選べ。",choices:{A:"固定点と同じ値を記録するため、前壁の最下降部も-1cmである。",B:"前腟壁で最も下降した点を、前壁の代表値として記録する。",C:"Aaと尖部の間で最も遠位にある前腟壁点を評価する。",D:"後腟壁の最下降部と同じ意味なので、Bpとして記録する。",E:"前壁脱が疑われても、尖部が下降していなければ測定しない。"},correct:["B","C"],comments:{A:"誤り。Baは固定点ではなく、前壁で最も下降した点である。",B:"正しい。前腟壁脱の程度を反映する可変点である。",C:"正しい。Aaから尖部Cまでの前腟壁で、最遠位点をBaとして記録する。",D:"誤り。Bpは後腟壁の最下降部であり、前壁とは区別する。",E:"誤り。前壁下降は尖部下降の有無にかかわらず記録する。"},refs:["Bump RC, Mattiasson A, Bo K, et al. Am J Obstet Gynecol. 1996;175:10-17. DOI: 10.1016/S0002-9378(96)70243-0. PMID: 8694033. 反映: Baの定義。","Persu C, Chapple CR, Cauni V, et al. J Med Life. 2011;4:75-81. PMID: 21505577. 反映: BaはAaとCの間の前壁最下降点。","直近5年でBa定義を置き換える高品質更新は確認できず、基礎文献を使用。"]},
{number:6,theme:"Apの定義",stem:"66歳女性。後壁遠位部の支持を評価するため、後腟壁正中で処女膜面から3cm近位の固定点を測定した。正しいものを全て選べ。",choices:{A:"正常支持では-3cmとして記録される。",B:"後壁の最下降部を示すため、値はBpと同じ可変点として扱う。",C:"子宮頸部が残っている場合だけ記録し、摘出後は省略する。",D:"尿道口から肛門中央までを一括して測る距離である。",E:"標準的には後腟壁正中の固定点で、処女膜から3cm口側に置く。"},correct:["A","E"],comments:{A:"正しい。Apは固定点であり、正常支持では-3cmである。",B:"誤り。Apは固定点、Bpは後壁最下降点なので同じ可変点ではない。",C:"誤り。Apは子宮の有無にかかわらず後腟壁点として記録する。",D:"誤り。そのような一括距離はPOP-Q標準項目ではない。",E:"正しい。Apは後腟壁正中、処女膜面から3cm近位の点である。"},refs:["Bump RC, Mattiasson A, Bo K, et al. Am J Obstet Gynecol. 1996;175:10-17. DOI: 10.1016/S0002-9378(96)70243-0. PMID: 8694033. 反映: Apの定義と範囲。","Persu C, Chapple CR, Cauni V, et al. J Med Life. 2011;4:75-81. PMID: 21505577. 反映: Apは後腟壁3cm近位の定義点。","直近5年でAp定義を置き換える高品質更新は確認できず、基礎文献を使用。"]},
{number:7,theme:"Bpの定義",stem:"74歳女性。排便時の腟後壁膨隆感があり、後壁の固定点は-2cm、上部後壁が+3cmまで下降する。記録として最も妥当なものを全て選べ。",choices:{A:"後壁の固定点だけを記録すれば、上部後壁の下降は反映しなくてよい。",B:"前壁最下降点としてBaに+3cmを入れる。",C:"子宮頸部の位置としてCに+3cmを入れる。",D:"後腟壁で最も下降した点としてBpに+3cmを入れる。",E:"後壁膨隆なら臓器名だけで十分で、cm記録は不要である。"},correct:["D"],comments:{A:"誤り。固定点Apだけでは後壁全体の最下降を表せない。",B:"誤り。Baは前腟壁の可変点である。",C:"誤り。Cは子宮頸部または腟断端の位置である。",D:"正しい。BpはApから後方尖部側までの後腟壁で最も下降した点である。",E:"誤り。POP-Qでは臓器名の推定より、壁の下降をcmで記録する。"},refs:["Bump RC, Mattiasson A, Bo K, et al. Am J Obstet Gynecol. 1996;175:10-17. DOI: 10.1016/S0002-9378(96)70243-0. PMID: 8694033. 反映: Bpの定義。","Persu C, Chapple CR, Cauni V, et al. J Med Life. 2011;4:75-81. PMID: 21505577. 反映: Bpは後壁の最下降点。","直近5年でBp定義を置き換える高品質更新は確認できず、基礎文献を使用。"]},
{number:8,theme:"Cの定義",stem:"69歳女性。12年前に単純子宮全摘術を受けており、現在は腟断端の下降を伴う膨隆感がある。尖部の記録について正しいものを全て選べ。",choices:{A:"子宮がある場合は子宮頸部の位置を記録する。",B:"子宮摘出後は腟断端または腟断端瘢痕の位置を記録する。",C:"尖部支持の評価に関与し、前後壁下降の解釈にも影響する。",D:"後方処女膜輪から肛門中央までの会陰体長を示す。",E:"子宮摘出後は尖部評価を行わず、前壁と後壁だけで十分である。"},correct:["A","B","C"],comments:{A:"正しい。Cは子宮頸部の最下降点を表す。",B:"正しい。子宮摘出後は腟断端の位置をCとして記録する。",C:"正しい。尖部下降は前後壁の見かけの下降にも影響するため重要である。",D:"誤り。後方処女膜輪から肛門中央までの距離はpbである。",E:"誤り。腟断端脱の評価にはCの記録が必要である。"},refs:["Bump RC, Mattiasson A, Bo K, et al. Am J Obstet Gynecol. 1996;175:10-17. DOI: 10.1016/S0002-9378(96)70243-0. PMID: 8694033. 反映: Cの定義。","Persu C, Chapple CR, Cauni V, et al. J Med Life. 2011;4:75-81. PMID: 21505577. 反映: Cは子宮頸部または腟断端。","NICE. NG123. 2019; reviewed 2025. 反映: 専門評価では前方・中央・後方区画を記録する。"]},
{number:9,theme:"Dの定義と子宮摘出後の扱い",stem:"61歳女性。子宮頸部は温存されており、後腟円蓋の高位と頸部の下降に差がある。別の患者は子宮全摘後で腟断端だけが確認できる。記録について正しいものを全て選べ。",choices:{A:"子宮全摘後も後腟円蓋に相当する値としてDを記録する。",B:"子宮頸部が存在する場合、後腟円蓋の位置をDとして記録する。",C:"Dは前腟壁の最下降点であり、前壁脱の代表値である。",D:"子宮摘出後はDを省略し、腟断端の位置はCで記録する。",E:"Dは尿道口中央から後方処女膜輪までの距離である。"},correct:["B","D"],comments:{A:"誤り。子宮全摘後は後腟円蓋としてのDは記録しない。",B:"正しい。Dは子宮頸部がある場合の後腟円蓋を示す。",C:"誤り。前腟壁の最下降点はBaである。",D:"正しい。子宮摘出後の尖部位置はCとして腟断端を記録する。",E:"誤り。その距離はghである。"},refs:["Bump RC, Mattiasson A, Bo K, et al. Am J Obstet Gynecol. 1996;175:10-17. DOI: 10.1016/S0002-9378(96)70243-0. PMID: 8694033. 反映: Dの定義と摘出後省略。","Persu C, Chapple CR, Cauni V, et al. J Med Life. 2011;4:75-81. PMID: 21505577. 反映: Dは後腟円蓋、Cは頸部または腟断端。","直近5年でDの扱いを置き換える高品質更新は確認できず、基礎文献を使用。"]},
{number:10,theme:"ghの測定",stem:"67歳女性。支持組織の弛緩が疑われ、開大した裂孔を数値化したい。診察者が外尿道口中央と後方処女膜輪を同定している。この測定について正しいものを全て選べ。",choices:{A:"この距離は全腟長であり、脱出を還納した状態で測る。",B:"この距離は会陰体長であり、肛門中央までを含めて測る。",C:"外尿道口中央から後方処女膜輪までの距離を測定する。",D:"値は陰性で記録し、開大しているほど-値が大きくなる。",E:"この計測はgenital hiatusとして、前後壁点とは別の距離項目である。"},correct:["C","E"],comments:{A:"誤り。全腟長はtvlであり、外尿道口を起点にしない。",B:"誤り。会陰体長は後方処女膜輪から肛門中央までである。",C:"正しい。ghは外尿道口中央から後方処女膜輪までの距離である。",D:"誤り。ghは距離として正のcm値で記録し、処女膜面からの符号付き点ではない。",E:"正しい。ghはPOP-Qの3つの距離・長さ項目の一つである。"},refs:["Bump RC, Mattiasson A, Bo K, et al. Am J Obstet Gynecol. 1996;175:10-17. DOI: 10.1016/S0002-9378(96)70243-0. PMID: 8694033. 反映: ghの測定端点。","Persu C, Chapple CR, Cauni V, et al. J Med Life. 2011;4:75-81. PMID: 21505577. 反映: ghは外尿道口中央から後方処女膜輪まで。","Handa VL, Blomquist JL, Carroll M, Munoz A. Genital Hiatus Size and the Development of Prolapse Among Parous Women. Female Pelvic Med Reconstr Surg. 2021. DOI/PMIDは確認範囲で未確定。反映: gh拡大は脱出発症リスク研究の対象。"]},
{number:11,theme:"pbの測定",stem:"75歳女性。後壁膨隆に加え、会陰支持の低下を疑う。後方処女膜輪と肛門中央を結ぶ距離を測定した。正しいものを全て選べ。",choices:{A:"後方処女膜輪から肛門中央までの距離を測る。",B:"会陰体の支持を反映する距離項目として扱う。",C:"外尿道口中央から後方処女膜輪までの距離である。",D:"前後壁の固定点ではなく、cmで記録する補助計測である。",E:"子宮摘出後はこの値もDとともに省略する。"},correct:["A","B","D"],comments:{A:"正しい。pbは後方処女膜輪から肛門中央までの距離である。",B:"正しい。会陰体長を示すPOP-Qの距離項目である。",C:"誤り。それはghの測定端点である。",D:"正しい。AaやApのような壁の位置点ではなく、長さを測る項目である。",E:"誤り。pbは子宮の有無とは無関係に記録できる。"},refs:["Bump RC, Mattiasson A, Bo K, et al. Am J Obstet Gynecol. 1996;175:10-17. DOI: 10.1016/S0002-9378(96)70243-0. PMID: 8694033. 反映: pbの測定端点。","Persu C, Chapple CR, Cauni V, et al. J Med Life. 2011;4:75-81. PMID: 21505577. 反映: pbは後方処女膜輪から肛門中央まで。","直近5年でpb定義を置き換える高品質更新は確認できず、基礎文献を使用。"]},
{number:12,theme:"tvlの測定",stem:"73歳女性。先進部は+5cmで、Stage IIIとIVの境界を判断するため、脱出を還納して腟の最大長を確認した。この測定について正しいものを全て選べ。",choices:{A:"先進部の外側突出距離をそのまま全腟長とする。",B:"外尿道口から後方処女膜輪までの距離を全腟長として扱う。",C:"脱出を還納した状態で腟の全長を測定し、Stage III/IV境界に用いる。",D:"子宮がある場合に限って測定し、腟断端脱では記録対象から外す。",E:"値は処女膜面より口側の位置として、陰性値で記録する。"},correct:["C"],comments:{A:"誤り。突出距離と全腟長は別の概念である。",B:"誤り。外尿道口から後方処女膜輪までの距離はghである。",C:"正しい。tvlは全腟長であり、Stage IVのtvl-2cm基準に必要である。",D:"誤り。腟断端脱でも全腟長は評価に使える。",E:"誤り。tvlは長さなので、符号付き位置点ではなく正のcm値で記録する。"},refs:["Bump RC, Mattiasson A, Bo K, et al. Am J Obstet Gynecol. 1996;175:10-17. DOI: 10.1016/S0002-9378(96)70243-0. PMID: 8694033. 反映: tvlとStage III/IV境界。","Persu C, Chapple CR, Cauni V, et al. J Med Life. 2011;4:75-81. PMID: 21505577. 反映: tvlはPOP-Qの距離項目。","直近5年でtvl定義を置き換える高品質更新は確認できず、基礎文献を使用。"]},
{number:13,theme:"Stage 0の判定",stem:"55歳女性。検診で膨隆感はなく、Aa -3、Ba -3、Ap -3、Bp -3、tvl 9、C -8、D -9であった。判定について正しいものを全て選べ。",choices:{A:"前壁と後壁の4点がすべて-3cmであることは、脱出なしの判定に合う。",B:"最下降点が-1cmより近位なら、前後壁4点に関係なく必ず脱出なしである。",C:"CまたはDが全腟長に応じた高位にあっても、Baが-2cmなら脱出なしである。",D:"CまたはDが-tvlから-(tvl-2)cmの範囲にあることも判定に関与する。",E:"この数値なら、脱出なしとして扱う判定が妥当である。"},correct:["A","D","E"],comments:{A:"正しい。Stage 0ではAa、Ba、Ap、Bpが-3cmである。",B:"誤り。Stage IとStage 0は異なり、Stage 0には前後壁4点と尖部の条件がある。",C:"誤り。Baが-2cmならStage 0の前壁条件を満たさない。",D:"正しい。尖部は-tvlから-(tvl-2)cmの範囲にあることが求められる。",E:"正しい。提示値はStage 0の典型的な条件に合う。"},refs:["Bump RC, Mattiasson A, Bo K, et al. Am J Obstet Gynecol. 1996;175:10-17. DOI: 10.1016/S0002-9378(96)70243-0. PMID: 8694033. 反映: Stage 0の数値条件。","Persu C, Chapple CR, Cauni V, et al. J Med Life. 2011;4:75-81. PMID: 21505577. 反映: Stage分類の概念。","直近5年でStage 0基準を置き換える高品質更新は確認できず、基礎文献を使用。"]},
{number:14,theme:"Stage Iの判定",stem:"62歳女性。膨隆感は軽度。Aa -2、Ba -2、C -6、D -8、Ap -3、Bp -2、tvl 9で、Stage 0の条件は満たさない。最下降点は-2cmであった。正しいものを全て選べ。",choices:{A:"最下降点が-2cmなら、処女膜面から±1cm以内にあるためStage IIである。",B:"Stage 0でなく、最下降点が-1cmより口側ならStage Iに合う。",C:"この症例では最下降点が処女膜より1cm超近位にある。",D:"BaまたはBpが-2cmなら、全例で脱出なしとして扱う。",E:"Stage Iは最下降点が+1cmを超えた場合に限られる。"},correct:["B","C"],comments:{A:"誤り。-2cmは-1cmより口側であり、±1cm以内ではない。",B:"正しい。Stage 0でないが、最下降点が-1cmより近位ならStage Iである。",C:"正しい。-2cmは処女膜面より2cm口側、すなわち1cm超近位である。",D:"誤り。BaやBpが-2cmならStage 0の条件から外れる。",E:"誤り。+1cm超はStage III側の条件である。"},refs:["Bump RC, Mattiasson A, Bo K, et al. Am J Obstet Gynecol. 1996;175:10-17. DOI: 10.1016/S0002-9378(96)70243-0. PMID: 8694033. 反映: Stage Iの境界。","Persu C, Chapple CR, Cauni V, et al. J Med Life. 2011;4:75-81. PMID: 21505577. 反映: Stage Iは最下降部が処女膜より1cm超口側。","直近5年でStage I基準を置き換える高品質更新は確認できず、基礎文献を使用。"]},
{number:15,theme:"Stage IIの判定",stem:"69歳女性。腟口付近の違和感があり、最下降点は+1cm、tvlは8cmであった。境界判定について正しいものを全て選べ。",choices:{A:"最下降点が-1cmから+1cmの範囲なら、この段階に入る。",B:"+1cmは範囲外なので、Stage IIIとして扱う。",C:"最下降点が+1.5cmなら、境界内として同じ段階に入る。",D:"tvlが8cmなら、最下降点+1cmは自動的にStage IVである。",E:"最下降点が0cmでも、この段階に分類されうる。"},correct:["A","E"],comments:{A:"正しい。Stage IIは最下降点が-1cm以上+1cm以下である。",B:"誤り。+1cmはStage IIの範囲内で、+1cmを超えるとStage III側に進む。",C:"誤り。+1.5cmは+1cmを超えるため、Stage IIの範囲から外れる。",D:"誤り。Stage IVは最下降点がtvl-2cm以上であり、+1cmではない。",E:"正しい。処女膜面ちょうど0cmもStage IIに含まれる。"},refs:["Bump RC, Mattiasson A, Bo K, et al. Am J Obstet Gynecol. 1996;175:10-17. DOI: 10.1016/S0002-9378(96)70243-0. PMID: 8694033. 反映: Stage IIの境界。","Persu C, Chapple CR, Cauni V, et al. J Med Life. 2011;4:75-81. PMID: 21505577. 反映: Stage IIは処女膜面±1cm以内。","直近5年でStage II基準を置き換える高品質更新は確認できず、基礎文献を使用。"]},
{number:16,theme:"Stage IIIの判定",stem:"76歳女性。最下降点は+5cm、全腟長は8cmであった。還納後の腟長は保たれ、完全外反ではない。判定について正しいものを全て選べ。",choices:{A:"最下降点が+1cmを超えるため、tvlに関係なくStage IVである。",B:"最下降点が+1cmを超え、かつtvl-2cm未満ならStage IIIに合う。",C:"tvl 8cmではtvl-2cmは5cmであり、+5cmはその値未満である。",D:"tvl 8cmならStage IIIの上限は+6cm未満であり、+5cmは該当する。",E:"完全腟外反に近いかどうかは、Stage III/IV境界に関係しない。"},correct:["B","D"],comments:{A:"誤り。+1cm超だけではStage IIIかIVかを決められず、tvl-2cmとの関係を見る。",B:"正しい。Stage IIIは+1cm超で、tvl-2cm未満の下降である。",C:"誤り。tvl 8cmではtvl-2cmは6cmであり、+5cmはその値未満である。",D:"正しい。tvl 8cmならtvl-2cmは6cmで、+5cmはStage IIIの範囲内である。",E:"誤り。Stage IVはほぼ完全外反で、tvl-2cm以上が境界になる。"},refs:["Bump RC, Mattiasson A, Bo K, et al. Am J Obstet Gynecol. 1996;175:10-17. DOI: 10.1016/S0002-9378(96)70243-0. PMID: 8694033. 反映: Stage IIIのtvl-2cm境界。","Persu C, Chapple CR, Cauni V, et al. J Med Life. 2011;4:75-81. PMID: 21505577. 反映: Stage IIIは処女膜より1cm超遠位だが完全外反ではない。","直近5年でStage III基準を置き換える高品質更新は確認できず、基礎文献を使用。"]},
{number:17,theme:"Stage IVの判定",stem:"80歳女性。腟外へ大きく脱出し、還納後の全腟長は9cm、最下降点は+7cmであった。完全外反に近い状態の評価として正しいものを全て選べ。",choices:{A:"tvlが9cmなら、tvl-2cmは7cmである。",B:"最下降点が+1cmを超えれば、tvlにかかわらずStage IIIに固定される。",C:"最下降点がtvl-2cm以上なら、ほぼ完全腟外反としてStage IVに合う。",D:"この症例の最下降点+7cmは、Stage IVの数値境界に達している。",E:"Stage IVでは前壁と後壁の全固定点が-3cmであることが必須である。"},correct:["A","C","D"],comments:{A:"正しい。tvl 9cmではStage IV境界は7cmである。",B:"誤り。+1cm超であっても、tvl-2cm以上ならStage IVである。",C:"正しい。Stage IVは最下降点がtvl-2cm以上に達する状態である。",D:"正しい。+7cmはtvl-2cmに一致し、Stage IVに合う。",E:"誤り。前後壁点-3cmはStage 0の条件である。"},refs:["Bump RC, Mattiasson A, Bo K, et al. Am J Obstet Gynecol. 1996;175:10-17. DOI: 10.1016/S0002-9378(96)70243-0. PMID: 8694033. 反映: Stage IVの数値境界。","Persu C, Chapple CR, Cauni V, et al. J Med Life. 2011;4:75-81. PMID: 21505577. 反映: Stage IVはほぼ完全腟外反。","直近5年でStage IV基準を置き換える高品質更新は確認できず、基礎文献を使用。"]},
{number:18,theme:"Stageは最下降点で決める",stem:"71歳女性。Aa -3、Ba -1、C +2、D -6、Ap -3、Bp 0、tvl 9であった。どの区画を重視して分類するか研修医が迷っている。正しいものを全て選べ。",choices:{A:"前壁点だけで分類するため、Ba -1からStage IIに固定する。",B:"最も遠位にある点を用いて全体の段階を決める。",C:"後壁点が0なら、尖部が+2でもStage IIを超えない。",D:"最も症状が強い区画を患者が選び、その区画だけで分類する。",E:"この数値ではC +2が最下降点であり、+1cmを超える下降として扱う。"},correct:["B","E"],comments:{A:"誤り。Stageは前壁だけではなく全測定点の最下降部で決める。",B:"正しい。Stage分類は部位名ではなく、最も遠位の測定点で決定する。",C:"誤り。尖部Cが+2cmであれば、後壁が0cmでも全体分類に影響する。",D:"誤り。症状の主観的部位ではなく、客観的な最下降点で分類する。",E:"正しい。C +2cmは処女膜より1cm超遠位であり、Stage III側の条件になる。"},refs:["Bump RC, Mattiasson A, Bo K, et al. Am J Obstet Gynecol. 1996;175:10-17. DOI: 10.1016/S0002-9378(96)70243-0. PMID: 8694033. 反映: Stageは最下降点で決める。","Persu C, Chapple CR, Cauni V, et al. J Med Life. 2011;4:75-81. PMID: 21505577. 反映: Stage分類は最も下降した部位を用いる。","NICE. NG123. 2019; reviewed 2025. 反映: 専門評価では前方・中央・後方区画を記録する。"]},
{number:19,theme:"臓器名断定を避ける表現",stem:"67歳女性。前壁膨隆を認め、既往に前壁形成術がある。診察だけで膨隆の背側構造を断定しにくい。記録表現として正しいものを全て選べ。",choices:{A:"前壁膨隆を認めたら、検査なしで全例を膀胱瘤と確定してよい。",B:"後壁膨隆なら、直腸瘤以外の病態は診察上考えなくてよい。",C:"前腟壁、後腟壁、尖部の下降として部位別に記録する。",D:"手術既往例では、膨隆の背側臓器を身体診察だけで断定できない場合がある。",E:"臓器名を使わない記録では、重症度や経時比較はできない。"},correct:["C","D"],comments:{A:"誤り。前壁膨隆の背側構造を身体診察だけで常に断定できるわけではない。",B:"誤り。後壁膨隆でも直腸瘤、腸瘤、複合病変などを区別しにくい場合がある。",C:"正しい。POP-Qでは壁・尖部の下降として客観的に記録する。",D:"正しい。手術既往では解剖が変化し、臓器名推定の不確実性が増す。",E:"誤り。cm記録により重症度と経時比較が可能である。"},refs:["Persu C, Chapple CR, Cauni V, et al. J Med Life. 2011;4:75-81. PMID: 21505577. 反映: cystocele/rectoceleなど臓器名断定を避ける意義。","Bump RC, Mattiasson A, Bo K, et al. Am J Obstet Gynecol. 1996;175:10-17. DOI: 10.1016/S0002-9378(96)70243-0. PMID: 8694033. 反映: 客観的・部位別記録。","NICE. NG123. 2019; reviewed 2025. 反映: 前方・中央・後方区画を記録する専門評価。"]},

const STORAGE_KEY='womens_med_20260624_popq_v1';
const LETTERS=['A','B','C','D','E'];
let state={answers:{},memos:{}},storageOk=true;
const $=s=>document.querySelector(s);
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function normalize(v){const seen=new Set();String(v||'').toUpperCase().split('').forEach(ch=>{if(LETTERS.includes(ch))seen.add(ch)});return LETTERS.filter(ch=>seen.has(ch)).join('')}
function same(a,b){return normalize(a)===LETTERS.filter(ch=>b.includes(ch)).join('')}
function warn(m){const el=$('#storage-warning');el.hidden=false;el.textContent=m}
function load(){try{const raw=localStorage.getItem(STORAGE_KEY);if(raw)state=JSON.parse(raw);state.answers=state.answers||{};state.memos=state.memos||{}}catch(e){storageOk=false;warn('保存データを読み込めませんでした。')}}
function save(){if(!storageOk)return;try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));$('#save-status').textContent='保存しました。'}catch(e){storageOk=false;warn('localStorageへ保存できませんでした。')}}
function renderQuestions(){$('#questions-root').innerHTML=QUESTIONS.map(q=>`<article class="question-card"><h3><span class="qno">第${q.number}問</span></h3><p class="stem">${esc(q.stem)}</p><div class="choices" role="group" aria-label="第${q.number}問の選択肢">${LETTERS.map(L=>`<button type="button" class="choice" data-q="${q.number}" data-choice="${L}" aria-pressed="false"><span class="letter">${L}</span><span>${esc(q.choices[L])}</span></button>`).join('')}</div><div class="answer-row"><div><label for="answer-${q.number}">回答記入欄</label><input id="answer-${q.number}" class="answer-input" data-q="${q.number}" maxlength="5" inputmode="latin" autocomplete="off" aria-label="第${q.number}問の回答記入欄"><div class="hint">A-Eのみ保存</div></div><div><label for="memo-${q.number}">メモ欄</label><textarea id="memo-${q.number}" data-q="${q.number}" aria-label="第${q.number}問のメモ欄"></textarea></div></div></article>`).join('');QUESTIONS.forEach(q=>{const a=$(`#answer-${q.number}`),m=$(`#memo-${q.number}`);a.value=normalize(state.answers[q.number]||'');m.value=state.memos[q.number]||'';updateChoice(q.number)})}
function renderExplanations(){$('#explanations-root').innerHTML=QUESTIONS.map(q=>`<article class="explain-card"><h3><span class="qno">第${q.number}問</span></h3><p><span class="theme-pill">関連テーマ：${esc(q.theme)}</span> <span class="judge blank" data-judge="${q.number}">未回答</span></p><div class="reprint"><p class="stem">${esc(q.stem)}</p><ol type="A">${LETTERS.map(L=>`<li>${esc(q.choices[L])}</li>`).join('')}</ol></div><p><strong>答案者の回答：</strong><span data-exam-answer="${q.number}">未回答</span></p><p><strong>正答：</strong>${q.correct.join('')}</p>${LETTERS.map(L=>`<div class="option-comment ${q.correct.includes(L)?'correct':''}"><strong>${L}：</strong>${esc(q.comments[L])}</div>`).join('')}<h4>根拠文献</h4><ul class="refs">${q.refs.map(r=>`<li>${esc(r)}</li>`).join('')}</ul></article>`).join('');QUESTIONS.forEach(q=>updateJudge(q.number))}
function setAnswer(n,v){const ans=normalize(v);if(ans)state.answers[n]=ans;else delete state.answers[n];const input=$(`#answer-${n}`);if(input&&input.value!==ans)input.value=ans;updateChoice(n);updateJudge(n);renderSummary();save()}
function toggle(n,L){const cur=new Set(normalize(state.answers[n]||'').split('').filter(Boolean));cur.has(L)?cur.delete(L):cur.add(L);setAnswer(n,LETTERS.filter(x=>cur.has(x)).join(''))}
function setMemo(n,v){state.memos[n]=v;renderSummary();save()}
function updateChoice(n){const ans=normalize(state.answers[n]||'');document.querySelectorAll(`.choice[data-q="${n}"]`).forEach(btn=>{const on=ans.includes(btn.dataset.choice);btn.classList.toggle('selected',on);btn.setAttribute('aria-pressed',on?'true':'false')})}
function updateJudge(n){const q=QUESTIONS.find(x=>x.number===Number(n));if(!q)return;const ans=normalize(state.answers[n]||''),a=document.querySelector(`[data-exam-answer="${n}"]`),j=document.querySelector(`[data-judge="${n}"]`);if(a)a.textContent=ans||'未回答';if(j){const ok=ans&&same(ans,q.correct);j.className='judge '+(!ans?'blank':ok?'ok':'bad');j.textContent=!ans?'未回答':ok?'正解':'不正解'}}
function renderSummary(){$('#summary-root').innerHTML=QUESTIONS.map(q=>{const ans=normalize(state.answers[q.number]||'')||'未回答',memo=state.memos[q.number]||'';return `<div class="summary-item"><strong>第${q.number}問</strong>\n回答：${esc(ans)}\nメモ：${esc(memo||'なし')}</div>`}).join('')}
function summaryText(){return QUESTIONS.map(q=>{const ans=normalize(state.answers[q.number]||'')||'未回答';const memo=state.memos[q.number]||'なし';return '第'+q.number+'問\n回答：'+ans+'\nメモ：'+memo}).join('\n\n')}
async function copySummary(){const t=summaryText(),s=$('#copy-status');try{if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(t);s.textContent='コピーしました。';return}}catch(e){}const ta=document.createElement('textarea');ta.value=t;ta.readOnly=true;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();try{s.textContent=document.execCommand('copy')?'コピーしました。':'コピーできませんでした。'}catch(e){s.textContent='コピーできませんでした。'}document.body.removeChild(ta)}
function clearAll(){if(!confirm('入力内容をすべて消去します。よろしいですか？'))return;state={answers:{},memos:{}};try{localStorage.removeItem(STORAGE_KEY)}catch(e){}QUESTIONS.forEach(q=>{const a=$(`#answer-${q.number}`),m=$(`#memo-${q.number}`);if(a)a.value='';if(m)m.value='';updateChoice(q.number);updateJudge(q.number)});renderSummary();save()}
document.addEventListener('DOMContentLoaded',()=>{load();renderQuestions();renderSummary();renderExplanations();document.addEventListener('click',e=>{const b=e.target.closest('.choice');if(b)toggle(Number(b.dataset.q),b.dataset.choice)});document.addEventListener('input',e=>{if(e.target.classList.contains('answer-input'))setAnswer(Number(e.target.dataset.q),e.target.value);if(e.target.tagName==='TEXTAREA')setMemo(Number(e.target.dataset.q),e.target.value)});document.addEventListener('keydown',e=>{if(e.target.classList.contains('choice')&&(e.key===' '||e.key==='Enter')){e.preventDefault();toggle(Number(e.target.dataset.q),e.target.dataset.choice)}});$('#copy-btn').addEventListener('click',copySummary);$('#clear-btn').addEventListener('click',clearAll)});
</script>
