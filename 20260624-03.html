<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>20260624 セット3 女性医学専門医 5択複数正答問題集</title><style>:root{--bg:#f5f7fa;--paper:#fff;--ink:#18202b;--muted:#5d6878;--line:#d7dee8;--brand:#145c72;--soft:#e8f4f7;--ok:#126b42;--bad:#9b2d2d;--warn:#806000;--focus:#f2c84b}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;line-height:1.72}header,main section{max-width:1060px;margin:0 auto;padding:24px 18px}h1{font-size:1.75rem;line-height:1.3;margin:.2em 0}h2{font-size:1.35rem;border-left:6px solid var(--brand);padding-left:12px;margin:24px 0 14px}h3{margin:0 0 10px;font-size:1.08rem}.meta,.hint,.status-line{color:var(--muted)}.question-card,.summary-card,.explain-card{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:18px;margin:16px 0;break-inside:avoid;box-shadow:0 5px 16px rgba(30,40,60,.04)}.qno{display:inline-flex;min-width:4.5rem;justify-content:center;border:1px solid var(--brand);color:var(--brand);border-radius:999px;padding:2px 10px;font-weight:800}.stem{font-weight:650;margin:10px 0 14px}.choices{display:grid;gap:9px;margin:12px 0}.choice{display:grid;grid-template-columns:38px 1fr;gap:10px;align-items:start;width:100%;border:2px solid var(--line);border-radius:8px;background:white;padding:12px;text-align:left;font:inherit;color:inherit;cursor:pointer;min-height:58px}.choice:hover{border-color:#83aebd}.choice.selected{border-color:var(--brand);background:var(--soft);box-shadow:inset 0 0 0 1px var(--brand)}.choice .letter{font-weight:900;color:var(--brand)}.choice.selected .letter:after{content:"選択中";display:block;font-size:.68rem;color:var(--ok);font-weight:800}.answer-row{display:grid;grid-template-columns:minmax(130px,190px) 1fr;gap:14px;margin-top:14px}label{display:block;font-weight:800;margin-bottom:5px}.answer-input{width:100%;max-width:190px;border:1px solid var(--line);border-radius:8px;padding:9px;font:inherit;font-weight:900;letter-spacing:.08em;text-transform:uppercase;background:white}textarea{width:100%;min-height:88px;border:1px solid var(--line);border-radius:8px;padding:10px;font:inherit;resize:vertical;background:white}button:focus-visible,input:focus-visible,textarea:focus-visible{outline:3px solid var(--focus);outline-offset:2px}.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:14px}.btn{border:1px solid var(--brand);border-radius:8px;background:var(--brand);color:white;padding:9px 14px;font:inherit;font-weight:800;cursor:pointer}.btn.secondary{background:white;color:var(--brand)}.notice{border:1px solid #e1c668;background:#fff8df;color:#5f4500;border-radius:8px;padding:10px 12px;margin-top:12px}.summary-item{border-top:1px solid var(--line);padding:10px 0;white-space:pre-wrap}.summary-item:first-child{border-top:0}.judge{display:inline-block;border-radius:999px;padding:2px 9px;font-weight:900;margin-left:6px}.judge.ok{color:var(--ok);background:#e7f5ec}.judge.bad{color:var(--bad);background:#fdecec}.judge.blank{color:var(--warn);background:#fff3cd}.theme-pill{display:inline-block;background:#f1eee7;border:1px solid #ddd2c2;color:#463829;border-radius:999px;padding:3px 9px;font-weight:800;font-size:.9rem}.reprint{background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:12px;margin:10px 0}.option-comment{border-left:4px solid var(--line);background:#fbfcfe;padding:9px 11px;margin:8px 0}.option-comment.correct{border-left-color:var(--ok);background:#f0fbf5}.refs li{margin:6px 0}@media(max-width:720px){header,main section{padding:18px 12px}.question-card,.summary-card,.explain-card{padding:14px}.choice{grid-template-columns:32px 1fr}.answer-row{grid-template-columns:1fr}.answer-input{max-width:none}}@media print{body{background:white;font-size:10.5pt}header,main section{max-width:none;padding:12mm}.btn,.toolbar,#storage-warning{display:none!important}.question-card,.summary-card,.explain-card{box-shadow:none;page-break-inside:avoid;break-inside:avoid}.answers-section{break-before:page;page-break-before:always}h2,h3{page-break-after:avoid}.choice,.option-comment{break-inside:avoid}textarea{min-height:42px}}</style></head><body><header><h1>女性医学専門医 5択複数正答問題集 セット3</h1><p class="meta">作成日：2026年6月24日 / 各問A-Eから正しいものを全て選択</p><p class="hint">選択肢カードをクリックすると選択・解除できます。回答欄へ直接入力する場合は、例：AC のように入力してください。</p><div id="storage-warning" class="notice" hidden></div><div class="toolbar"><button id="clear-btn" class="btn secondary" type="button">入力内容を消去</button><span id="save-status" class="status-line" aria-live="polite"></span></div></header><main><section aria-labelledby="exam-title"><h2 id="exam-title">試験問題</h2><div id="questions-root"></div></section><section aria-labelledby="summary-title"><h2 id="summary-title">回答記録（まとめ）</h2><div id="summary-root" class="summary-card" aria-live="polite"></div><div class="toolbar"><button id="copy-btn" class="btn" type="button">回答とメモをコピー</button><span id="copy-status" class="status-line" aria-live="polite"></span></div></section><section class="answers-section" aria-labelledby="answers-title"><h2 id="answers-title">回答・解説</h2><div id="explanations-root"></div></section></main><script>const QUESTIONS=[{"number":1,"theme":"原発性無月経：低ゴナドトロピン性無月経と嗅覚低下","stem":"16歳、初経未発来。乳房発育はTanner 2度、FSH/LH低値、E2低値。本人はにおいがわかりにくいと言う。正しいものを全て選べ。","choices":{"A":"二次性徴が乏しい場合は骨量獲得への影響を考える。","B":"頭痛や視野異常があっても画像検査の検討は不要である。","C":"低ゴナドトロピン性性腺機能低下では中枢性の評価を行う。","D":"嗅覚低下はKallmann症候群を示唆する所見である。","E":"プロラクチンやTSHの確認は続発性無月経だけで必要である。"},"correct":["A","C","D"],"comments":{"A":"正しい。エストロゲン欠乏の期間が骨に影響する。","B":"誤り。下垂体・視床下部病変を疑う症状である。","C":"正しい。視床下部・下垂体系の病変や先天性疾患を整理する。","D":"正しい。嗅球形成異常とGnRHニューロン移動異常が関連する。","E":"誤り。原発性無月経でも内分泌スクリーニングに含まれる。"},"refs":["ASRM Practice Committee. Current evaluation of amenorrhea: a committee opinion. 2024. https://www.asrm.org/practice-guidance/practice-committee-documents/current-evaluation-of-amenorrhea-a-committee-opinion-2024/"]},{"number":2,"theme":"原発性無月経：閉塞性流出路障害の症状","stem":"14歳、周期的な下腹部痛があるが初経未発来。乳房発育は良好。腹部診察で下腹部膨隆を認める。正しいものを全て選べ。","choices":{"A":"乳房発育が良好なら骨盤内臓器の画像評価は禁忌である。","B":"周期的疼痛と二次性徴良好なら流出路閉塞を鑑別に入れる。","C":"診察では外陰・腟入口部の形態確認が重要である。","D":"妊娠反応は本人が初経前なら医学的に不要である。","E":"急性尿閉は流出路閉塞に伴って起こりうる。"},"correct":["B","C","E"],"comments":{"A":"誤り。解剖学的評価は重要である。","B":"正しい。ホルモン産生はあるが排出できない病態を考える。","C":"正しい。処女膜閉鎖などは視診が診断に近づく。","D":"誤り。性行動歴に応じて妊娠除外を行う。","E":"正しい。腟留血腫などによる圧迫で尿閉を来すことがある。"},"refs":["ASRM Practice Committee. Current evaluation of amenorrhea: a committee opinion. 2024. https://www.asrm.org/practice-guidance/practice-committee-documents/current-evaluation-of-amenorrhea-a-committee-opinion-2024/"]},{"number":3,"theme":"検診：閉経後女性の子宮頸部細胞診不適正標本","stem":"閉経後女性の頸がん検診で不適正標本となった。説明として正しいものを全て選べ。","choices":{"A":"採取細胞量不足や炎症、血液混入は不適正の原因になりうる。","B":"萎縮が強い閉経後標本でも、再採取条件を工夫する余地はない。","C":"液状化検体を用いれば、採取細胞量不足による不適正標本は理論上まったく起こらない。","D":"HPV検査が陰性なら細胞診標本の適正性は問題にならない。","E":"不適正標本でも陰性として次回定期検診まで待つ。"},"correct":["A"],"comments":{"A":"正しい。標本適正性は検診精度に関わる。","B":"誤り。採取時期や局所環境への配慮で再検査の質を上げられることがある。","C":"誤り。不適正は減りうるが、採取不良などによりゼロにはならない。","D":"誤り。検査ごとに適正性と運用を判断する。","E":"誤り。不適正は判定不能であり再検査が必要になる。"},"refs":["WHO guideline for screening and treatment of cervical pre-cancer lesions for cervical cancer prevention. 2nd ed. 2021. https://www.who.int/publications/i/item/9789240030824","Perkins RB, et al. 2019 ASCCP Risk-Based Management Consensus Guidelines. J Low Genit Tract Dis. 2020;24:102-131."]},{"number":4,"theme":"検診：骨粗鬆症スクリーニング対象の考え方","stem":"66歳女性、骨折歴なし。健診で骨密度検査を勧められた。正しいものを全て選べ。","choices":{"A":"骨折歴がなければFRAXの利用価値はない。","B":"65歳未満でも臨床リスクが高ければ骨密度測定を検討する。","C":"閉経後女性の骨量低下は生活指導だけで薬物療法の適応にならない。","D":"65歳以上女性は骨粗鬆症スクリーニング対象として扱われる。","E":"DXAは測定部位と過去測定機種の違いを意識して解釈する。"},"correct":["B","D","E"],"comments":{"A":"誤り。未骨折者の10年骨折確率推定に使う。","B":"正しい。低体重、親の大腿骨近位部骨折、ステロイドなどを考える。","C":"誤り。骨密度や骨折リスクにより薬物療法を検討する。","D":"正しい。年齢だけで対象となる代表例である。","E":"正しい。追跡比較では施設・機種差に注意する。"},"refs":["LeBoff MS, et al. The clinician's guide to prevention and treatment of osteoporosis. Osteoporos Int. 2022;33:2049-2102."]},{"number":5,"theme":"骨粗鬆症：逐次療法と中止後リバウンド","stem":"69歳、デノスマブを3年間継続し、自己判断で中止したいと言う。正しいものを全て選べ。","choices":{"A":"半年ごとの投与が遅れても臨床的影響はない。","B":"治療終了計画は開始時から説明しておくとよい。","C":"中止時にはビスホスホネートなどへの移行を検討する。","D":"低カルシウム血症リスク評価は初回投与前だけでよい。","E":"デノスマブ中止後は椎体骨折リスク上昇に注意する。"},"correct":["B","C","E"],"comments":{"A":"誤り。投与間隔の延長は骨代謝回転の再上昇につながりうる。","B":"正しい。長期治療では出口戦略が重要である。","C":"正しい。骨吸収抑制の空白を作らない工夫が必要である。","D":"誤り。腎機能やビタミンD状態により継続的な確認が必要になる。","E":"正しい。中止時の逐次療法が重要である。"},"refs":["LeBoff MS, et al. The clinician's guide to prevention and treatment of osteoporosis. Osteoporos Int. 2022;33:2049-2102."]},{"number":6,"theme":"脂質異常症：家族性高コレステロール血症を疑う所見","stem":"41歳女性、LDL-C 232 mg/dL。父が心筋梗塞を48歳で発症。腱黄色腫を疑う所見がある。正しいものを全て選べ。","choices":{"A":"カスケードスクリーニングは血縁者の早期診断に役立つ。","B":"著明なLDL-C高値と若年冠動脈疾患家族歴はFHを疑う。","C":"FHでは生活指導だけで薬物療法を避けるのが原則である。","D":"妊娠希望がある場合はスタチンの扱いを事前に相談する。","E":"HDL-Cが60 mg/dL以上ならFHは否定される。"},"correct":["A","B","D"],"comments":{"A":"正しい。FH診療の重要な運用である。","B":"正しい。早期発見と家族スクリーニングが重要である。","C":"誤り。強力なLDL-C低下療法を早期に検討する。","D":"正しい。妊娠・授乳期の薬剤調整が必要である。","E":"誤り。HDL-C高値でLDL-C高値の意義は消えない。"},"refs":["Grundy SM, et al. 2018 AHA/ACC Cholesterol Guideline. Circulation. 2019;139:e1082-e1143.","Virani SS, et al. 2022 ACC Expert Consensus Decision Pathway on Nonstatin Therapies. J Am Coll Cardiol. 2022;80:1366-1418."]},{"number":7,"theme":"糖尿病：更年期女性のHbA1c解釈と貧血","stem":"55歳女性、HbA1c 6.7%。過多月経はないが鉄欠乏性貧血治療中。血糖自己測定は概ね正常である。正しいものを全て選べ。","choices":{"A":"糖尿病では腟カンジダ症や尿路感染の反復にも注意する。","B":"HbA1cが一度6.5%以上なら症状や再検なしで全例薬物治療を開始する。","C":"HbA1cと血糖値が乖離すれば随時血糖やCGMなどで確認する。","D":"HbA1cは赤血球寿命の影響を受ける。","E":"閉経移行期の体組成変化はインスリン抵抗性に影響しうる。"},"correct":["A","C","D","E"],"comments":{"A":"正しい。女性医学で拾いやすい合併症である。","B":"誤り。診断確認と個別化が必要である。","C":"正しい。検査値の背景を読む問題である。","D":"正しい。貧血や治療状況で乖離が起こる。","E":"正しい。腹部脂肪増加や活動量低下も絡む。"},"refs":["American Diabetes Association Professional Practice Committee. Standards of Care in Diabetes. Diabetes Care. 2026;49(Suppl 1). https://diabetesjournals.org/care/issue/49/Supplement_1"]},{"number":8,"theme":"心血管系：たこつぼ症候群の疫学と鑑別","stem":"70歳女性、家族の急病後に胸痛とST変化を認めた。冠動脈閉塞はなく、心尖部壁運動異常を認める。正しいものを全て選べ。","choices":{"A":"たこつぼ症候群は閉経後女性に多い。","B":"精神的ストレスがなければ、身体的ストレス後のたこつぼ症候群は否定できる。","C":"再発がないため長期フォローは不要である。","D":"冠動脈造影が正常なら心不全合併は起こらない。","E":"急性冠症候群との鑑別が必要で、初期対応では除外しない。"},"correct":["A","E"],"comments":{"A":"正しい。疫学的特徴は試験向きである。","B":"誤り。手術、感染、神経疾患など身体的ストレスも誘因になりうる。","C":"誤り。再発や合併症の確認を行う。","D":"誤り。急性期心不全や不整脈を来すことがある。","E":"正しい。胸痛と心電図変化があるためACSとして扱う入口が重要である。"},"refs":["Virani SS, et al. 2023 AHA/ACC Guideline for Chronic Coronary Disease. Circulation. 2023;148:e9-e119."]},{"number":9,"theme":"脳血管障害：心房細動と女性の脳卒中リスク","stem":"78歳女性、発作性心房細動を指摘。高血圧と糖尿病がある。正しいものを全て選べ。","choices":{"A":"転倒リスクが少しでもあれば抗凝固薬は絶対禁忌である。","B":"女性であることはリスクスコア上の要素として扱われる。","C":"DOAC使用時は腎機能と併用薬を確認する。","D":"心房細動では脳塞栓症予防のため抗凝固適応を評価する。","E":"閉経後であれば心房細動の症状は動悸として必ず自覚される。"},"correct":["B","C","D"],"comments":{"A":"誤り。出血リスクと脳卒中予防利益を個別に比較する。","B":"正しい。性別だけでなく他リスクとの組み合わせが重要である。","C":"正しい。高齢女性では用量設定が問われやすい。","D":"正しい。年齢と併存疾患を含めてリスクを層別化する。","E":"誤り。無症候性や息切れ・倦怠感のみのことがある。"},"refs":["Virani SS, et al. 2023 AHA/ACC Guideline for Chronic Coronary Disease. Circulation. 2023;148:e9-e119.","CDC. U.S. Medical Eligibility Criteria for Contraceptive Use, 2024. MMWR Recomm Rep. 2024;73:1-126. https://www.cdc.gov/mmwr/volumes/73/rr/rr7304a1.htm"]},{"number":10,"theme":"骨盤臓器脱：手術適応と患者希望","stem":"69歳、子宮脱を自覚し歩行時に不快感。排尿困難は軽度で、手術を迷っている。正しいものを全て選べ。","choices":{"A":"脱出度が軽くてもQOL障害が強ければ治療対象になりうる。","B":"保存療法には骨盤底筋訓練やペッサリーが含まれる。","C":"治療選択では症状の程度、生活への影響、本人希望を重視する。","D":"無症状の軽度下垂でも全例早期手術が標準である。","E":"POP手術後は腹圧性尿失禁が新たに顕在化することがある。"},"correct":["A","B","C","E"],"comments":{"A":"正しい。患者報告アウトカムの視点が重要である。","B":"正しい。症状や希望に応じた選択肢である。","C":"正しい。解剖学的重症度だけで決めない。","D":"誤り。無症状なら経過観察も選択肢となる。","E":"正しい。術前説明に含めるべき論点である。"},"refs":["NICE Guideline NG123. Urinary incontinence and pelvic organ prolapse in women: management. 2019, updated. https://www.nice.org.uk/guidance/ng123"]},{"number":11,"theme":"FLUTS：間質性膀胱炎/膀胱痛症候群の特徴","stem":"47歳、尿意切迫感と頻尿、膀胱充満時痛があり排尿後に軽快する。尿培養は陰性。正しいものを全て選べ。","choices":{"A":"肉眼的血尿があれば膀胱がんなど別疾患を除外する。","B":"抗菌薬長期投与を培養陰性でも第一選択として反復する。","C":"食事、ストレス、月経周期で症状が変動することがある。","D":"膀胱痛症候群では疼痛と蓄尿症状の組み合わせが手がかりになる。","E":"尿培養陰性なら痛みを訴えても尿路系疾患は全て否定される。"},"correct":["A","C","D"],"comments":{"A":"正しい。警告所見を見落とさない。","B":"誤り。感染証拠がない場合の漫然投与は避ける。","C":"正しい。症状日誌が役立つ。","D":"正しい。単純なOABとの違いを問える。","E":"誤り。感染以外の膀胱痛症候群を考える。"},"refs":["American Urological Association/SUFU. The diagnosis and treatment of idiopathic overactive bladder. 2024. https://www.auanet.org/guidelines-and-quality/guidelines/idiopathic-overactive-bladder"]},{"number":12,"theme":"脳機能：睡眠薬と転倒・せん妄リスク","stem":"79歳、不眠でエチゾラムを長期内服。最近ふらつきと物忘れを家族が心配している。正しいものを全て選べ。","choices":{"A":"不眠があればアルコール摂取を睡眠薬代わりに勧める。","B":"ベンゾジアゼピン系薬は高齢者で転倒や認知機能低下に注意する。","C":"長期内服薬は急に全量中止すれば離脱症状を避けられる。","D":"ラメルテオンはメラトニン受容体作動薬である。","E":"睡眠衛生や認知行動療法的介入は不眠管理に含まれる。"},"correct":["B","D","E"],"comments":{"A":"誤り。睡眠の質悪化、転倒、依存の問題がある。","B":"正しい。Beers基準でも重要な薬剤群である。","C":"誤り。減量計画を立てる。","D":"正しい。ベンゾジアゼピン系とは作用機序が異なる。","E":"正しい。薬物療法だけでなく非薬物療法を考える。"},"refs":["American Geriatrics Society 2023 updated AGS Beers Criteria. J Am Geriatr Soc. 2023;71:2052-2081.","American Psychiatric Association. Diagnostic and Statistical Manual of Mental Disorders, Fifth Edition, Text Revision. 2022.","NICE Guideline NG222. Depression in adults: treatment and management. 2022. https://www.nice.org.uk/guidance/ng222"]},{"number":13,"theme":"精神疾患系：PMDDと月経周期記録","stem":"34歳、月経前の焦燥感と抑うつが強く、月経開始後数日で軽快する。仕事を休むほどつらい。正しいものを全て選べ。","choices":{"A":"PMDD診断では症状の周期性を前方視的に記録することが有用である。","B":"SSRIはPMDD治療の選択肢になりうる。","C":"月経前症状があればDSM-5-TR上すべてPMDDである。","D":"双極性障害やうつ病の増悪との鑑別を行う。","E":"PMDDでは機能障害の有無を評価する。"},"correct":["A","B","D","E"],"comments":{"A":"正しい。月経周期との関係を客観化する。","B":"正しい。連日投与や黄体期投与が検討される。","C":"誤り。症状数、時期、障害度、除外診断が必要である。","D":"正しい。周期性だけで決めない。","E":"正しい。単なる軽い月経前不快感と区別する。"},"refs":["American Psychiatric Association. Diagnostic and Statistical Manual of Mental Disorders, Fifth Edition, Text Revision. 2022.","NICE Guideline NG222. Depression in adults: treatment and management. 2022. https://www.nice.org.uk/guidance/ng222"]},{"number":14,"theme":"乳がん系：遺伝性乳癌卵巣癌症候群の紹介基準","stem":"38歳、トリプルネガティブ乳がんで治療中。母方叔母に卵巣がん既往がある。正しいものを全て選べ。","choices":{"A":"卵巣がん家族歴は乳がんリスク評価で無視できる。","B":"若年発症乳がんやトリプルネガティブ乳がんは遺伝学的評価の契機になる。","C":"遺伝学的検査では検査前カウンセリングが重要である。","D":"遺伝性乳がんでは乳房MRIの役割を検討することがある。","E":"病的バリアントが見つかれば血縁者のリスク評価にもつながる。"},"correct":["B","C","D","E"],"comments":{"A":"誤り。BRCA関連腫瘍として重要である。","B":"正しい。HBOCを考える状況である。","C":"正しい。本人・血縁者への影響を説明する。","D":"正しい。高リスクサーベイランスとして問われる。","E":"正しい。カスケード検査の考え方である。"},"refs":["US Preventive Services Task Force. Screening for Breast Cancer: Recommendation Statement. JAMA. 2024;331:1918-1930. https://www.uspreventiveservicestaskforce.org/uspstf/recommendation/breast-cancer-screening"]},{"number":15,"theme":"検査・治療：経腟エストロゲンと全身MHTの違い","stem":"63歳、性交痛と反復する尿路症状を主訴に受診。ホットフラッシュはない。正しいものを全て選べ。","choices":{"A":"原因不明の性器出血があれば使用前に評価する。","B":"乳がん既往例では主治医と相談し非ホルモン療法も含めて検討する。","C":"閉経関連尿路性器症候群では局所エストロゲンが選択肢になる。","D":"局所低用量エストロゲンは全身症状改善を主目的に使う。","E":"保湿剤・潤滑剤は軽症例の選択肢にならない。"},"correct":["A","B","C"],"comments":{"A":"正しい。ホルモン治療前の基本確認である。","B":"正しい。個別リスクとQOLのバランスを確認する。","C":"正しい。局所症状が主体なら全身MHTと分けて考える。","D":"誤り。主な標的は腟・外陰・尿路の局所症状である。","E":"誤り。非ホルモン選択肢として用いられる。"},"refs":["The 2022 hormone therapy position statement of The North American Menopause Society. Menopause. 2022;29:767-794."]},{"number":16,"theme":"検査・治療：緊急避妊薬のタイミングと銅付加IUD","stem":"避妊失敗から4日後に受診した24歳。授乳中ではない。正しいものを全て選べ。","choices":{"A":"緊急避妊薬服用後はその周期の避妊指導は不要である。","B":"嘔吐した場合でも再服用の検討は不要である。","C":"銅付加IUDは条件が合えば緊急避妊として高い効果がある。","D":"レボノルゲストレル緊急避妊薬は性交後できるだけ早く服用する。","E":"緊急避妊後は次回月経や妊娠検査の説明を行う。"},"correct":["C","D","E"],"comments":{"A":"誤り。追加避妊や継続避妊法を説明する。","B":"誤り。服用後短時間の嘔吐では再服用が必要なことがある。","C":"正しい。挿入可否と感染リスクなどを評価する。","D":"正しい。時間経過で効果が低下する。","E":"正しい。妊娠成立や月経遅延への対応を説明する。"},"refs":["CDC. U.S. Selected Practice Recommendations for Contraceptive Use, 2024. MMWR Recomm Rep. 2024;73:1-77.","WHO. Violence against women health topic. https://www.who.int/health-topics/violence-against-women"]},{"number":17,"theme":"検査・治療：甲状腺機能異常と無月経・不妊","stem":"33歳、月経不順と不妊相談。TSH 8.2 μIU/mL、FT4は正常範囲。正しいものを全て選べ。","choices":{"A":"レボチロキシンは鉄剤やカルシウム剤との服用間隔に注意する。","B":"抗TPO抗体陽性は自己免疫性甲状腺疾患を示唆する。","C":"潜在性甲状腺機能低下症でも妊娠希望では管理目標を意識する。","D":"甲状腺機能異常は月経異常の鑑別に含める。","E":"FT4正常ならTSH高値は臨床的に全く意味がない。"},"correct":["A","B","C","D"],"comments":{"A":"正しい。吸収阻害が起こりうる。","B":"正しい。将来の機能低下リスクも考える。","C":"正しい。妊孕性・妊娠初期管理に関わる。","D":"正しい。無月経・過多月経などと関連する。","E":"誤り。潜在性甲状腺機能低下症として扱う。"},"refs":["Ross DS, et al. 2016 American Thyroid Association Guidelines for Hyperthyroidism. Thyroid. 2016;26:1343-1421.","Alexander EK, et al. 2017 ATA Guidelines for Thyroid Disease During Pregnancy and Postpartum. Thyroid. 2017;27:315-389."]},{"number":18,"theme":"検査・治療：漢方薬と偽アルドステロン症","stem":"更年期症状で漢方薬を複数内服中の58歳。浮腫、血圧上昇、低K血症を認めた。正しいものを全て選べ。","choices":{"A":"甘草含有製剤では偽アルドステロン症に注意する。","B":"複数の漢方薬併用では甘草の総量を確認する。","C":"低K血症があっても筋力低下や不整脈リスクは考えなくてよい。","D":"漢方薬は天然物なので副作用説明は不要である。","E":"原因薬を中止し電解質と血圧をフォローする。"},"correct":["A","B","E"],"comments":{"A":"正しい。低K血症、浮腫、高血圧が手がかりである。","B":"正しい。重複によりリスクが上がる。","C":"誤り。重症低Kでは筋症状や不整脈に注意する。","D":"誤り。間質性肺炎、肝障害なども含め説明が必要である。","E":"正しい。薬剤性を疑えば中止・補正・経過確認を行う。"},"refs":["CDC. U.S. Selected Practice Recommendations for Contraceptive Use, 2024. MMWR Recomm Rep. 2024;73:1-77.","WHO. Violence against women health topic. https://www.who.int/health-topics/violence-against-women"]},{"number":19,"theme":"その他：女性アスリートの低エネルギー可用性","stem":"18歳長距離選手、疲労骨折を反復し月経が半年ない。BMI 18.0。正しいものを全て選べ。","choices":{"A":"疲労骨折があっても月経歴の確認は不要である。","B":"OC投与で消退出血があれば骨健康問題は解決したと判断する。","C":"体重だけでなく摂取量、運動量、心理背景を評価する。","D":"治療目標は競技継続だけでなく健康回復を含む。","E":"低エネルギー可用性は月経異常と骨健康障害につながる。"},"correct":["C","D","E"],"comments":{"A":"誤り。骨健康評価に月経歴は重要である。","B":"誤り。見かけの出血で低栄養の根本解決にはならない。","C":"正しい。摂食障害の有無も含め多職種で見る。","D":"正しい。骨量獲得期の長期予後が関わる。","E":"正しい。女性アスリート三主徴からRED-Sへ広がる論点である。"},"refs":["ASRM Practice Committee. Current evaluation of amenorrhea: a committee opinion. 2024. https://www.asrm.org/practice-guidance/practice-committee-documents/current-evaluation-of-amenorrhea-a-committee-opinion-2024/","LeBoff MS, et al. The clinician's guide to prevention and treatment of osteoporosis. Osteoporos Int. 2022;33:2049-2102."]},{"number":20,"theme":"その他：プレコンセプションケアと催奇形薬","stem":"35歳、てんかん治療中で妊娠を希望。内服薬調整について相談した。正しいものを全て選べ。","choices":{"A":"バルプロ酸は妊娠可能年齢女性で特に慎重に扱う。","B":"発作リスクがあるため自己判断で急に内服を中止しない。","C":"妊娠希望があれば避妊や妊娠時期の相談は不要である。","D":"妊娠前に抗てんかん薬の種類と用量を主治医と見直す。","E":"葉酸摂取は妊娠判明後から始めれば十分である。"},"correct":["A","B","D"],"comments":{"A":"正しい。催奇形性と神経発達への影響が問題になる。","B":"正しい。中止による発作は母体・胎児に危険である。","C":"誤り。薬剤調整が整うまでの避妊も含め計画する。","D":"正しい。発作抑制と胎児リスクの両方を考える。","E":"誤り。神経管閉鎖時期を考え妊娠前からの摂取が重要である。"},"refs":["CDC. U.S. Selected Practice Recommendations for Contraceptive Use, 2024. MMWR Recomm Rep. 2024;73:1-77.","WHO. Violence against women health topic. https://www.who.int/health-topics/violence-against-women"]}];const STORAGE_KEY='womens_med_20260624_set3_v1';const LETTERS=['A','B','C','D','E'];let state={answers:{},memos:{}},storageOk=true;const $=s=>document.querySelector(s);function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function normalize(v){const seen=new Set();String(v||'').toUpperCase().split('').forEach(ch=>{if(LETTERS.includes(ch))seen.add(ch)});return LETTERS.filter(ch=>seen.has(ch)).join('')}function same(a,b){return normalize(a)===LETTERS.filter(ch=>b.includes(ch)).join('')}function warn(m){const el=$('#storage-warning');el.hidden=false;el.textContent=m}function load(){try{const raw=localStorage.getItem(STORAGE_KEY);if(raw)state=JSON.parse(raw);state.answers=state.answers||{};state.memos=state.memos||{}}catch(e){storageOk=false;warn('保存データを読み込めませんでした。')}}function save(){if(!storageOk)return;try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));$('#save-status').textContent='保存しました。'}catch(e){storageOk=false;warn('localStorageへ保存できませんでした。')}}function renderQuestions(){$('#questions-root').innerHTML=QUESTIONS.map(q=>`<article class="question-card"><h3><span class="qno">第${q.number}問</span></h3><p class="stem">${esc(q.stem)}</p><div class="choices" role="group" aria-label="第${q.number}問の選択肢">${LETTERS.map(L=>`<button type="button" class="choice" data-q="${q.number}" data-choice="${L}" aria-pressed="false"><span class="letter">${L}</span><span>${esc(q.choices[L])}</span></button>`).join('')}</div><div class="answer-row"><div><label for="answer-${q.number}">回答記入欄</label><input id="answer-${q.number}" class="answer-input" data-q="${q.number}" maxlength="5" inputmode="latin" autocomplete="off" aria-label="第${q.number}問の回答記入欄"><div class="hint">A-Eのみ保存</div></div><div><label for="memo-${q.number}">メモ欄</label><textarea id="memo-${q.number}" data-q="${q.number}" aria-label="第${q.number}問のメモ欄"></textarea></div></div></article>`).join('');QUESTIONS.forEach(q=>{const a=$(`#answer-${q.number}`),m=$(`#memo-${q.number}`);a.value=normalize(state.answers[q.number]||'');m.value=state.memos[q.number]||'';updateChoice(q.number)})}function renderExplanations(){$('#explanations-root').innerHTML=QUESTIONS.map(q=>`<article class="explain-card"><h3><span class="qno">第${q.number}問</span></h3><p><span class="theme-pill">関連テーマ：${esc(q.theme)}</span> <span class="judge blank" data-judge="${q.number}">未回答</span></p><div class="reprint"><p class="stem">${esc(q.stem)}</p><ol type="A">${LETTERS.map(L=>`<li>${esc(q.choices[L])}</li>`).join('')}</ol></div><p><strong>答案者の回答：</strong><span data-exam-answer="${q.number}">未回答</span></p><p><strong>正答：</strong>${q.correct.join('')}</p>${LETTERS.map(L=>`<div class="option-comment ${q.correct.includes(L)?'correct':''}"><strong>${L}：</strong>${esc(q.comments[L])}</div>`).join('')}<h4>根拠文献</h4><ul class="refs">${q.refs.map(r=>`<li>${esc(r)}</li>`).join('')}</ul></article>`).join('');QUESTIONS.forEach(q=>updateJudge(q.number))}function setAnswer(n,v){const ans=normalize(v);if(ans)state.answers[n]=ans;else delete state.answers[n];const input=$(`#answer-${n}`);if(input&&input.value!==ans)input.value=ans;updateChoice(n);updateJudge(n);renderSummary();save()}function toggle(n,L){const cur=new Set(normalize(state.answers[n]||'').split('').filter(Boolean));cur.has(L)?cur.delete(L):cur.add(L);setAnswer(n,LETTERS.filter(x=>cur.has(x)).join(''))}function setMemo(n,v){state.memos[n]=v;renderSummary();save()}function updateChoice(n){const ans=normalize(state.answers[n]||'');document.querySelectorAll(`.choice[data-q="${n}"]`).forEach(btn=>{const on=ans.includes(btn.dataset.choice);btn.classList.toggle('selected',on);btn.setAttribute('aria-pressed',on?'true':'false')})}function updateJudge(n){const q=QUESTIONS.find(x=>x.number===Number(n));if(!q)return;const ans=normalize(state.answers[n]||''),a=document.querySelector(`[data-exam-answer="${n}"]`),j=document.querySelector(`[data-judge="${n}"]`);if(a)a.textContent=ans||'未回答';if(j){const ok=ans&&same(ans,q.correct);j.className='judge '+(!ans?'blank':ok?'ok':'bad');j.textContent=!ans?'未回答':ok?'正解':'不正解'}}function renderSummary(){$('#summary-root').innerHTML=QUESTIONS.map(q=>{const ans=normalize(state.answers[q.number]||'')||'未回答',memo=state.memos[q.number]||'';return `<div class="summary-item"><strong>第${q.number}問</strong>
回答：${esc(ans)}
メモ：${esc(memo||'なし')}</div>`}).join('')}function summaryText(){return QUESTIONS.map(q=>{const ans=normalize(state.answers[q.number]||'')||'未回答';const memo=state.memos[q.number]||'なし';return '第'+q.number+'問\n回答：'+ans+'\nメモ：'+memo}).join('\n\n')}async function copySummary(){const t=summaryText(),s=$('#copy-status');try{if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(t);s.textContent='コピーしました。';return}}catch(e){}const ta=document.createElement('textarea');ta.value=t;ta.readOnly=true;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();try{s.textContent=document.execCommand('copy')?'コピーしました。':'コピーできませんでした。'}catch(e){s.textContent='コピーできませんでした。'}document.body.removeChild(ta)}function clearAll(){if(!confirm('入力内容をすべて消去します。よろしいですか？'))return;state={answers:{},memos:{}};try{localStorage.removeItem(STORAGE_KEY)}catch(e){}QUESTIONS.forEach(q=>{const a=$(`#answer-${q.number}`),m=$(`#memo-${q.number}`);if(a)a.value='';if(m)m.value='';updateChoice(q.number);updateJudge(q.number)});renderSummary();save()}document.addEventListener('DOMContentLoaded',()=>{load();renderQuestions();renderSummary();renderExplanations();document.addEventListener('click',e=>{const b=e.target.closest('.choice');if(b)toggle(Number(b.dataset.q),b.dataset.choice)});document.addEventListener('input',e=>{if(e.target.classList.contains('answer-input'))setAnswer(Number(e.target.dataset.q),e.target.value);if(e.target.tagName==='TEXTAREA')setMemo(Number(e.target.dataset.q),e.target.value)});document.addEventListener('keydown',e=>{if(e.target.classList.contains('choice')&&(e.key===' '||e.key==='Enter')){e.preventDefault();toggle(Number(e.target.dataset.q),e.target.dataset.choice)}});$('#copy-btn').addEventListener('click',copySummary);$('#clear-btn').addEventListener('click',clearAll)});</script></body></html>
