<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>20260624 セット5 女性医学専門医 5択複数正答問題集</title><style>:root{--bg:#f5f7fa;--paper:#fff;--ink:#18202b;--muted:#5d6878;--line:#d7dee8;--brand:#145c72;--soft:#e8f4f7;--ok:#126b42;--bad:#9b2d2d;--warn:#806000;--focus:#f2c84b}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;line-height:1.72}header,main section{max-width:1060px;margin:0 auto;padding:24px 18px}h1{font-size:1.75rem;line-height:1.3;margin:.2em 0}h2{font-size:1.35rem;border-left:6px solid var(--brand);padding-left:12px;margin:24px 0 14px}h3{margin:0 0 10px;font-size:1.08rem}.meta,.hint,.status-line{color:var(--muted)}.question-card,.summary-card,.explain-card{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:18px;margin:16px 0;break-inside:avoid;box-shadow:0 5px 16px rgba(30,40,60,.04)}.qno{display:inline-flex;min-width:4.5rem;justify-content:center;border:1px solid var(--brand);color:var(--brand);border-radius:999px;padding:2px 10px;font-weight:800}.stem{font-weight:650;margin:10px 0 14px}.choices{display:grid;gap:9px;margin:12px 0}.choice{display:grid;grid-template-columns:38px 1fr;gap:10px;align-items:start;width:100%;border:2px solid var(--line);border-radius:8px;background:white;padding:12px;text-align:left;font:inherit;color:inherit;cursor:pointer;min-height:58px}.choice:hover{border-color:#83aebd}.choice.selected{border-color:var(--brand);background:var(--soft);box-shadow:inset 0 0 0 1px var(--brand)}.choice .letter{font-weight:900;color:var(--brand)}.choice.selected .letter:after{content:"選択中";display:block;font-size:.68rem;color:var(--ok);font-weight:800}.answer-row{display:grid;grid-template-columns:minmax(130px,190px) 1fr;gap:14px;margin-top:14px}label{display:block;font-weight:800;margin-bottom:5px}.answer-input{width:100%;max-width:190px;border:1px solid var(--line);border-radius:8px;padding:9px;font:inherit;font-weight:900;letter-spacing:.08em;text-transform:uppercase;background:white}textarea{width:100%;min-height:88px;border:1px solid var(--line);border-radius:8px;padding:10px;font:inherit;resize:vertical;background:white}button:focus-visible,input:focus-visible,textarea:focus-visible{outline:3px solid var(--focus);outline-offset:2px}.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:14px}.btn{border:1px solid var(--brand);border-radius:8px;background:var(--brand);color:white;padding:9px 14px;font:inherit;font-weight:800;cursor:pointer}.btn.secondary{background:white;color:var(--brand)}.notice{border:1px solid #e1c668;background:#fff8df;color:#5f4500;border-radius:8px;padding:10px 12px;margin-top:12px}.summary-item{border-top:1px solid var(--line);padding:10px 0;white-space:pre-wrap}.summary-item:first-child{border-top:0}.judge{display:inline-block;border-radius:999px;padding:2px 9px;font-weight:900;margin-left:6px}.judge.ok{color:var(--ok);background:#e7f5ec}.judge.bad{color:var(--bad);background:#fdecec}.judge.blank{color:var(--warn);background:#fff3cd}.theme-pill{display:inline-block;background:#f1eee7;border:1px solid #ddd2c2;color:#463829;border-radius:999px;padding:3px 9px;font-weight:800;font-size:.9rem}.reprint{background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:12px;margin:10px 0}.option-comment{border-left:4px solid var(--line);background:#fbfcfe;padding:9px 11px;margin:8px 0}.option-comment.correct{border-left-color:var(--ok);background:#f0fbf5}.refs li{margin:6px 0}@media(max-width:720px){header,main section{padding:18px 12px}.question-card,.summary-card,.explain-card{padding:14px}.choice{grid-template-columns:32px 1fr}.answer-row{grid-template-columns:1fr}.answer-input{max-width:none}}@media print{body{background:white;font-size:10.5pt}header,main section{max-width:none;padding:12mm}.btn,.toolbar,#storage-warning{display:none!important}.question-card,.summary-card,.explain-card{box-shadow:none;page-break-inside:avoid;break-inside:avoid}.answers-section{break-before:page;page-break-before:always}h2,h3{page-break-after:avoid}.choice,.option-comment{break-inside:avoid}textarea{min-height:42px}}</style><style id="main-page-link-style">.main-page-link{max-width:1080px;margin:0 auto;padding:14px 18px 0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif}.main-page-link a{display:inline-block;border:1px solid #2563eb;border-radius:8px;padding:8px 12px;background:#fff;color:#2563eb;text-decoration:none;font-weight:700}.main-page-link a:hover{text-decoration:underline}.main-page-link.bottom{padding-top:20px;padding-bottom:28px}@media print{.main-page-link{display:none!important}}</style></head><body><nav class="main-page-link" aria-label="main page link"><a href="index.html">問題集一覧へ戻る</a></nav><header><h1>女性医学専門医 5択複数正答問題集 セット5</h1><p class="meta">作成日：2026年6月24日 / 各問A-Eから正しいものを全て選択</p><p class="hint">選択肢カードをクリックすると選択・解除できます。回答欄へ直接入力する場合は、例：AC のように入力してください。</p><div id="storage-warning" class="notice" hidden></div><div class="toolbar"><button id="clear-btn" class="btn secondary" type="button">入力内容を消去</button><span id="save-status" class="status-line" aria-live="polite"></span></div></header><main><section aria-labelledby="exam-title"><h2 id="exam-title">試験問題</h2><div id="questions-root"></div></section><section aria-labelledby="summary-title"><h2 id="summary-title">回答記録（まとめ）</h2><div id="summary-root" class="summary-card" aria-live="polite"></div><div class="toolbar"><button id="copy-btn" class="btn" type="button">回答とメモをコピー</button><span id="copy-status" class="status-line" aria-live="polite"></span></div></section><section class="answers-section" aria-labelledby="answers-title"><h2 id="answers-title">回答・解説</h2><div id="explanations-root"></div></section></main><script>const QUESTIONS=[{"number":1,"theme":"原発性無月経：思春期遅発と家族歴","stem":"15歳、初経未発来。乳房発育はTanner 2度、身長は伸び続けており、母も初経が遅かった。正しいものを全て選べ。","choices":{"A":"初経未発来では本人への心理的配慮は医学的に不要である。","B":"二次性徴が始まっていても経過観察だけでよいかは年齢と進行で判断する。","C":"骨年齢は成長余地の評価に役立つ。","D":"体質性思春期遅発では家族歴と成長曲線が参考になる。","E":"慢性疾患、過度な運動、栄養状態の確認は不要である。"},"correct":["B","C","D"],"comments":{"A":"誤り。思春期診療では説明と心理支援が重要である。","B":"正しい。乳房発育開始からの年数も見る。","C":"正しい。思春期遅発評価の基本である。","D":"正しい。病的無月経との鑑別に使う。","E":"誤り。低栄養や慢性疾患は遅発思春期の原因となる。"},"refs":["ASRM Practice Committee. Current evaluation of amenorrhea: a committee opinion. 2024. https://www.asrm.org/practice-guidance/practice-committee-documents/current-evaluation-of-amenorrhea-a-committee-opinion-2024/"]},{"number":2,"theme":"原発性無月経：高プロラクチン血症の確認","stem":"17歳、初経未発来に近い稀発月経。乳汁漏出と頭痛がある。PRL高値を認めた。正しいものを全て選べ。","choices":{"A":"妊娠、薬剤、甲状腺機能低下症はPRL高値の鑑別に含める。","B":"ドパミン拮抗薬など服薬歴を確認する。","C":"高プロラクチン血症はGnRH分泌を抑制し月経異常を来しうる。","D":"PRL高値があれば測定誤差やマクロプロラクチンの問題は考えなくてよい。","E":"頭痛や視野症状があれば下垂体病変を考える。"},"correct":["A","B","C","E"],"comments":{"A":"正しい。原因検索の基本である。","B":"正しい。制吐薬・抗精神病薬などが関与する。","C":"正しい。病態のつながりが問われる。","D":"誤り。臨床像と値が合わない場合は確認する。","E":"正しい。画像評価の適応を検討する。"},"refs":["ASRM Practice Committee. Current evaluation of amenorrhea: a committee opinion. 2024. https://www.asrm.org/practice-guidance/practice-committee-documents/current-evaluation-of-amenorrhea-a-committee-opinion-2024/","Ross DS, et al. 2016 American Thyroid Association Guidelines for Hyperthyroidism. Thyroid. 2016;26:1343-1421.","Alexander EK, et al. 2017 ATA Guidelines for Thyroid Disease During Pregnancy and Postpartum. Thyroid. 2017;27:315-389."]},{"number":3,"theme":"検診：HPV自己採取の利点と限界","stem":"子宮頸がん検診未受診者対策としてHPV自己採取を説明する。正しいものを全て選べ。","choices":{"A":"自己採取HPV検査で陽性になっても、医療機関でのトリアージや精査は不要である。","B":"検体の取り扱いや結果通知体制は、自己採取HPV検査の精度管理と無関係である。","C":"自己採取でHPV陰性なら将来の頸がんリスクは一生ゼロになる。","D":"自己採取は未受診者へのアクセス改善策として検討される。","E":"自己採取では細胞診と同じ形態診断ができる。"},"correct":["D"],"comments":{"A":"誤り。陽性者を確実に診療へつなぐ仕組みが検診プログラムの要である。","B":"誤り。採取後の運用管理が検診の質に関わる。","C":"誤り。検診間隔に応じた継続が必要である。","D":"正しい。検診受診率向上の文脈で問われる。","E":"誤り。主にHPV検査であり細胞形態診断とは異なる。"},"refs":["WHO guideline for screening and treatment of cervical pre-cancer lesions for cervical cancer prevention. 2nd ed. 2021. https://www.who.int/publications/i/item/9789240030824","Perkins RB, et al. 2019 ASCCP Risk-Based Management Consensus Guidelines. J Low Genit Tract Dis. 2020;24:102-131."]},{"number":4,"theme":"検診：乳がん検診の偽陽性と過剰診断","stem":"42歳、乳がん検診開始について利点と不利益を質問された。正しいものを全て選べ。","choices":{"A":"不利益には偽陽性、追加検査、不安、過剰診断が含まれる。","B":"検診は症状のある乳房腫瘤の診断目的検査と同じ扱いである。","C":"平均リスク女性では40歳未満の全員に毎月MRI検診を行う。","D":"高濃度乳房ではマンモグラフィ陰性なら、症状が出ても再評価は不要である。","E":"マンモグラフィ検診の利益には乳がん死亡減少がある。"},"correct":["A","E"],"comments":{"A":"正しい。説明で問われやすい。","B":"誤り。症状があれば診療として評価する。","C":"誤り。高リスクと平均リスクを分ける。","D":"誤り。検診陰性でも症状出現時は診療として評価する。","E":"正しい。検診推奨の中心となるアウトカムである。"},"refs":["US Preventive Services Task Force. Screening for Breast Cancer: Recommendation Statement. JAMA. 2024;331:1918-1930. https://www.uspreventiveservicestaskforce.org/uspstf/recommendation/breast-cancer-screening"]},{"number":5,"theme":"骨粗鬆症：ロモソズマブの注意点","stem":"73歳、椎体骨折を複数回起こし骨折リスクが非常に高い。骨形成促進薬を検討する。正しいものを全て選べ。","choices":{"A":"低リスク骨減少症の第一選択として全例に使う。","B":"顎骨壊死や非定型大腿骨骨折の説明は骨粗鬆症薬では不要である。","C":"投与終了後は骨吸収抑制薬への逐次療法を考える。","D":"最近の心筋梗塞や脳卒中既往では心血管リスクを慎重に評価する。","E":"ロモソズマブは骨形成促進と骨吸収抑制の両作用を持つ。"},"correct":["C","D","E"],"comments":{"A":"誤り。骨折リスクの高い例で検討する薬剤である。","B":"誤り。頻度は低いが長期管理で説明する。","C":"正しい。獲得した骨量を維持する。","D":"正しい。選択時の重要な注意点である。","E":"正しい。作用機序が問われる。"},"refs":["LeBoff MS, et al. The clinician's guide to prevention and treatment of osteoporosis. Osteoporos Int. 2022;33:2049-2102."]},{"number":6,"theme":"脂質異常症：二次予防でのLDL-C管理","stem":"66歳女性、心筋梗塞後。スタチン最大耐用量でもLDL-C 92 mg/dL。正しいものを全て選べ。","choices":{"A":"二次予防では一次予防より厳格なLDL-C低下を目指す。","B":"さらに不十分な高リスク例ではPCSK9阻害薬が選択肢になる。","C":"心筋梗塞後でもLDL-C 100 mg/dL未満なら治療強化は不要である。","D":"筋症状が出た場合はCKや薬剤相互作用を確認する。","E":"最大耐用量スタチンで不十分ならエゼチミブ追加を検討する。"},"correct":["A","B","D","E"],"comments":{"A":"正しい。既往があるためリスクが高い。","B":"正しい。費用や適応を含め検討する。","C":"誤り。リスク区分に応じた目標を確認する。","D":"正しい。副作用評価を行い耐用量を探る。","E":"正しい。非スタチン薬の段階的追加が問われる。"},"refs":["Grundy SM, et al. 2018 AHA/ACC Cholesterol Guideline. Circulation. 2019;139:e1082-e1143.","Virani SS, et al. 2022 ACC Expert Consensus Decision Pathway on Nonstatin Therapies. J Am Coll Cardiol. 2022;80:1366-1418.","Virani SS, et al. 2023 AHA/ACC Guideline for Chronic Coronary Disease. Circulation. 2023;148:e9-e119."]},{"number":7,"theme":"糖尿病：GLP-1受容体作動薬と体重管理","stem":"59歳、2型糖尿病、BMI 31。脂肪肝と高血圧を合併し、注射薬も許容できる。正しいものを全て選べ。","choices":{"A":"GLP-1受容体作動薬は体重減少効果を期待できる薬剤がある。","B":"妊娠希望があれば薬剤継続可否を事前に確認する。","C":"糖尿病治療では心血管・腎リスクも薬剤選択に反映する。","D":"インスリン分泌を促す薬と併用しても低血糖リスクは常にゼロである。","E":"悪心や嘔吐など消化器症状を説明する。"},"correct":["A","B","C","E"],"comments":{"A":"正しい。肥満合併糖尿病で検討される。","B":"正しい。妊娠可能年齢では重要な説明である。","C":"正しい。血糖値だけで選ばない。","D":"誤り。SU薬やインスリン併用時は注意する。","E":"正しい。開始時の代表的副作用である。"},"refs":["American Diabetes Association Professional Practice Committee. Standards of Care in Diabetes. Diabetes Care. 2026;49(Suppl 1). https://diabetesjournals.org/care/issue/49/Supplement_1"]},{"number":8,"theme":"心血管系：閉経後高血圧と家庭血圧","stem":"56歳、診察室血圧150/88、家庭血圧は朝135/84前後。閉経後に体重が増えた。正しいものを全て選べ。","choices":{"A":"閉経後は血圧上昇や内臓脂肪増加に注意する。","B":"家庭血圧は白衣高血圧や仮面高血圧の評価に役立つ。","C":"睡眠時無呼吸は高血圧の背景として確認する。","D":"減塩、運動、体重管理は薬物療法の有無にかかわらず重要である。","E":"家庭血圧が高めでも診察室血圧が正常なら管理不要である。"},"correct":["A","B","C","D"],"comments":{"A":"正しい。生活習慣介入の契機になる。","B":"正しい。診察室だけで判断しない。","C":"正しい。肥満や夜間症状があれば重要である。","D":"正しい。基本介入として問われる。","E":"誤り。仮面高血圧を見逃さない。"},"refs":["Virani SS, et al. 2023 AHA/ACC Guideline for Chronic Coronary Disease. Circulation. 2023;148:e9-e119."]},{"number":9,"theme":"脳血管障害：片頭痛治療薬と妊娠可能性","stem":"30歳、片頭痛発作が月6回。妊娠希望はまだないが避妊は不確実。予防薬を相談された。正しいものを全て選べ。","choices":{"A":"薬剤乱用頭痛を避けるため急性期薬の使用頻度を確認する。","B":"前兆を伴う片頭痛ではエストロゲン含有避妊薬の適否を確認する。","C":"ロメリジンは片頭痛予防薬として用いられることがある。","D":"妊娠可能性がある場合、バルプロ酸など催奇形性薬剤に注意する。","E":"妊娠可能性は神経疾患治療薬の選択に影響しない。"},"correct":["A","B","C","D"],"comments":{"A":"正しい。治療方針に関わる。","B":"正しい。脳卒中リスク評価につながる。","C":"正しい。昨年項目の周辺として薬剤名が出やすい。","D":"正しい。片頭痛予防薬選択で重要である。","E":"誤り。催奇形性や授乳への影響を考える。"},"refs":["CDC. U.S. Medical Eligibility Criteria for Contraceptive Use, 2024. MMWR Recomm Rep. 2024;73:1-126. https://www.cdc.gov/mmwr/volumes/73/rr/rr7304a1.htm","CDC. U.S. Selected Practice Recommendations for Contraceptive Use, 2024. MMWR Recomm Rep. 2024;73:1-77.","WHO. Violence against women health topic. https://www.who.int/health-topics/violence-against-women"]},{"number":10,"theme":"骨盤臓器脱：便秘と骨盤底症状","stem":"71歳、骨盤臓器脱と便秘があり、排便時に強くいきむ習慣がある。正しいものを全て選べ。","choices":{"A":"直腸瘤では排便困難や残便感が出ることがある。","B":"便秘管理は骨盤臓器脱症状の悪化予防に関係する。","C":"便秘があっても骨盤底症状とは一切関連しない。","D":"慢性的ないきみは骨盤底への負荷となる。","E":"食物繊維や水分摂取は個別の便通状況に応じて調整する。"},"correct":["A","B","D","E"],"comments":{"A":"正しい。前後腟壁の下垂症状を区別する。","B":"正しい。排便習慣の調整を行う。","C":"誤り。腹圧と骨盤底負荷に関係する。","D":"正しい。生活指導の具体例である。","E":"正しい。過不足や薬剤併用を確認する。"},"refs":["NICE Guideline NG123. Urinary incontinence and pelvic organ prolapse in women: management. 2019, updated. https://www.nice.org.uk/guidance/ng123"]},{"number":11,"theme":"FLUTS：尿失禁と薬剤性要因","stem":"67歳、尿漏れが悪化。最近利尿薬が夕食後に変更され、睡眠薬も追加された。正しいものを全て選べ。","choices":{"A":"多尿が主体なら排尿日誌で量と時刻を確認する。","B":"α遮断薬など血圧薬が尿失禁に影響することがある。","C":"利尿薬の服用時刻は夜間頻尿や切迫感に影響する。","D":"尿失禁では薬剤歴の確認は不要である。","E":"睡眠薬による覚醒低下は夜間尿失禁や転倒に関係する。"},"correct":["A","B","C","E"],"comments":{"A":"正しい。症状分類に役立つ。","B":"正しい。薬剤性の視点を持つ。","C":"正しい。服薬歴を確認する。","D":"誤り。増悪因子の検索に必須である。","E":"正しい。高齢者の実務的な論点である。"},"refs":["American Urological Association/SUFU. The diagnosis and treatment of idiopathic overactive bladder. 2024. https://www.auanet.org/guidelines-and-quality/guidelines/idiopathic-overactive-bladder","American Geriatrics Society 2023 updated AGS Beers Criteria. J Am Geriatr Soc. 2023;71:2052-2081."]},{"number":12,"theme":"脳機能：エピソード記憶と意味記憶","stem":"68歳、もの忘れ外来で『昨日の約束を忘れるが、言葉の意味や昔覚えた知識は保たれる』と訴える。正しいものを全て選べ。","choices":{"A":"個人的出来事の記憶はエピソード記憶に分類される。","B":"エピソード記憶障害があれば原因に関係なくアルツハイマー病と確定する。","C":"語彙や一般知識は意味記憶に分類される。","D":"加齢では処理速度や新規学習が低下しやすい。","E":"記憶低下を訴える高齢者ではうつ症状や睡眠も確認する。"},"correct":["A","C","D","E"],"comments":{"A":"正しい。昨年項目の周辺知識である。","B":"誤り。診断は総合評価で行う。","C":"正しい。記憶分類の基本である。","D":"正しい。正常加齢と病的低下を分ける。","E":"正しい。可逆的・併存要因を評価する。"},"refs":["American Geriatrics Society 2023 updated AGS Beers Criteria. J Am Geriatr Soc. 2023;71:2052-2081."]},{"number":13,"theme":"精神疾患系：アルコールと更年期症状","stem":"52歳、ホットフラッシュと不眠があり、寝酒が増えている。正しいものを全て選べ。","choices":{"A":"不眠があれば寝酒を睡眠薬代わりに推奨する。","B":"飲酒は乳がんリスク上昇と関連する。","C":"更年期症状のセルフケアでは飲酒量の確認が重要である。","D":"大量飲酒は骨折リスクにも関係しうる。","E":"アルコールは睡眠の質を悪化させることがある。"},"correct":["B","C","D","E"],"comments":{"A":"誤り。依存や睡眠障害悪化の問題がある。","B":"正しい。生活指導で問われる。","C":"正しい。症状、体重、血圧にも影響する。","D":"正しい。転倒や骨健康の観点でも重要である。","E":"正しい。入眠しやすく感じても中途覚醒を増やすことがある。"},"refs":["American Psychiatric Association. Diagnostic and Statistical Manual of Mental Disorders, Fifth Edition, Text Revision. 2022.","NICE Guideline NG222. Depression in adults: treatment and management. 2022. https://www.nice.org.uk/guidance/ng222","US Preventive Services Task Force. Screening for Breast Cancer: Recommendation Statement. JAMA. 2024;331:1918-1930. https://www.uspreventiveservicestaskforce.org/uspstf/recommendation/breast-cancer-screening","LeBoff MS, et al. The clinician's guide to prevention and treatment of osteoporosis. Osteoporos Int. 2022;33:2049-2102."]},{"number":14,"theme":"乳がん系：マンモグラフィカテゴリー後の精査","stem":"検診マンモグラフィで要精査となった。患者は『がん確定ですか』と不安が強い。正しいものを全て選べ。","choices":{"A":"石灰化の形態や分布は悪性度評価の手がかりになる。","B":"カテゴリー判定は患者説明に使えるが病理診断の代替ではない。","C":"要精査通知を受けても自覚症状がなければ放置してよい。","D":"要精査は精密検査が必要という意味で、がん確定ではない。","E":"超音波、追加撮影、針生検などを所見に応じて選択する。"},"correct":["A","B","D","E"],"comments":{"A":"正しい。マンモグラフィ読影の基本である。","B":"正しい。最終診断は必要に応じて組織診で行う。","C":"誤り。指定された精査を受ける必要がある。","D":"正しい。偽陽性を含むことを説明する。","E":"正しい。所見別に精査を組み立てる。"},"refs":["US Preventive Services Task Force. Screening for Breast Cancer: Recommendation Statement. JAMA. 2024;331:1918-1930. https://www.uspreventiveservicestaskforce.org/uspstf/recommendation/breast-cancer-screening"]},{"number":15,"theme":"検査・治療：骨盤臓器脱の術前評価","stem":"進行骨盤臓器脱に対して手術を検討。患者は術後の尿漏れと性交機能を心配している。正しいものを全て選べ。","choices":{"A":"子宮温存希望があれば術式選択に反映することがある。","B":"術前説明では再発リスクに触れない方がよい。","C":"術前には排尿症状、残尿、潜在性尿失禁を評価する。","D":"性機能や腟長への影響は本人の関心に応じて説明する。","E":"メッシュ使用の有無と合併症リスクを具体的に説明する。"},"correct":["A","C","D","E"],"comments":{"A":"正しい。本人希望と医学的条件を合わせる。","B":"誤り。再発や再手術可能性も説明する。","C":"正しい。術後症状の説明に関わる。","D":"正しい。QOLに直結する。","E":"正しい。材料選択は重要な同意事項である。"},"refs":["NICE Guideline NG123. Urinary incontinence and pelvic organ prolapse in women: management. 2019, updated. https://www.nice.org.uk/guidance/ng123"]},{"number":16,"theme":"検査・治療：β3作動薬の併用注意","stem":"70歳、OABにミラベグロンを開始予定。高血圧治療中で動悸の訴えがある。正しいものを全て選べ。","choices":{"A":"β3作動薬は血圧や脈拍に全く影響しないため問診不要である。","B":"ミラベグロンでは血圧上昇や頻脈に注意する。","C":"薬剤相互作用としてCYP2D6関連薬の確認が必要になることがある。","D":"残尿が多い患者では尿閉悪化に注意する。","E":"抗コリン薬で便秘が強い例ではβ3作動薬が代替候補になる。"},"correct":["B","C","D","E"],"comments":{"A":"誤り。既往やバイタルを確認する。","B":"正しい。循環器症状がある例では確認する。","C":"正しい。併用薬確認の論点である。","D":"正しい。OAB薬全般で排出障害を見逃さない。","E":"正しい。副作用プロファイルを使い分ける。"},"refs":["American Urological Association/SUFU. The diagnosis and treatment of idiopathic overactive bladder. 2024. https://www.auanet.org/guidelines-and-quality/guidelines/idiopathic-overactive-bladder"]},{"number":17,"theme":"検査・治療：閉経後出血の初期評価","stem":"61歳、閉経後5年で少量の性器出血。MHTは使用していない。正しいものを全て選べ。","choices":{"A":"閉経後出血では悪性疾患を含めた評価を行う。","B":"腟萎縮や頸管病変も鑑別に含める。","C":"経腟超音波で内膜厚を確認することがある。","D":"少量なら全例検査不要で経過観察だけにする。","E":"内膜が厚い、または出血が持続する場合は内膜組織検査を考える。"},"correct":["A","B","C","E"],"comments":{"A":"正しい。放置しない症状である。","B":"正しい。出血源を分けて考える。","C":"正しい。初期評価の一つである。","D":"誤り。閉経後出血は評価対象である。","E":"正しい。リスクに応じて組織診へ進む。"},"refs":["The 2022 hormone therapy position statement of The North American Menopause Society. Menopause. 2022;29:767-794."]},{"number":18,"theme":"検査・治療：ワクチン接種後の妊娠相談","stem":"妊娠希望女性が風疹ワクチン接種について相談。抗体価は低い。正しいものを全て選べ。","choices":{"A":"接種後は一定期間避妊を説明する。","B":"同居家族の風疹免疫状況も確認する。","C":"風疹ワクチンは生ワクチンであり妊娠中は接種しない。","D":"ワクチン接種歴は母子手帳などで確認する。","E":"妊娠判明後に抗体低値がわかれば直ちに接種する。"},"correct":["A","B","C","D"],"comments":{"A":"正しい。妊娠前カウンセリングの重要点である。","B":"正しい。周囲からの感染予防も考える。","C":"正しい。妊娠前に確認する。","D":"正しい。記録確認が実務的である。","E":"誤り。妊娠中は接種せず産後接種を検討する。"},"refs":["CDC. U.S. Selected Practice Recommendations for Contraceptive Use, 2024. MMWR Recomm Rep. 2024;73:1-77.","WHO. Violence against women health topic. https://www.who.int/health-topics/violence-against-women"]},{"number":19,"theme":"その他：閉経後のロコモとフレイル","stem":"73歳、外出頻度が減り、片脚立ちが不安定。体重も半年で4kg減少。正しいものを全て選べ。","choices":{"A":"サルコペニアでは筋量と筋力・身体機能を評価する。","B":"体重減少があれば運動を禁止し栄養評価は不要である。","C":"フレイルでは体重減少、疲労感、活動量低下などを確認する。","D":"骨粗鬆症、転倒、筋力低下は別々に見えて相互に関連する。","E":"ロコモでは移動機能低下を評価する。"},"correct":["A","C","D","E"],"comments":{"A":"正しい。握力や歩行速度が使われる。","B":"誤り。栄養、疾患、運動処方を総合する。","C":"正しい。可逆性のある虚弱として介入対象になる。","D":"正しい。包括的介入が重要である。","E":"正しい。運動器の視点である。"},"refs":["LeBoff MS, et al. The clinician's guide to prevention and treatment of osteoporosis. Osteoporos Int. 2022;33:2049-2102."]},{"number":20,"theme":"その他：外陰部皮膚疾患と悪性化リスク","stem":"66歳、外陰部の強い掻痒と白色局面。市販薬で改善しない。正しいものを全て選べ。","choices":{"A":"掻痒があれば全例カンジダとして抗真菌薬だけを継続する。","B":"硬化性苔癬では強い掻痒と白色萎縮性局面を認めることがある。","C":"治療では高力価ステロイド外用が用いられることがある。","D":"外陰扁平上皮癌との鑑別のため難治性病変では生検を検討する。","E":"慢性外陰症状では生活指導とフォローも重要である。"},"correct":["B","C","D","E"],"comments":{"A":"誤り。皮膚疾患や腫瘍性病変を鑑別する。","B":"正しい。閉経後外陰疾患として重要である。","C":"正しい。外陰カンジダとは治療が異なる。","D":"正しい。悪性化や併存病変を見逃さない。","E":"正しい。刺激回避や再燃確認を行う。"},"refs":["CDC. U.S. Selected Practice Recommendations for Contraceptive Use, 2024. MMWR Recomm Rep. 2024;73:1-77.","WHO. Violence against women health topic. https://www.who.int/health-topics/violence-against-women"]}];const STORAGE_KEY='womens_med_20260624_set5_v1';const LETTERS=['A','B','C','D','E'];let state={answers:{},memos:{}},storageOk=true;const $=s=>document.querySelector(s);function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function normalize(v){const seen=new Set();String(v||'').toUpperCase().split('').forEach(ch=>{if(LETTERS.includes(ch))seen.add(ch)});return LETTERS.filter(ch=>seen.has(ch)).join('')}function same(a,b){return normalize(a)===LETTERS.filter(ch=>b.includes(ch)).join('')}function warn(m){const el=$('#storage-warning');el.hidden=false;el.textContent=m}function load(){try{const raw=localStorage.getItem(STORAGE_KEY);if(raw)state=JSON.parse(raw);state.answers=state.answers||{};state.memos=state.memos||{}}catch(e){storageOk=false;warn('保存データを読み込めませんでした。')}}function save(){if(!storageOk)return;try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));$('#save-status').textContent='保存しました。'}catch(e){storageOk=false;warn('localStorageへ保存できませんでした。')}}function renderQuestions(){$('#questions-root').innerHTML=QUESTIONS.map(q=>`<article class="question-card"><h3><span class="qno">第${q.number}問</span></h3><p class="stem">${esc(q.stem)}</p><div class="choices" role="group" aria-label="第${q.number}問の選択肢">${LETTERS.map(L=>`<button type="button" class="choice" data-q="${q.number}" data-choice="${L}" aria-pressed="false"><span class="letter">${L}</span><span>${esc(q.choices[L])}</span></button>`).join('')}</div><div class="answer-row"><div><label for="answer-${q.number}">回答記入欄</label><input id="answer-${q.number}" class="answer-input" data-q="${q.number}" maxlength="5" inputmode="latin" autocomplete="off" aria-label="第${q.number}問の回答記入欄"><div class="hint">A-Eのみ保存</div></div><div><label for="memo-${q.number}">メモ欄</label><textarea id="memo-${q.number}" data-q="${q.number}" aria-label="第${q.number}問のメモ欄"></textarea></div></div></article>`).join('');QUESTIONS.forEach(q=>{const a=$(`#answer-${q.number}`),m=$(`#memo-${q.number}`);a.value=normalize(state.answers[q.number]||'');m.value=state.memos[q.number]||'';updateChoice(q.number)})}function renderExplanations(){$('#explanations-root').innerHTML=QUESTIONS.map(q=>`<article class="explain-card"><h3><span class="qno">第${q.number}問</span></h3><p><span class="theme-pill">関連テーマ：${esc(q.theme)}</span> <span class="judge blank" data-judge="${q.number}">未回答</span></p><div class="reprint"><p class="stem">${esc(q.stem)}</p><ol type="A">${LETTERS.map(L=>`<li>${esc(q.choices[L])}</li>`).join('')}</ol></div><p><strong>答案者の回答：</strong><span data-exam-answer="${q.number}">未回答</span></p><p><strong>正答：</strong>${q.correct.join('')}</p>${LETTERS.map(L=>`<div class="option-comment ${q.correct.includes(L)?'correct':''}"><strong>${L}：</strong>${esc(q.comments[L])}</div>`).join('')}<h4>根拠文献</h4><ul class="refs">${q.refs.map(r=>`<li>${esc(r)}</li>`).join('')}</ul></article>`).join('');QUESTIONS.forEach(q=>updateJudge(q.number))}function setAnswer(n,v){const ans=normalize(v);if(ans)state.answers[n]=ans;else delete state.answers[n];const input=$(`#answer-${n}`);if(input&&input.value!==ans)input.value=ans;updateChoice(n);updateJudge(n);renderSummary();save()}function toggle(n,L){const cur=new Set(normalize(state.answers[n]||'').split('').filter(Boolean));cur.has(L)?cur.delete(L):cur.add(L);setAnswer(n,LETTERS.filter(x=>cur.has(x)).join(''))}function setMemo(n,v){state.memos[n]=v;renderSummary();save()}function updateChoice(n){const ans=normalize(state.answers[n]||'');document.querySelectorAll(`.choice[data-q="${n}"]`).forEach(btn=>{const on=ans.includes(btn.dataset.choice);btn.classList.toggle('selected',on);btn.setAttribute('aria-pressed',on?'true':'false')})}function updateJudge(n){const q=QUESTIONS.find(x=>x.number===Number(n));if(!q)return;const ans=normalize(state.answers[n]||''),a=document.querySelector(`[data-exam-answer="${n}"]`),j=document.querySelector(`[data-judge="${n}"]`);if(a)a.textContent=ans||'未回答';if(j){const ok=ans&&same(ans,q.correct);j.className='judge '+(!ans?'blank':ok?'ok':'bad');j.textContent=!ans?'未回答':ok?'正解':'不正解'}}function renderSummary(){$('#summary-root').innerHTML=QUESTIONS.map(q=>{const ans=normalize(state.answers[q.number]||'')||'未回答',memo=state.memos[q.number]||'';return `<div class="summary-item"><strong>第${q.number}問</strong>
回答：${esc(ans)}
メモ：${esc(memo||'なし')}</div>`}).join('')}function summaryText(){return QUESTIONS.map(q=>{const ans=normalize(state.answers[q.number]||'')||'未回答';const memo=state.memos[q.number]||'なし';return '第'+q.number+'問\n回答：'+ans+'\nメモ：'+memo}).join('\n\n')}async function copySummary(){const t=summaryText(),s=$('#copy-status');try{if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(t);s.textContent='コピーしました。';return}}catch(e){}const ta=document.createElement('textarea');ta.value=t;ta.readOnly=true;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();try{s.textContent=document.execCommand('copy')?'コピーしました。':'コピーできませんでした。'}catch(e){s.textContent='コピーできませんでした。'}document.body.removeChild(ta)}function clearAll(){if(!confirm('入力内容をすべて消去します。よろしいですか？'))return;state={answers:{},memos:{}};try{localStorage.removeItem(STORAGE_KEY)}catch(e){}QUESTIONS.forEach(q=>{const a=$(`#answer-${q.number}`),m=$(`#memo-${q.number}`);if(a)a.value='';if(m)m.value='';updateChoice(q.number);updateJudge(q.number)});renderSummary();save()}document.addEventListener('DOMContentLoaded',()=>{load();renderQuestions();renderSummary();renderExplanations();document.addEventListener('click',e=>{const b=e.target.closest('.choice');if(b)toggle(Number(b.dataset.q),b.dataset.choice)});document.addEventListener('input',e=>{if(e.target.classList.contains('answer-input'))setAnswer(Number(e.target.dataset.q),e.target.value);if(e.target.tagName==='TEXTAREA')setMemo(Number(e.target.dataset.q),e.target.value)});document.addEventListener('keydown',e=>{if(e.target.classList.contains('choice')&&(e.key===' '||e.key==='Enter')){e.preventDefault();toggle(Number(e.target.dataset.q),e.target.dataset.choice)}});$('#copy-btn').addEventListener('click',copySummary);$('#clear-btn').addEventListener('click',clearAll)});</script><nav class="main-page-link bottom" aria-label="main page link bottom"><a href="index.html">問題集一覧へ戻る</a></nav></body></html>
