urrent evaluation of amenorrhea: a committee opinion. 2024. URL: https://www.asrm.org/practice-guidance/practice-committee-documents/current-evaluation-of-amenorrhea-a-committee-opinion-2024/ . 反映: 無月経では妊娠除外、FSH/LH/E2/TSH/PRL、解剖学的評価を組み合わせる。"]},{"number":2,"theme":"乳房発育あり・周期的腹痛ありでの血腫留症を疑う診察所見","stem":"思春期女性が初経未発来で受診し、二次性徴、身長、骨年齢、内分泌値、性行動歴の確認が必要になった。 次の記述のうち正しいものを全て選べ。","choices":{"A":"FSH高値なら中枢性低ゴナドトロピン性無月経が典型である。","B":"染色体検査では検査前説明と心理的支援を考慮する。","C":"子宮が描出されれば内分泌評価は不要である。","D":"原発性無月経では骨量評価は成人後まで不要である。","E":"妊娠反応、FSH/LH、E2、TSH、PRLを初期評価に含める。"},"correct":["B","E"],"comments":{"A":"誤り。FSH高値なら中枢性低ゴナドトロピン性無月経が典型である。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","B":"正しい。染色体検査では検査前説明と心理的支援を考慮する。 試験対策上は症例背景に合わせて適用する。","C":"誤り。子宮が描出されれば内分泌評価は不要である。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","D":"誤り。原発性無月経では骨量評価は成人後まで不要である。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","E":"正しい。妊娠反応、FSH/LH、E2、TSH、PRLを初期評価に含める。 試験対策上は症例背景に合わせて適用する。"},"refs":["ASRM Practice Committee. Current evaluation of amenorrhea: a committee opinion. 2024. URL: https://www.asrm.org/practice-guidance/practice-committee-documents/current-evaluation-of-amenorrhea-a-committee-opinion-2024/ . 反映: 無月経では妊娠除外、FSH/LH/E2/TSH/PRL、解剖学的評価を組み合わせる。"]},{"number":3,"theme":"乳がん検診の利益・不利益を年齢階級別に説明する視点","stem":"無症状女性の検診結果を説明し、精密検査、偽陽性、過剰診断、検診間隔を整理する場面である。 次の記述のうち正しいものを全て選べ。","choices":{"A":"検診陽性後は制度に応じた精密検査へ確実につなぐ。","B":"腫瘍マーカー陰性なら早期がんは否定できる。","C":"陽性結果は再度同じ検診を行い陰性なら精査不要とする。","D":"検診では死亡率低下だけでなく偽陽性、過剰診断、不安も説明する。","E":"感度が高い検査では偽陽性は発生しない。"},"correct":["A","D"],"comments":{"A":"正しい。検診陽性後は制度に応じた精密検査へ確実につなぐ。 試験対策上は症例背景に合わせて適用する。","B":"誤り。腫瘍マーカー陰性なら早期がんは否定できる。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","C":"誤り。陽性結果は再度同じ検診を行い陰性なら精査不要とする。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","D":"正しい。検診では死亡率低下だけでなく偽陽性、過剰診断、不安も説明する。 試験対策上は症例背景に合わせて適用する。","E":"誤り。感度が高い検査では偽陽性は発生しない。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。"},"refs":["USPSTF. Screening for Breast Cancer: Recommendation Statement. JAMA. 2024. DOI: 10.1001/jama.2024.5534 / WHO. Cervical pre-cancer screening gu 次性脂質異常症としての甲状腺機能低下症・ネフローゼ・薬剤","stem":"閉経後女性で脂質異常を指摘され、一次予防、二次予防、二次性原因、薬剤副作用を整理する。 次の記述のうち正しいものを全て選べ。","choices":{"A":"スタチン筋症状ではCK、甲状腺、相互作用薬を確認する。","B":"閉経後の脂質異常は全て原発性で原因検索は不要である。","C":"non-HDL-Cは総コレステロールからHDL-Cを差し引いて算出する。","D":"HDL-Cが高ければ既往に関係なくLDL-C管理は不要である。","E":"筋痛があれば脂質低下療法は永久に全て中止する。"},"correct":["A","C"],"comments":{"A":"正しい。スタチン筋症状ではCK、甲状腺、相互作用薬を確認する。 試験対策上は症例背景に合わせて適用する。","B":"誤り。閉経後の脂質異常は全て原発性で原因検索は不要である。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","C":"正しい。non-HDL-Cは総コレステロールからHDL-Cを差し引いて算出する。 試験対策上は症例背景に合わせて適用する。","D":"誤り。HDL-Cが高ければ既往に関係なくLDL-C管理は不要である。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","E":"誤り。筋痛があれば脂質低下療法は永久に全て中止する。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。"},"refs":["日本動脈硬化学会. 動脈硬化性疾患予防ガイドライン2022年版. 2022. URL: https://www.j-athero.org/ . 反映: LDL-C、non-HDL-C、二次性脂質異常、リスク層別化。"]},{"number":7,"theme":"GDM既往女性の産後糖尿病スクリーニングと長期フォロー","stem":"糖代謝異常を持つ女性で、年齢、妊娠歴、腎機能、心血管リスク、低血糖リスクを踏まえて評価する。 次の記述のうち正しいものを全て選べ。","choices":{"A":"HbA1cが正常なら食後高血糖は存在しない。","B":"全高齢者でHbA1c 6.0%未満を目指す。","C":"高齢者では低血糖、認知機能、腎機能、服薬管理能力を考慮して目標を個別化する。","D":"分娩後に血糖が正常ならGDM既往の長期フォローは不要である。","E":"GDM既往では産後OGTTや長期スクリーニングを検討する。"},"correct":["C","E"],"comments":{"A":"誤り。HbA1cが正常なら食後高血糖は存在しない。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","B":"誤り。全高齢者でHbA1c 6.0%未満を目指す。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","C":"正しい。高齢者では低血糖、認知機能、腎機能、服薬管理能力を考慮して目標を個別化する。 試験対策上は症例背景に合わせて適用する。","D":"誤り。分娩後に血糖が正常ならGDM既往の長期フォローは不要である。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","E":"正しい。GDM既往では産後OGTTや長期スクリーニングを検討する。 試験対策上は症例背景に合わせて適用する。"},"refs":["American Diabetes Association. Standards of Care in Diabetes. Diabetes Care. 2024-2026. URL: https://diabetesjournals.org/care . 反映: 糖尿病合併症、GDM既往、GLP-1RA、個別化目標。"]},{"number":8,"theme":"閉経後女性の動悸で鑑別する甲状腺機能亢進・不整脈・不安症","stem":"更年期症状を訴える女性で、HRTの適応、安全性、内科疾患の鑑別、不正出血対応を考える。 次の記述のうち正しいものを全て選べ。","choices":{"A":"HRT中でも持続・増量する不正出血は評価する。","B":"60歳以上または閉経後10年超の新規開始ではリスク便益を慎重に個別化する。","C":"HRT中の出血は全て正常で評価不要である。","D":"動悸や体重減少が目立つ場合は甲状腺疾患や不整脈も鑑別する。","E":"HRTは心血管疾患の二次予防目的に開始する。"},"correct":["A","B","D"],"comments" n('')}<h4>根拠文献</h4><ul class="refs">${q.refs.map(r=>`<li>${esc(r)}</li>`).join('')}</ul></article>`).join('');QUESTIONS.forEach(q=>updateJudge(q.number))}function setAnswer(n,v){const ans=normalize(v);if(ans)state.answers[n]=ans;else delete state.answers[n];const input=$(`#answer-${n}`);if(input&&input.value!==ans)input.value=ans;updateChoice(n);updateJudge(n);renderSummary();save()}function toggle(n,L){const cur=new Set(normalize(state.answers[n]||'').split('').filter(Boolean));cur.has(L)?cur.delete(L):cur.add(L);setAnswer(n,LETTERS.filter(x=>cur.has(x)).join(''))}function setMemo(n,v){state.memos[n]=v;renderSummary();save()}function updateChoice(n){const ans=normalize(state.answers[n]||'');document.querySelectorAll(`.choice[data-q="${n}"]`).forEach(btn=>{const on=ans.includes(btn.dataset.choice);btn.classList.toggle('selected',on);btn.setAttribute('aria-pressed',on?'true':'false')})}function updateJudge(n){const q=QUESTIONS.find(x=>x.number===Number(n));if(!q)return;const ans=normalize(state.answers[n]||''),a=document.querySelector(`[data-exam-answer="${n}"]`),j=document.querySelector(`[data-judge="${n}"]`);if(a)a.textContent=ans||'未回答';if(j){const ok=ans&&same(ans,q.correct);j.className='judge '+(!ans?'blank':ok?'ok':'bad');j.textContent=!ans?'未回答':ok?'正解':'不正解'}}function renderSummary(){$('#summary-root').innerHTML=QUESTIONS.map(q=>{const ans=normalize(state.answers[q.number]||'')||'未回答',memo=state.memos[q.number]||'';return `<div class="summary-item"><strong>第${q.number}問</strong>
回答：${esc(ans)}
メモ：${esc(memo||'なし')}</div>`}).join('')}function summaryText(){return QUESTIONS.map(q=>{const ans=normalize(state.answers[q.number]||'')||'未回答';const memo=state.memos[q.number]||'なし';return '第'+q.number+'問\n回答：'+ans+'\nメモ：'+memo}).join('\n\n')}async function copySummary(){const t=summaryText(),s=$('#copy-status');try{if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(t);s.textContent='コピーしました。';return}}catch(e){}const ta=document.createElement('textarea');ta.value=t;ta.readOnly=true;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();try{s.textContent=document.execCommand('copy')?'コピーしました。':'コピーできませんでした。'}catch(e){s.textContent='コピーできませんでした。'}document.body.removeChild(ta)}function clearAll(){if(!confirm('入力内容をすべて消去します。よろしいですか？'))return;state={answers:{},memos:{}};try{localStorage.removeItem(STORAGE_KEY)}catch(e){}QUESTIONS.forEach(q=>{const a=$(`#answer-${q.number}`),m=$(`#memo-${q.number}`);if(a)a.value='';if(m)m.value='';updateChoice(q.number);updateJudge(q.number)});renderSummary();save()}document.addEventListener('DOMContentLoaded',()=>{load();renderQuestions();renderSummary();renderExplanations();document.addEventListener('click',e=>{const b=e.target.closest('.choice');if(b)toggle(Number(b.dataset.q),b.dataset.choice)});document.addEventListener('input',e=>{if(e.target.classList.contains('answer-input'))setAnswer(Number(e.target.dataset.q),e.target.value);if(e.target.tagName==='TEXTAREA')setMemo(Number(e.target.dataset.q),e.target.value)});document.addEventListener('keydown',e=>{if(e.target.classList.contains('choice')&&(e.key===' '||e.key==='Enter')){e.preventDefault();toggle(Number(e.target.dataset.q),e.target.dataset.choice)}});$('#copy-btn').addEventListener('click',copySummary);$('#clear-btn').addEventListener('click',clearAll)});</script></body></html>
