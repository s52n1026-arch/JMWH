portant}.question-card,.summary-card,.explain-card{box-shadow:none;page-break-inside:avoid;break-inside:avoid}.answers-section{break-before:page;page-break-before:always}h2,h3{page-break-after:avoid}.choice,.option-comment{break-inside:avoid}textarea{min-height:42px}}</style></head><body><header><h1>女性医学専門医 5択複数正答問題集 セット2</h1><p class="meta">作成日：2026年6月24日 / 各問A-Eから正しいものを全て選択</p><p class="hint">選択肢カードをクリックすると選択・解除できます。回答欄へ直接入力する場合は、例：AC のように入力してください。</p><div id="storage-warning" class="notice" hidden></div><div class="toolbar"><button id="clear-btn" class="btn secondary" type="button">入力内容を消去</button><span id="save-status" class="status-line" aria-live="polite"></span></div></header><main><section aria-labelledby="exam-title"><h2 id="exam-title">試験問題</h2><div id="questions-root"></div></section><section aria-labelledby="summary-title"><h2 id="summary-title">回答記録（まとめ）</h2><div id="summary-root" class="summary-card" aria-live="polite"></div><div class="toolbar"><button id="copy-btn" class="btn" type="button">回答とメモをコピー</button><span id="copy-status" class="status-line" aria-live="polite"></span></div></section><section class="answers-section" aria-labelledby="answers-title"><h2 id="answers-title">回答・解説</h2><div id="explanations-root"></div></section></main><script>const QUESTIONS=[{"number":1,"theme":"乳房発育あり・子宮あり原発性無月経での腟横中隔と処女膜閉鎖の鑑別","stem":"思春期女性が初経未発来で受診し、二次性徴、身長、骨年齢、内分泌値、性行動歴の確認が必要になった。 次の記述のうち正しいものを全て選べ。","choices":{"A":"乳房発育があれば妊娠反応は不要である。","B":"染色体検査では検査前説明と心理的支援を考慮する。","C":"FSH高値なら中枢性低ゴナドトロピン性無月経が典型である。","D":"子宮が描出されれば内分泌評価は不要である。","E":"原発性無月経では骨量評価は成人後まで不要である。"},"correct":["B"],"comments":{"A":"誤り。乳房発育があれば妊娠反応は不要である。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","B":"正しい。染色体検査では検査前説明と心理的支援を考慮する。 試験対策上は症例背景に合わせて適用する。","C":"誤り。FSH高値なら中枢性低ゴナドトロピン性無月経が典型である。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","D":"誤り。子宮が描出されれば内分泌評価は不要である。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","E":"誤り。原発性無月経では骨量評価は成人後まで不要である。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。"},"refs":["ASRM Practice Committee. Current evaluation of amenorrhea: a committee opinion. 2024. URL: https://www.asrm.org/practice-guidance/practice-committee-documents/current-evaluation-of-amenorrhea-a-committee-opinion-2024/ . 反映: 無月経では妊娠除外、FSH/LH/E2/TSH/PRL、解剖学的評価を組み合わせる。"]},{"number":2,"theme":"原発性無月経での骨年齢遅延と体質性思春期遅発の判断","stem":"思春期女性が初経未発来で受診し、二次性徴、身長、骨年齢、内分泌値、性行動歴の確認が必要になった。 次の記述のうち正しいものを全て選べ。","choices":{"A":"妊娠反応、FSH/LH、E2、TSH、PRLを初期評価に含める。","B":"治療適応や検査選択では、年齢だけでなく閉経状態と併存疾患を併せて評価する。","C":"原発性無月経では骨量評価は成人後まで不要である。","D":"二次性徴、子宮の有無、ゴナドトロピン値を組み合わせて鑑別する。","E":"低エストロゲンが長期化する場合は骨量獲得不全を意識する。"},"correct":["A","B","D","E"],"comments":{"A":"正しい。妊娠反応、FSH/LH、E2、TSH、PRLを初期評価に含める。 試験対策上は症例背景に合わせて適用する。","B":"正しい。女性医学専門医試験では、年齢単独ではなく閉経状態、既往、併存疾患を組み合わせる判断が問われやすい。","C":"誤り。原発性無月経では骨量評価は成人後まで不要である。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","D":"正しい。二次性徴、子宮の有無、ゴナドトロピン値を組み合わせて鑑別する。 試験対策上は症例背景に合わせて適用する。","E":"正しい。低エストロゲンが長期化する場合は骨量獲得不全を意識する。 試験対策上は症例背景に合わせて適用する。"},"refs":["ASRM Practice Committee. Current evaluation of amenorrhea: a committee opinion. 2024. URL: https://www.asrm.org/practice-guidance/practice-committee-documents/current-evaluation-of-amenorrhea-a-committee-opinion-2024/ . 反映: 無月経では妊娠除外、FSH/LH/E2/TSH/PRL、解剖学的評価を組み合わせる。"]},{"number":3,"theme":"乳がん検診で要精検後のカテゴリー分類と精密検査への接続","stem":"無症状女性の検診結果を説明し、精密検査、偽陽性、過剰診断、検診間隔を整理する場面である。 次の記述のうち正しいものを全て選べ。","choices":{"A":"陽性結果は再度同じ検診を行い陰性なら精査不要とする。","B":"感度が高い検査では偽陽性は発生しない。","C":"検診では死亡率低下だけでなく偽陽性、過剰診断、不安も説明する。","D":"検診の利益があれば不利益の説明は不要である。","E":"陽性的中率は有病率の影響を受ける。"},"correct":["C","E"],"comments":{"A":"誤り。陽性結果は再度同じ検診を行い陰性なら精査不要とする。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","B":"誤り。感度が高い検査では偽陽性は発生しない。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","C":"正しい。検診では死亡率低下だけでなく偽陽性、過剰診断、不安も説明する。 試験対策上は症例背景に合わせて適用する。","D":"誤り。検診の利益があれば不利益の説明は不要である。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","E":"正しい。陽性的中率は有病率の影響を受ける。 試験対策上は症例背景に合わせて適用する。"},"refs":["USPSTF. Screening for Breast Cancer: Recommendation Statement. JAMA. 2024. DOI: 10.1001/jama.2024.5534 / WHO. Cervical pre-cancer screening gui 防・二次予防の目標差","stem":"閉経後女性で脂質異常を指摘され、一次予防、二次予防、二次性原因、薬剤副作用を整理する。 次の記述のうち正しいものを全て選べ。","choices":{"A":"HDL-Cが高ければ既往に関係なくLDL-C管理は不要である。","B":"non-HDL-Cは総コレステロールからHDL-Cを差し引いて算出する。","C":"二次性脂質異常として甲状腺機能低下症、糖尿病、腎疾患、薬剤を確認する。","D":"筋痛があれば脂質低下療法は永久に全て中止する。","E":"non-HDL-CはLDL-CとHDL-Cを足した値である。"},"correct":["B","C"],"comments":{"A":"誤り。HDL-Cが高ければ既往に関係なくLDL-C管理は不要である。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","B":"正しい。non-HDL-Cは総コレステロールからHDL-Cを差し引いて算出する。 試験対策上は症例背景に合わせて適用する。","C":"正しい。二次性脂質異常として甲状腺機能低下症、糖尿病、腎疾患、薬剤を確認する。 試験対策上は症例背景に合わせて適用する。","D":"誤り。筋痛があれば脂質低下療法は永久に全て中止する。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","E":"誤り。non-HDL-CはLDL-CとHDL-Cを足した値である。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。"},"refs":["日本動脈硬化学会. 動脈硬化性疾患予防ガイドライン2022年版. 2022. URL: https://www.j-athero.org/ . 反映: LDL-C、non-HDL-C、二次性脂質異常、リスク層別化。"]},{"number":7,"theme":"GLP-1受容体作動薬の体重減少効果と消化器副作用","stem":"糖代謝異常を持つ女性で、年齢、妊娠歴、腎機能、心血管リスク、低血糖リスクを踏まえて評価する。 次の記述のうち正しいものを全て選べ。","choices":{"A":"GDM既往では産後OGTTや長期スクリーニングを検討する。","B":"全高齢者でHbA1c 6.0%未満を目指す。","C":"GLP-1受容体作動薬には体重減少や心血管アウトカムを期待できる薬剤がある。","D":"HbA1cは赤血球寿命や妊娠、腎不全などの影響を受ける。","E":"分娩後に血糖が正常ならGDM既往の長期フォローは不要である。"},"correct":["A","C","D"],"comments":{"A":"正しい。GDM既往では産後OGTTや長期スクリーニングを検討する。 試験対策上は症例背景に合わせて適用する。","B":"誤り。全高齢者でHbA1c 6.0%未満を目指す。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","C":"正しい。GLP-1受容体作動薬には体重減少や心血管アウトカムを期待できる薬剤がある。 試験対策上は症例背景に合わせて適用する。","D":"正しい。HbA1cは赤血球寿命や妊娠、腎不全などの影響を受ける。 試験対策上は症例背景に合わせて適用する。","E":"誤り。分娩後に血糖が正常ならGDM既往の長期フォローは不要である。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。"},"refs":["American Diabetes Association. Standards of Care in Diabetes. Diabetes Care. 2024-2026. URL: https://diabetesjournals.org/care . 反映: 糖尿病合併症、GDM既往、GLP-1RA、個別化目標。"]},{"number":8,"theme":"心不全女性でのHFpEF優位と肥満・高血圧との関連","stem":"女性の心血管・脳血管症状について、閉経、血圧、喫煙、不整脈、抗凝固などの背景を含めて判断する。 次の記述のうち正しいものを全て選べ。","choices":{"A":"診察室血圧だけ正常なら家庭血圧は不要である。","B":"家庭血圧や外来外血圧は白衣・仮面高血圧の評価に有用である。","C":"転倒歴が1回あれば抗凝固薬は全例中止する。","D":"症状が消えればTIA後の脳梗塞リスクは通常と同じである。","E":"心房細動や抗凝固では脳卒中リスクと出血リスクを併せて評価する。"},"correct":["B","E"],"comments" ong>正答：</strong>${q.correct.join('')}</p>${LETTERS.map(L=>`<div class="option-comment ${q.correct.includes(L)?'correct':''}"><strong>${L}：</strong>${esc(q.comments[L])}</div>`).join('')}<h4>根拠文献</h4><ul class="refs">${q.refs.map(r=>`<li>${esc(r)}</li>`).join('')}</ul></article>`).join('');QUESTIONS.forEach(q=>updateJudge(q.number))}function setAnswer(n,v){const ans=normalize(v);if(ans)state.answers[n]=ans;else delete state.answers[n];const input=$(`#answer-${n}`);if(input&&input.value!==ans)input.value=ans;updateChoice(n);updateJudge(n);renderSummary();save()}function toggle(n,L){const cur=new Set(normalize(state.answers[n]||'').split('').filter(Boolean));cur.has(L)?cur.delete(L):cur.add(L);setAnswer(n,LETTERS.filter(x=>cur.has(x)).join(''))}function setMemo(n,v){state.memos[n]=v;renderSummary();save()}function updateChoice(n){const ans=normalize(state.answers[n]||'');document.querySelectorAll(`.choice[data-q="${n}"]`).forEach(btn=>{const on=ans.includes(btn.dataset.choice);btn.classList.toggle('selected',on);btn.setAttribute('aria-pressed',on?'true':'false')})}function updateJudge(n){const q=QUESTIONS.find(x=>x.number===Number(n));if(!q)return;const ans=normalize(state.answers[n]||''),a=document.querySelector(`[data-exam-answer="${n}"]`),j=document.querySelector(`[data-judge="${n}"]`);if(a)a.textContent=ans||'未回答';if(j){const ok=ans&&same(ans,q.correct);j.className='judge '+(!ans?'blank':ok?'ok':'bad');j.textContent=!ans?'未回答':ok?'正解':'不正解'}}function renderSummary(){$('#summary-root').innerHTML=QUESTIONS.map(q=>{const ans=normalize(state.answers[q.number]||'')||'未回答',memo=state.memos[q.number]||'';return `<div class="summary-item"><strong>第${q.number}問</strong>
回答：${esc(ans)}
メモ：${esc(memo||'なし')}</div>`}).join('')}function summaryText(){return QUESTIONS.map(q=>{const ans=normalize(state.answers[q.number]||'')||'未回答';const memo=state.memos[q.number]||'なし';return '第'+q.number+'問\n回答：'+ans+'\nメモ：'+memo}).join('\n\n')}async function copySummary(){const t=summaryText(),s=$('#copy-status');try{if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(t);s.textContent='コピーしました。';return}}catch(e){}const ta=document.createElement('textarea');ta.value=t;ta.readOnly=true;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();try{s.textContent=document.execCommand('copy')?'コピーしました。':'コピーできませんでした。'}catch(e){s.textContent='コピーできませんでした。'}document.body.removeChild(ta)}function clearAll(){if(!confirm('入力内容をすべて消去します。よろしいですか？'))return;state={answers:{},memos:{}};try{localStorage.removeItem(STORAGE_KEY)}catch(e){}QUESTIONS.forEach(q=>{const a=$(`#answer-${q.number}`),m=$(`#memo-${q.number}`);if(a)a.value='';if(m)m.value='';updateChoice(q.number);updateJudge(q.number)});renderSummary();save()}document.addEventListener('DOMContentLoaded',()=>{load();renderQuestions();renderSummary();renderExplanations();document.addEventListener('click',e=>{const b=e.target.closest('.choice');if(b)toggle(Number(b.dataset.q),b.dataset.choice)});document.addEventListener('input',e=>{if(e.target.classList.contains('answer-input'))setAnswer(Number(e.target.dataset.q),e.target.value);if(e.target.tagName==='TEXTAREA')setMemo(Number(e.target.dataset.q),e.target.value)});document.addEventListener('keydown',e=>{if(e.target.classList.contains('choice')&&(e.key===' '||e.key==='Enter')){e.preventDefault();toggle(Number(e.target.dataset.q),e.target.dataset.choice)}});$('#copy-btn').addEventListener('click',copySummary);$('#clear-btn').addEventListener('click',clearAll)});</script></body></html>
