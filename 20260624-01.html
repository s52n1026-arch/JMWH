th:190px;border:1px solid var(--line);border-radius:8px;padding:9px;font:inherit;font-weight:900;letter-spacing:.08em;text-transform:uppercase;background:white}textarea{width:100%;min-height:88px;border:1px solid var(--line);border-radius:8px;padding:10px;font:inherit;resize:vertical;background:white}button:focus-visible,input:focus-visible,textarea:focus-visible{outline:3px solid var(--focus);outline-offset:2px}.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:14px}.btn{border:1px solid var(--brand);border-radius:8px;background:var(--brand);color:white;padding:9px 14px;font:inherit;font-weight:800;cursor:pointer}.btn.secondary{background:white;color:var(--brand)}.notice{border:1px solid #e1c668;background:#fff8df;color:#5f4500;border-radius:8px;padding:10px 12px;margin-top:12px}.summary-item{border-top:1px solid var(--line);padding:10px 0;white-space:pre-wrap}.summary-item:first-child{border-top:0}.judge{display:inline-block;border-radius:999px;padding:2px 9px;font-weight:900;margin-left:6px}.judge.ok{color:var(--ok);background:#e7f5ec}.judge.bad{color:var(--bad);background:#fdecec}.judge.blank{color:var(--warn);background:#fff3cd}.theme-pill{display:inline-block;background:#f1eee7;border:1px solid #ddd2c2;color:#463829;border-radius:999px;padding:3px 9px;font-weight:800;font-size:.9rem}.reprint{background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:12px;margin:10px 0}.option-comment{border-left:4px solid var(--line);background:#fbfcfe;padding:9px 11px;margin:8px 0}.option-comment.correct{border-left-color:var(--ok);background:#f0fbf5}.refs li{margin:6px 0}@media(max-width:720px){header,main section{padding:18px 12px}.question-card,.summary-card,.explain-card{padding:14px}.choice{grid-template-columns:32px 1fr}.answer-row{grid-template-columns:1fr}.answer-input{max-width:none}}@media print{body{background:white;font-size:10.5pt}header,main section{max-width:none;padding:12mm}.btn,.toolbar,#storage-warning{display:none!important}.question-card,.summary-card,.explain-card{box-shadow:none;page-break-inside:avoid;break-inside:avoid}.answers-section{break-before:page;page-break-before:always}h2,h3{page-break-after:avoid}.choice,.option-comment{break-inside:avoid}textarea{min-height:42px}}</style><style id="main-page-link-style">.main-page-link{max-width:1080px;margin:0 auto;padding:14px 18px 0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif}.main-page-link a{display:inline-block;border:1px solid #2563eb;border-radius:8px;padding:8px 12px;background:#fff;color:#2563eb;text-decoration:none;font-weight:700}.main-page-link a:hover{text-decoration:underline}.main-page-link.bottom{padding-top:20px;padding-bottom:28px}@media print{.main-page-link{display:none!important}}</style></head><body><nav class="main-page-link" aria-label="main page link"><a href="index.html">問題集一覧へ戻る</a></nav><header><h1>女性医学専門医 5択複数正答問題集 セット1</h1><p class="meta">作成日：2026年6月24日 / 各問A-Eから正しいものを全て選択</p><p class="hint">選択肢カードをクリックすると選択・解除できます。回答欄へ直接入力する場合は、例：AC のように入力してください。</p><div id="storage-warning" class="notice" hidden></div><div class="toolbar"><button id="clear-btn" class="btn secondary" type="button">入力内容を消去</button><span id="save-status" class="status-line" aria-live="polite"></span></div></header><main><section aria-labelledby="exam-title"><h2 id="exam-title">試験問題</h2><div id="questions-root"></div></section><section aria-labelledby="summary-title"><h2 id="summary-title">回答記録（まとめ）</h2><div id="summary-root" class="summary-card" aria-live="polite"></div><div class="toolbar"><button id="copy-btn" class="btn" type="button">回答とメモをコピー</button><span id="copy-status" class="status-line" aria-live="polite"></span></div></section><section class="answers-section" aria-labelledby="answers-title"><h2 id="answers-title">回答・解説</h2><div id="explanations-root"></div></section></main><script>const QUESTIONS=[{"number":1,"theme":"低ゴナドトロピン性原発性無月経での摂食障害・慢性疾患・中枢性疾患の切り分け","stem":"思春期女性が初経未発来で受診し、二次性徴、身長、骨年齢、内分泌値、性行動歴の確認が必要になった。 次の記述のうち正しいものを全て選べ。","choices":{"A":"低エストロゲンが長期化する場合は骨量獲得不全を意識する。","B":"原発性無月経では骨量評価は成人後まで不要である。","C":"乳房発育があれば妊娠反応は不要である。","D":"FSH高値なら中枢性低ゴナドトロピン性無月経が典型である。","E":"染色体検査では検査前説明と心理的支援を考慮する。"},"correct":["A","E"],"comments":{"A":"正しい。低エストロゲンが長期化する場合は骨量獲得不全を意識する。 試験対策上は症例背景に合わせて適用する。","B":"誤り。原発性無月経では骨量評価は成人後まで不要である。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","C":"誤り。乳房発育があれば妊娠反応は不要である。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","D":"誤り。FSH高値なら中枢性低ゴナドトロピン性無月経が典型である。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","E":"正しい。染色体検査では検査前説明と心理的支援を考慮する。 試験対策上は症例背景に合わせて適用する。"},"refs":["ASRM Practice Committee. Current evaluation of amenorrhea: a committee opinion. 2024. URL: https://www.asrm.org/practice-guidance/practice-committee-documents/current-evaluation-of-amenorrhea-a-committee-opinion-2024/ . 反映: 無月経では妊娠除外、FSH/LH/E2/TSH/PRL、解剖学的評価を組み合わせる。"]},{"number":2,"theme":"46,XX外性器男性化での11β水酸化酵素欠損と21水酸化酵素欠損の違い","stem":"46,XXで外性器男性化を認め、血圧、電解質、17-OHP、レニン活性を用いた鑑別が必要になった。 次の記述のうち正しいものを全て選べ。","choices":{"A":"11β水酸化酵素欠損ではアンドロゲン過剰は起こらない。","B":"両疾患ともAMH過剰により子宮が欠損する。","C":"塩喪失の有無、血圧、K、レニンを組み合わせて鑑別する。","D":"21水酸化酵素欠損では17-OHP高値が重要な手がかりになる。","E":"17-OHPは先天性副腎過形成の鑑別に使わない。"},"correct":["C","D"],"comments":{"A":"誤り。11β水酸化酵素欠損ではアンドロゲン過剰は起こらない。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","B":"誤り。両疾患ともAMH過剰により子宮が欠損する。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","C":"正しい。塩喪失の有無、血圧、K、レニンを組み合わせて鑑別する。 試験対策上は症例背景に合わせて適用する。","D":"正しい。21水酸化酵素欠損では17-OHP高値が重要な手がかりになる。 試験対策上は症例背景に合わせて適用する。","E":"誤り。17-OHPは先天性副腎過形成の鑑別に使わない。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。"},"refs":["Speiser PW et al. Congenital Adrenal Hyperplasia Due to Steroid 21-Hydroxylase Deficiency: Endocrine Society Clinical Practice Guideline. J Clin Endocrinol Metab. 2018. PMID: 30272171. 直近5年の主要改訂を確認できず、古典的鑑別の基礎文献として使用。"]},{"number":3,"theme":"子宮頸がん検診のHPV単独法で陽性・細胞診陰性時のフォロー","stem":"無症状女性の検診結果を説明し、精密検査、偽陽性、過剰診断、検診間隔を整理する場面である。 次の記述のうち正しいものを全て選べ。","choices":{"A":"腫瘍マーカー陰性なら早期がんは否定できる。","B":"検診陽性後は制度に応じた精密検査へ確実につなぐ。","C":"陽性結果は再度同じ検診を行い陰性なら精査不要とする。","D":"感度が高い検査では偽陽性は発生しない。","E":"検診の利益があれば不利益の説明は不要である。"},"correct":["B"],"comments":{"A":"誤り。腫瘍マーカー陰性なら早期がんは否定できる。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","B":"正しい。検診陽性後は制度に応じた精密検査へ確実につなぐ。 試験対策上は症例背景に合わせて適用する。","C":"誤り。陽性結果は再度同じ検診を行い陰性なら精査不要とする。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","D":"誤り。感度が高い検査では偽陽性は発生しない。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","E":"誤り。検診の利益があれば不利益の説明は不要である。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。"},"refs":["USPSTF. Screening for Breast Cancer: Recommendation Statement. JAMA. 2024. DOI: 10.1001/jama.2024.5534 / WHO. Cervical pre-cancer screening guideline. 2021. URL: https://www.who.int/publications/i/item/9789240030824 . 反映: 検診の利益・不利益、HPV検査、精密検査接続。"]},{"number":4,"theme":"がん検診における感度・特異度・陽性的中率の読み替え","stem":"無症状女性の検診結果を説明し、精密検査、偽陽性、過剰診断、検診間隔を整理する場面である。 次の記述のうち正しいものを全て選べ。","choices":{"A":"検診では死亡率低下だけでなく偽陽性、過剰診断、不安も説明する。","B":"治療適応や検査選択では、年齢だけでなく閉経状態と併存疾患を併せて評価する。","C":"検診の利益があれば不利益の説明は不要である。","D":"陽性的中率は有病率の影響を受ける。","E":"高リスク群と平均リスク群では推奨される検査や間隔が異なることがある。"},"correct":["A","B","D","E"],"comments":{"A":"正しい。検診では死亡率低下だけでなく偽陽性、過剰診断、不安も説明する。 試験対策上は症例背景に合わせて適用する。","B":"正しい。女性医学専門医試験では、年齢単独ではなく閉経状態、既往、併存疾患を組み合わせる判断が問われやすい。","C":"誤り。検診の利益があれば不利益の説明は不要である。 という単純化は不適切で、実際には病歴、検査値、リスク層別化を組み合わせる。","D":"正しい。陽性的中率は有病率の影響を受ける。 試験対策上は症例背景に合わせて適用する。","E":"正しい。高リスク群と平均リスク群では推奨される検査や間隔が異なることがある。 試験対策上は症例背景に合わせて適用する。"},"refs":["USPSTF. Screening for Breast Cancer: Recommendation Statement. JAMA. 2024. DOI: 10.1001/jama.2024.5534 / WHO. Cervical pre-cancer screening guideline. 2021. URL: https://www.who.int/publications/i/item/9789240030824 . 反映: 検診の利益・不利益、HPV検査、精密検査接続。"]},{"number":5,"theme":"骨粗鬆症治療中の骨代謝マーカーの使い方と採血タイミング","stem":"閉経後または低エストロゲン状態の女性で骨密度低下や脆弱性骨折リスクを評価している。 次の記述のうち正しいものを全て選べ。","choices":{"A":"若年低エストロゲン例では骨量評価は不要である。","B":"骨代謝マーカー単独で骨粗鬆症を確定診断できる。","C":"二次性原因としてCa、P、ALP、PTH、25(OH)D、腎機能を確認することがある。","D":"血清Caが正常ならビタミンD欠乏は否定できる。","E":"FRAXは臨床判断を置き換えるものではない。"},"correct":["C","E"],"comments":{"A":"誤り。若年低エストロゲン例では骨量評価は不要である。 という単純化は不適切で、実際には病歴、検査値、 ONS.map(q=>`<article class="explain-card"><h3><span class="qno">第${q.number}問</span></h3><p><span class="theme-pill">関連テーマ：${esc(q.theme)}</span> <span class="judge blank" data-judge="${q.number}">未回答</span></p><div class="reprint"><p class="stem">${esc(q.stem)}</p><ol type="A">${LETTERS.map(L=>`<li>${esc(q.choices[L])}</li>`).join('')}</ol></div><p><strong>答案者の回答：</strong><span data-exam-answer="${q.number}">未回答</span></p><p><strong>正答：</strong>${q.correct.join('')}</p>${LETTERS.map(L=>`<div class="option-comment ${q.correct.includes(L)?'correct':''}"><strong>${L}：</strong>${esc(q.comments[L])}</div>`).join('')}<h4>根拠文献</h4><ul class="refs">${q.refs.map(r=>`<li>${esc(r)}</li>`).join('')}</ul></article>`).join('');QUESTIONS.forEach(q=>updateJudge(q.number))}function setAnswer(n,v){const ans=normalize(v);if(ans)state.answers[n]=ans;else delete state.answers[n];const input=$(`#answer-${n}`);if(input&&input.value!==ans)input.value=ans;updateChoice(n);updateJudge(n);renderSummary();save()}function toggle(n,L){const cur=new Set(normalize(state.answers[n]||'').split('').filter(Boolean));cur.has(L)?cur.delete(L):cur.add(L);setAnswer(n,LETTERS.filter(x=>cur.has(x)).join(''))}function setMemo(n,v){state.memos[n]=v;renderSummary();save()}function updateChoice(n){const ans=normalize(state.answers[n]||'');document.querySelectorAll(`.choice[data-q="${n}"]`).forEach(btn=>{const on=ans.includes(btn.dataset.choice);btn.classList.toggle('selected',on);btn.setAttribute('aria-pressed',on?'true':'false')})}function updateJudge(n){const q=QUESTIONS.find(x=>x.number===Number(n));if(!q)return;const ans=normalize(state.answers[n]||''),a=document.querySelector(`[data-exam-answer="${n}"]`),j=document.querySelector(`[data-judge="${n}"]`);if(a)a.textContent=ans||'未回答';if(j){const ok=ans&&same(ans,q.correct);j.className='judge '+(!ans?'blank':ok?'ok':'bad');j.textContent=!ans?'未回答':ok?'正解':'不正解'}}function renderSummary(){$('#summary-root').innerHTML=QUESTIONS.map(q=>{const ans=normalize(state.answers[q.number]||'')||'未回答',memo=state.memos[q.number]||'';return `<div class="summary-item"><strong>第${q.number}問</strong>

メモ：${esc(memo||'なし')}</div>`}).join('')}function summaryText(){return QUESTIONS.map(q=>{const ans=normalize(state.answers[q.number]||'')||'未回答';const memo=state.memos[q.number]||'なし';return '第'+q.number+'問\n回答：'+ans+'\nメモ：'+memo}).join('\n\n')}async function copySummary(){const t=summaryText(),s=$('#copy-status');try{if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(t);s.textContent='コピーしました。';return}}catch(e){}const ta=document.createElement('textarea');ta.value=t;ta.readOnly=true;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();try{s.textContent=document.execCommand('copy')?'コピーしました。':'コピーできませんでした。'}catch(e){s.textContent='コピーできませんでした。'}document.body.removeChild(ta)}function clearAll(){if(!confirm('入力内容をすべて消去します。よろしいですか？'))return;state={answers:{},memos:{}};try{localStorage.removeItem(STORAGE_KEY)}catch(e){}QUESTIONS.forEach(q=>{const a=$(`#answer-${q.number}`),m=$(`#memo-${q.number}`);if(a)a.value='';if(m)m.value='';updateChoice(q.number);updateJudge(q.number)});renderSummary();save()}document.addEventListener('DOMContentLoaded',()=>{load();renderQuestions();renderSummary();renderExplanations();document.addEventListener('click',e=>{const b=e.target.closest('.choice');if(b)toggle(Number(b.dataset.q),b.dataset.choice)});document.addEventListener('input',e=>{if(e.target.classList.contains('answer-input'))setAnswer(Number(e.target.dataset.q),e.target.value);if(e.target.tagName==='TEXTAREA')setMemo(Number(e.target.dataset.q),e.target.value)});document.addEventListener('keydown',e=>{if(e.target.classList.contains('choice')&&(e.key===' '||e.key==='Enter')){e.preventDefault();toggle(Number(e.target.dataset.q),e.target.dataset.choice)}});$('#copy-btn').addEventListener('click',copySummary);$('#clear-btn').addEventListener('click',clearAll)});</script><nav class="main-page-link bottom" aria-label="main page link bottom"><a href="index.html">問題集一覧へ戻る</a></nav></body></html>
