<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>20260624 セット4 女性医学専門医 5択複数正答問題集</title><style>:root{--bg:#f5f7fa;--paper:#fff;--ink:#18202b;--muted:#5d6878;--line:#d7dee8;--brand:#145c72;--soft:#e8f4f7;--ok:#126b42;--bad:#9b2d2d;--warn:#806000;--focus:#f2c84b}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;line-height:1.72}header,main section{max-width:1060px;margin:0 auto;padding:24px 18px}h1{font-size:1.75rem;line-height:1.3;margin:.2em 0}h2{font-size:1.35rem;border-left:6px solid var(--brand);padding-left:12px;margin:24px 0 14px}h3{margin:0 0 10px;font-size:1.08rem}.meta,.hint,.status-line{color:var(--muted)}.question-card,.summary-card,.explain-card{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:18px;margin:16px 0;break-inside:avoid;box-shadow:0 5px 16px rgba(30,40,60,.04)}.qno{display:inline-flex;min-width:4.5rem;justify-content:center;border:1px solid var(--brand);color:var(--brand);border-radius:999px;padding:2px 10px;font-weight:800}.stem{font-weight:650;margin:10px 0 14px}.choices{display:grid;gap:9px;margin:12px 0}.choice{display:grid;grid-template-columns:38px 1fr;gap:10px;align-items:start;width:100%;border:2px solid var(--line);border-radius:8px;background:white;padding:12px;text-align:left;font:inherit;color:inherit;cursor:pointer;min-height:58px}.choice:hover{border-color:#83aebd}.choice.selected{border-color:var(--brand);background:var(--soft);box-shadow:inset 0 0 0 1px var(--brand)}.choice .letter{font-weight:900;color:var(--brand)}.choice.selected .letter:after{content:"選択中";display:block;font-size:.68rem;color:var(--ok);font-weight:800}.answer-row{display:grid;grid-template-columns:minmax(130px,190px) 1fr;gap:14px;margin-top:14px}label{display:block;font-weight:800;margin-bottom:5px}.answer-input{width:100%;max-width:190px;border:1px solid var(--line);border-radius:8px;padding:9px;font:inherit;font-weight:900;letter-spacing:.08em;text-transform:uppercase;background:white}textarea{width:100%;min-height:88px;border:1px solid var(--line);border-radius:8px;padding:10px;font:inherit;resize:vertical;background:white}button:focus-visible,input:focus-visible,textarea:focus-visible{outline:3px solid var(--focus);outline-offset:2px}.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:14px}.btn{border:1px solid var(--brand);border-radius:8px;background:var(--brand);color:white;padding:9px 14px;font:inherit;font-weight:800;cursor:pointer}.btn.secondary{background:white;color:var(--brand)}.notice{border:1px solid #e1c668;background:#fff8df;color:#5f4500;border-radius:8px;padding:10px 12px;margin-top:12px}.summary-item{border-top:1px solid var(--line);padding:10px 0;white-space:pre-wrap}.summary-item:first-child{border-top:0}.judge{display:inline-block;border-radius:999px;padding:2px 9px;font-weight:900;margin-left:6px}.judge.ok{color:var(--ok);background:#e7f5ec}.judge.bad{color:var(--bad);background:#fdecec}.judge.blank{color:var(--warn);background:#fff3cd}.theme-pill{display:inline-block;background:#f1eee7;border:1px solid #ddd2c2;color:#463829;border-radius:999px;padding:3px 9px;font-weight:800;font-size:.9rem}.reprint{background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:12px;margin:10px 0}.option-comment{border-left:4px solid var(--line);background:#fbfcfe;padding:9px 11px;margin:8px 0}.option-comment.correct{border-left-color:var(--ok);background:#f0fbf5}.refs li{margin:6px 0}@media(max-width:720px){header,main section{padding:18px 12px}.question-card,.summary-card,.explain-card{padding:14px}.choice{grid-template-columns:32px 1fr}.answer-row{grid-template-columns:1fr}.answer-input{max-width:none}}@media print{body{background:white;font-size:10.5pt}header,main section{max-width:none;padding:12mm}.btn,.toolbar,#storage-warning{display:none!important}.question-card,.summary-card,.explain-card{box-shadow:none;page-break-inside:avoid;break-inside:avoid}.answers-section{break-before:page;page-break-before:always}h2,h3{page-break-after:avoid}.choice,.option-comment{break-inside:avoid}textarea{min-height:42px}}</style></head><body><header><h1>女性医学専門医 5択複数正答問題集 セット4</h1><p class="meta">作成日：2026年6月24日 / 各問A-Eから正しいものを全て選択</p><p class="hint">選択肢カードをクリックすると選択・解除できます。回答欄へ直接入力する場合は、例：AC のように入力してください。</p><div id="storage-warning" class="notice" hidden></div><div class="toolbar"><button id="clear-btn" class="btn secondary" type="button">入力内容を消去</button><span id="save-status" class="status-line" aria-live="polite"></span></div></header><main><section aria-labelledby="exam-title"><h2 id="exam-title">試験問題</h2><div id="questions-root"></div></section><section aria-labelledby="summary-title"><h2 id="summary-title">回答記録（まとめ）</h2><div id="summary-root" class="summary-card" aria-live="polite"></div><div class="toolbar"><button id="copy-btn" class="btn" type="button">回答とメモをコピー</button><span id="copy-status" class="status-line" aria-live="polite"></span></div></section><section class="answers-section" aria-labelledby="answers-title"><h2 id="answers-title">回答・解説</h2><div id="explanations-root"></div></section></main><script>const QUESTIONS=[{"number":1,"theme":"原発性無月経：17-OHP高値と非古典型CAH","stem":"16歳、初経未発来に近い稀発月経、にきび、多毛。17-OHP高値を認めた。正しいものを全て選べ。","choices":{"A":"非古典型CAHはPCOS様症状を示すことがある。","B":"急速な男性化があれば腫瘍性アンドロゲン過剰も考える。","C":"21水酸化酵素欠損症では17-OHP上昇が診断の手がかりになる。","D":"17-OHP高値なら甲状腺疾患や高プロラクチン血症の評価は不要である。","E":"コルチゾール合成障害ではACTH刺激試験が診断補助になることがある。"},"correct":["A","B","C","E"],"comments":{"A":"正しい。多毛、稀発月経、にきびで鑑別に上がる。","B":"正しい。進行速度と程度は重要な手がかりである。","C":"正しい。アンドロゲン過剰の鑑別で重要である。","D":"誤り。無月経評価では複数の原因を整理する。","E":"正しい。境界値では負荷試験を用いる。"},"refs":["ASRM Practice Committee. Current evaluation of amenorrhea: a committee opinion. 2024. https://www.asrm.org/practice-guidance/practice-committee-documents/current-evaluation-of-amenorrhea-a-committee-opinion-2024/"]},{"number":2,"theme":"原発性無月経：低身長を伴わない性腺異形成","stem":"18歳、初経未発来。身長は平均、乳房発育は乏しい。FSH高値、E2低値。正しいものを全て選べ。","choices":{"A":"Y染色体成分があれば性腺摘出の適応を検討する。","B":"FSH高値でも妊孕性温存の相談は医学的に無意味である。","C":"核型検査は低身長がある時だけ適応となる。","D":"エストロゲン補充では二次性徴と骨量への効果を考慮する。","E":"低身長がなくても性腺異形成や早発卵巣不全を鑑別する。"},"correct":["A","D","E"],"comments":{"A":"正しい。性腺腫瘍リスク管理に関係する。","B":"誤り。卵巣機能や選択肢は個別に説明する。","C":"誤り。高ゴナドトロピン性原発性無月経では核型評価を考える。","D":"正しい。思春期導入では段階的な補充が論点になる。","E":"正しい。Turner典型像だけに限定しない。"},"refs":["ASRM Practice Committee. Current evaluation of amenorrhea: a committee opinion. 2024. https://www.asrm.org/practice-guidance/practice-committee-documents/current-evaluation-of-amenorrhea-a-committee-opinion-2024/"]},{"number":3,"theme":"検診：ASC-US後のHPV検査運用","stem":"子宮頸部細胞診でASC-US。HPV検査を併用する方針となった。正しいものを全て選べ。","choices":{"A":"ASC-USは浸潤癌確定診断を意味する。","B":"ASC-USではHPV検査によるトリアージが用いられる。","C":"HPV陽性ASC-USであってもコルポスコピーなど精査は一切検討しない。","D":"HPV陰性ASC-USでも浸潤癌リスクが極めて高いため、全例ただちに広汎子宮全摘を行う。","E":"妊娠中のASC-USは全例ただちに円錐切除を行う。"},"correct":["B"],"comments":{"A":"誤り。意義不明異型扁平上皮細胞であり、確定癌ではない。","B":"正しい。精査対象を絞る代表的運用である。","C":"誤り。HPV陽性ではリスクに応じてコルポスコピーなどを検討する。","D":"誤り。HPV陰性では高リスク病変の可能性が低く、リスクに応じた経過観察が基本となる。","E":"誤り。妊娠中は安全性を考えた精査・フォローを行う。"},"refs":["WHO guideline for screening and treatment of cervical pre-cancer lesions for cervical cancer prevention. 2nd ed. 2021. https://www.who.int/publications/i/item/9789240030824","Perkins RB, et al. 2019 ASCCP Risk-Based Management Consensus Guidelines. J Low Genit Tract Dis. 2020;24:102-131."]},{"number":4,"theme":"検診：乳房MRIと高リスクサーベイランス","stem":"BRCA1病的バリアントを有する36歳女性。乳房サーベイランスを相談された。正しいものを全て選べ。","choices":{"A":"高リスク管理では血縁者への情報提供支援も考慮する。","B":"若年高リスクでは放射線被曝や乳腺濃度も考慮する。","C":"高リスク女性ではマンモグラフィに加えMRIを検討する。","D":"リスク低減乳房切除は本人希望と十分な説明の上で選択肢になりうる。","E":"BRCA保有者でも卵巣・卵管がんリスクの説明は不要である。"},"correct":["A","B","C","D"],"comments":{"A":"正しい。家族内の予防医療につながる。","B":"正しい。検査選択の背景になる。","C":"正しい。平均リスク検診とは分ける。","D":"正しい。遺伝カウンセリングと意思決定支援が必要である。","E":"誤り。関連腫瘍として重要である。"},"refs":["US Preventive Services Task Force. Screening for Breast Cancer: Recommendation Statement. JAMA. 2024;331:1918-1930. https://www.uspreventiveservicestaskforce.org/uspstf/recommendation/breast-cancer-screening"]},{"number":5,"theme":"骨粗鬆症：ステロイド性骨粗鬆症","stem":"58歳女性、関節リウマチでプレドニゾロンを長期内服。閉経後で大腿骨Tスコア -1.8。正しいものを全て選べ。","choices":{"A":"ステロイド使用量と期間は骨折リスク評価に重要である。","B":"ステロイド内服中は骨折リスクが下がるため評価不要である。","C":"カルシウム・ビタミンD摂取状況を確認する。","D":"椎体骨折の有無は治療方針に影響する。","E":"ステロイド性骨粗鬆症では骨密度だけでなく臨床リスクを加味する。"},"correct":["A","C","D","E"],"comments":{"A":"正しい。骨密度が骨粗鬆症域でなくても注意する。","B":"誤り。ステロイドは骨折リスクを上げる。","C":"正しい。薬物療法と並行して基盤管理を行う。","D":"正しい。画像評価が必要になることがある。","E":"正しい。続発性骨粗鬆症の典型である。"},"refs":["LeBoff MS, et al. The clinician's guide to prevention and treatment of osteoporosis. Osteoporos Int. 2022;33:2049-2102."]},{"number":6,"theme":"脂質異常症：高トリグリセライド血症と二次性要因","stem":"52歳、TG 620 mg/dL。閉経後に体重増加し、飲酒量が増えた。正しいものを全て選べ。","choices":{"A":"TGが高ければLDL-Cは必ず正確に計算できる。","B":"飲酒、糖尿病、甲状腺機能低下症は二次性要因として確認する。","C":"高度高TGでは急性膵炎リスクを意識する。","D":"空腹時か食後かはトリグリセライド値の評価に影響しない。","E":"高度高TGでも生活習慣への介入は不要で薬剤だけでよい。"},"correct":["B","C"],"comments":{"A":"誤り。Friedewald式は高TGで不正確になる。","B":"正しい。原因検索が治療に直結する。","C":"正しい。LDL管理とは別の緊急度がある。","D":"誤り。TGは食事の影響を受けるため採血条件を確認する。","E":"誤り。食事、飲酒、体重、糖代謝管理が重要である。"},"refs":["Grundy SM, et al. 2018 AHA/ACC Cholesterol Guideline. Circulation. 2019;139:e1082-e1143.","Virani SS, et al. 2022 ACC Expert Consensus Decision Pathway on Nonstatin Therapies. J Am Coll Cardiol. 2022;80:1366-1418."]},{"number":7,"theme":"糖尿病：妊娠糖尿病既往後の長期フォロー","stem":"43歳、妊娠糖尿病の既往があり、産後から受診が途絶えていた。現在BMI 27、HbA1c 6.1%。正しいものを全て選べ。","choices":{"A":"体重管理と運動は糖尿病予防に重要である。","B":"産後の糖代謝フォローは分娩直後だけで終了する。","C":"閉経移行期の体重増加は糖代謝と無関係である。","D":"妊娠糖尿病既往は将来の2型糖尿病リスクを上げる。","E":"次回妊娠前には血糖管理状態を確認する。"},"correct":["A","D","E"],"comments":{"A":"正しい。生活習慣介入の対象である。","B":"誤り。長期的なスクリーニングが必要である。","C":"誤り。内臓脂肪増加やインスリン抵抗性に影響しうる。","D":"正しい。女性特有のライフコースリスクである。","E":"正しい。先天異常リスクや母体合併症予防に関わる。"},"refs":["American Diabetes Association Professional Practice Committee. Standards of Care in Diabetes. Diabetes Care. 2026;49(Suppl 1). https://diabetesjournals.org/care/issue/49/Supplement_1"]},{"number":8,"theme":"心血管系：妊娠関連疾患と将来リスク","stem":"50歳、閉経移行期。40歳時に妊娠高血圧症候群で早産となった既往がある。正しいものを全て選べ。","choices":{"A":"妊娠関連高血圧の既往があればMHTは全例絶対禁忌である。","B":"血圧、脂質、糖代謝を定期的に評価する。","C":"産科歴は閉経後の診療では確認する意味がない。","D":"早産や胎児発育不全の既往も血管リスク評価の手がかりになる。","E":"妊娠高血圧症候群既往は将来の高血圧や心血管疾患リスクに関連する。"},"correct":["B","D","E"],"comments":{"A":"誤り。現在の血圧、血栓リスク、心血管リスクを総合する。","B":"正しい。予防介入につなげる。","C":"誤り。女性医学のライフコース評価で重要である。","D":"正しい。胎盤関連疾患は将来リスクと関連する。","E":"正しい。産科歴は内科リスク評価に使う。"},"refs":["Virani SS, et al. 2023 AHA/ACC Guideline for Chronic Coronary Disease. Circulation. 2023;148:e9-e119.","The 2022 hormone therapy position statement of The North American Menopause Society. Menopause. 2022;29:767-794."]},{"number":9,"theme":"脳血管障害：一過性脳虚血発作の初期対応","stem":"61歳女性、突然の右片麻痺が20分で改善。今は無症状で帰宅希望。正しいものを全て選べ。","choices":{"A":"片頭痛前兆と鑑別する場合も急性神経症状では慎重に扱う。","B":"症状が消失してもTIAとして緊急評価する。","C":"心房細動や頸動脈病変の検索を考慮する。","D":"改善したTIAでは画像検査は禁忌である。","E":"発症時刻、症状持続時間、抗凝固薬内服の有無を確認する。"},"correct":["A","B","C","E"],"comments":{"A":"正しい。見逃しを避ける。","B":"正しい。早期脳梗塞リスクが高い。","C":"正しい。再発予防の原因検索である。","D":"誤り。脳梗塞や出血などを評価する。","E":"正しい。治療適応判断に関わる。"},"refs":["CDC. U.S. Medical Eligibility Criteria for Contraceptive Use, 2024. MMWR Recomm Rep. 2024;73:1-126. https://www.cdc.gov/mmwr/volumes/73/rr/rr7304a1.htm"]},{"number":10,"theme":"骨盤臓器脱：排尿困難と潜在性腹圧性尿失禁","stem":"74歳、進行した骨盤臓器脱で排尿に時間がかかる。脱を還納すると尿漏れが出る。正しいものを全て選べ。","choices":{"A":"進行脱では尿道屈曲により排尿困難を来すことがある。","B":"POP-Qは腟内の部位別下垂を客観化する分類である。","C":"残尿が多い場合は上部尿路への影響も考える。","D":"脱を還納すると潜在性腹圧性尿失禁が顕在化することがある。","E":"排尿困難があればOAB薬を増量すれば必ず改善する。"},"correct":["A","B","C","D"],"comments":{"A":"正しい。脱の還納前後で症状が変わる。","B":"正しい。試験で表・分類問題として出やすい。","C":"正しい。慢性尿閉では腎機能や水腎症にも注意する。","D":"正しい。術前評価で重要である。","E":"誤り。閉塞・残尿を悪化させる可能性を考える。"},"refs":["NICE Guideline NG123. Urinary incontinence and pelvic organ prolapse in women: management. 2019, updated. https://www.nice.org.uk/guidance/ng123","American Urological Association/SUFU. The diagnosis and treatment of idiopathic overactive bladder. 2024. https://www.auanet.org/guidelines-and-quality/guidelines/idiopathic-overactive-bladder"]},{"number":11,"theme":"FLUTS：混合性尿失禁の初期評価","stem":"63歳、咳で漏れるが、強い尿意でトイレに間に合わないこともある。正しいものを全て選べ。","choices":{"A":"尿検査で血尿や感染を確認する。","B":"混合性尿失禁では全例ただちに手術が第一選択である。","C":"腹圧性と切迫性のどちらが主症状か確認する。","D":"骨盤底筋訓練は腹圧性尿失禁に対する保存療法である。","E":"切迫性成分が強い場合は膀胱訓練や薬物療法を検討する。"},"correct":["A","C","D","E"],"comments":{"A":"正しい。見逃してはいけない鑑別がある。","B":"誤り。症状優位性と保存療法反応を見て決める。","C":"正しい。治療優先順位に関わる。","D":"正しい。第一選択の一つである。","E":"正しい。OAB管理の選択肢である。"},"refs":["American Urological Association/SUFU. The diagnosis and treatment of idiopathic overactive bladder. 2024. https://www.auanet.org/guidelines-and-quality/guidelines/idiopathic-overactive-bladder","NICE Guideline NG123. Urinary incontinence and pelvic organ prolapse in women: management. 2019, updated. https://www.nice.org.uk/guidance/ng123"]},{"number":12,"theme":"脳機能：MCIと認知症の鑑別","stem":"72歳、最近物忘れが増えたが、金銭管理と服薬管理は自立している。正しいものを全て選べ。","choices":{"A":"本人の訴えがあれば画像検査だけで診断が確定する。","B":"抗コリン薬や睡眠薬など薬剤性の影響を確認する。","C":"うつ病や睡眠障害は認知機能低下様症状の鑑別になる。","D":"MCIでは認知機能低下があっても日常生活機能は概ね保たれる。","E":"生活機能低下の有無は認知症診断に関係しない。"},"correct":["B","C","D"],"comments":{"A":"誤り。病歴、機能評価、認知検査を総合する。","B":"正しい。高齢女性では服薬リストが重要である。","C":"正しい。可逆的要因を探す。","D":"正しい。認知症との区別で重要である。","E":"誤り。日常生活障害は診断上の重要な軸である。"},"refs":["American Geriatrics Society 2023 updated AGS Beers Criteria. J Am Geriatr Soc. 2023;71:2052-2081."]},{"number":13,"theme":"精神疾患系：摂食障害の身体合併症","stem":"22歳、BMI 15.8、無月経、寒がり、徐脈。過食嘔吐は否定。正しいものを全て選べ。","choices":{"A":"BMIが低くても本人が元気なら入院適応の検討は不要である。","B":"再栄養時には低リン血症など再栄養症候群に注意する。","C":"骨量低下は若年でも問題になりうる。","D":"神経性やせ症では徐脈、低体温、低T3症候群を認めることがある。","E":"無月経は低エネルギー状態を反映しうる。"},"correct":["B","C","D","E"],"comments":{"A":"誤り。バイタル、電解質、心電図を含め安全性を評価する。","B":"正しい。急な栄養投与で起こる危険な合併症である。","C":"正しい。骨量獲得期の低エストロゲン・低栄養が影響する。","D":"正しい。身体所見の表が問われやすい。","E":"正しい。視床下部性無月経として考える。"},"refs":["American Psychiatric Association. Diagnostic and Statistical Manual of Mental Disorders, Fifth Edition, Text Revision. 2022.","NICE Guideline NG222. Depression in adults: treatment and management. 2022. https://www.nice.org.uk/guidance/ng222","LeBoff MS, et al. The clinician's guide to prevention and treatment of osteoporosis. Osteoporos Int. 2022;33:2049-2102."]},{"number":14,"theme":"乳がん系：乳房痛と乳腺症の説明","stem":"44歳、月経前に両側乳房痛が強くなる。画像検査で悪性所見なし。正しいものを全て選べ。","choices":{"A":"画像で悪性所見がない場合でも症状変化時は再評価する。","B":"いわゆる乳腺症は良性変化の総称として用いられることがある。","C":"周期性乳房痛はホルモン変動と関連することがある。","D":"乳房痛があれば乳がんが確定する。","E":"局所性で持続する痛みや腫瘤を伴う場合は画像評価を行う。"},"correct":["A","B","C","E"],"comments":{"A":"正しい。固定的な安心だけで終わらせない。","B":"正しい。用語の曖昧さも試験で問われる。","C":"正しい。月経周期との関連を確認する。","D":"誤り。乳房痛単独の悪性率は高くないが評価は必要である。","E":"正しい。症状診療として扱う。"},"refs":["US Preventive Services Task Force. Screening for Breast Cancer: Recommendation Statement. JAMA. 2024;331:1918-1930. https://www.uspreventiveservicestaskforce.org/uspstf/recommendation/breast-cancer-screening"]},{"number":15,"theme":"検査・治療：骨盤底筋訓練の実施条件","stem":"58歳、軽度腹圧性尿失禁。骨盤底筋訓練を開始する。正しいものを全て選べ。","choices":{"A":"正しい筋収縮を確認し、腹筋や臀筋の代償を避ける。","B":"継続期間を設定し、効果判定を行う。","C":"訓練は1回実施すれば長期効果が保証される。","D":"高度骨盤臓器脱や疼痛があれば個別に調整する。","E":"切迫性尿失禁を併発しても生活指導を組み合わせることがある。"},"correct":["A","B","D","E"],"comments":{"A":"正しい。フォームの確認が効果に影響する。","B":"正しい。漫然指導ではなくフォローする。","C":"誤り。継続が必要である。","D":"正しい。症状に応じて理学療法や専門評価を使う。","E":"正しい。混合性では複数介入を行う。"},"refs":["NICE Guideline NG123. Urinary incontinence and pelvic organ prolapse in women: management. 2019, updated. https://www.nice.org.uk/guidance/ng123","American Urological Association/SUFU. The diagnosis and treatment of idiopathic overactive bladder. 2024. https://www.auanet.org/guidelines-and-quality/guidelines/idiopathic-overactive-bladder"]},{"number":16,"theme":"検査・治療：骨吸収マーカーの使い方","stem":"骨粗鬆症治療開始後3か月。薬の効果を早めに見たいと希望された。正しいものを全て選べ。","choices":{"A":"測定時刻や食事の影響を受けるマーカーがある。","B":"骨密度測定は治療開始翌日に効果判定できる。","C":"マーカーだけで骨折リスクを完全に予測できる。","D":"治療薬の種類により期待されるマーカー変化は異なる。","E":"骨代謝マーカーは薬剤反応や服薬状況の参考になる。"},"correct":["A","D","E"],"comments":{"A":"正しい。検体条件をそろえる必要がある。","B":"誤り。骨密度は短期間では大きく変化しにくい。","C":"誤り。年齢、骨折歴、骨密度、転倒などと総合する。","D":"正しい。骨吸収抑制薬と骨形成促進薬で見方が変わる。","E":"正しい。骨密度変化より早く反応を見ることがある。"},"refs":["LeBoff MS, et al. The clinician's guide to prevention and treatment of osteoporosis. Osteoporos Int. 2022;33:2049-2102."]},{"number":17,"theme":"検査・治療：MHTと乳がん既往","stem":"58歳、乳がん術後5年。強いホットフラッシュがあり全身MHTを希望した。正しいものを全て選べ。","choices":{"A":"タモキシフェン内服中はCYP2D6阻害の強い抗うつ薬に注意する。","B":"乳がん既往から10年経てばMHTはリスク説明なしで自由に開始できる。","C":"局所症状が主体なら乳腺主治医と相談し局所療法の可否を検討する。","D":"乳がん既往例では全身MHTは原則慎重または避ける方向で検討する。","E":"非ホルモン療法を含めて症状緩和策を相談する。"},"correct":["A","C","D","E"],"comments":{"A":"正しい。薬物相互作用が試験向きである。","B":"誤り。期間だけで一律判断しない。","C":"正しい。症状と治療歴に応じて個別化する。","D":"正しい。再発リスクとの関係を考える。","E":"正しい。SSRI/SNRI、ガバペンチンなどが選択肢になることがある。"},"refs":["The 2022 hormone therapy position statement of The North American Menopause Society. Menopause. 2022;29:767-794.","US Preventive Services Task Force. Screening for Breast Cancer: Recommendation Statement. JAMA. 2024;331:1918-1930. https://www.uspreventiveservicestaskforce.org/uspstf/recommendation/breast-cancer-screening"]},{"number":18,"theme":"検査・治療：甲状腺機能亢進症治療薬の副作用","stem":"36歳、Basedow病に対してチアマゾール開始後2週間。発熱と咽頭痛を訴える。正しいものを全て選べ。","choices":{"A":"妊娠可能年齢では妊娠希望と薬剤選択を確認する。","B":"眼症状があれば喫煙状況を確認する。","C":"抗甲状腺薬では無顆粒球症を疑い血算を確認する。","D":"症状があっても次回外来まで内服継続だけを指示する。","E":"肝障害も抗甲状腺薬の注意すべき副作用である。"},"correct":["A","B","C","E"],"comments":{"A":"正しい。妊娠初期の薬剤選択が問題になる。","B":"正しい。喫煙は甲状腺眼症悪化と関連する。","C":"正しい。発熱・咽頭痛は重要な警告症状である。","D":"誤り。重篤副作用の可能性を説明し早急に対応する。","E":"正しい。薬剤により頻度や型が異なる。"},"refs":["Ross DS, et al. 2016 American Thyroid Association Guidelines for Hyperthyroidism. Thyroid. 2016;26:1343-1421.","Alexander EK, et al. 2017 ATA Guidelines for Thyroid Disease During Pregnancy and Postpartum. Thyroid. 2017;27:315-389."]},{"number":19,"theme":"その他：性感染症のパートナー治療","stem":"27歳、クラミジア陽性。症状は軽いがパートナーには症状がない。正しいものを全て選べ。","choices":{"A":"妊娠可能性がある場合は薬剤選択に注意する。","B":"クラミジア感染ではパートナーの検査・治療を促す。","C":"治療完了まで性交を控えるよう説明する。","D":"骨盤内炎症性疾患の症状がないか確認する。","E":"無症状ならクラミジア陽性でも治療不要である。"},"correct":["A","B","C","D"],"comments":{"A":"正しい。妊娠中に避ける薬剤がある。","B":"正しい。再感染予防に重要である。","C":"正しい。感染拡大と再感染を避ける。","D":"正しい。下腹痛、発熱、子宮付属器圧痛などを評価する。","E":"誤り。無症状感染でも治療対象である。"},"refs":["CDC. U.S. Selected Practice Recommendations for Contraceptive Use, 2024. MMWR Recomm Rep. 2024;73:1-77.","WHO. Violence against women health topic. https://www.who.int/health-topics/violence-against-women"]},{"number":20,"theme":"その他：医療面接でのDVスクリーニング","stem":"更年期症状で受診した女性の腕に不自然な皮下出血があり、診察中に同伴者が回答を遮る。正しいものを全て選べ。","choices":{"A":"DVは若年女性だけの問題なので閉経後女性では考えない。","B":"安全が確保できる場で本人だけに話を聞く工夫をする。","C":"身体所見は客観的に記録する。","D":"本人の意思を尊重しながら支援資源を提示する。","E":"医療者が被害を疑った時点で本人に確認せず同伴者を責める。"},"correct":["B","C","D"],"comments":{"A":"誤り。年齢にかかわらず起こりうる。","B":"正しい。加害者同席下での質問は危険を増やすことがある。","C":"正しい。部位、色、大きさなどを記録する。","D":"正しい。情報提供と安全計画が重要である。","E":"誤り。安全を損なう可能性がある。"},"refs":["CDC. U.S. Selected Practice Recommendations for Contraceptive Use, 2024. MMWR Recomm Rep. 2024;73:1-77.","WHO. Violence against women health topic. https://www.who.int/health-topics/violence-against-women"]}];const STORAGE_KEY='womens_med_20260624_set4_v1';const LETTERS=['A','B','C','D','E'];let state={answers:{},memos:{}},storageOk=true;const $=s=>document.querySelector(s);function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function normalize(v){const seen=new Set();String(v||'').toUpperCase().split('').forEach(ch=>{if(LETTERS.includes(ch))seen.add(ch)});return LETTERS.filter(ch=>seen.has(ch)).join('')}function same(a,b){return normalize(a)===LETTERS.filter(ch=>b.includes(ch)).join('')}function warn(m){const el=$('#storage-warning');el.hidden=false;el.textContent=m}function load(){try{const raw=localStorage.getItem(STORAGE_KEY);if(raw)state=JSON.parse(raw);state.answers=state.answers||{};state.memos=state.memos||{}}catch(e){storageOk=false;warn('保存データを読み込めませんでした。')}}function save(){if(!storageOk)return;try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));$('#save-status').textContent='保存しました。'}catch(e){storageOk=false;warn('localStorageへ保存できませんでした。')}}function renderQuestions(){$('#questions-root').innerHTML=QUESTIONS.map(q=>`<article class="question-card"><h3><span class="qno">第${q.number}問</span></h3><p class="stem">${esc(q.stem)}</p><div class="choices" role="group" aria-label="第${q.number}問の選択肢">${LETTERS.map(L=>`<button type="button" class="choice" data-q="${q.number}" data-choice="${L}" aria-pressed="false"><span class="letter">${L}</span><span>${esc(q.choices[L])}</span></button>`).join('')}</div><div class="answer-row"><div><label for="answer-${q.number}">回答記入欄</label><input id="answer-${q.number}" class="answer-input" data-q="${q.number}" maxlength="5" inputmode="latin" autocomplete="off" aria-label="第${q.number}問の回答記入欄"><div class="hint">A-Eのみ保存</div></div><div><label for="memo-${q.number}">メモ欄</label><textarea id="memo-${q.number}" data-q="${q.number}" aria-label="第${q.number}問のメモ欄"></textarea></div></div></article>`).join('');QUESTIONS.forEach(q=>{const a=$(`#answer-${q.number}`),m=$(`#memo-${q.number}`);a.value=normalize(state.answers[q.number]||'');m.value=state.memos[q.number]||'';updateChoice(q.number)})}function renderExplanations(){$('#explanations-root').innerHTML=QUESTIONS.map(q=>`<article class="explain-card"><h3><span class="qno">第${q.number}問</span></h3><p><span class="theme-pill">関連テーマ：${esc(q.theme)}</span> <span class="judge blank" data-judge="${q.number}">未回答</span></p><div class="reprint"><p class="stem">${esc(q.stem)}</p><ol type="A">${LETTERS.map(L=>`<li>${esc(q.choices[L])}</li>`).join('')}</ol></div><p><strong>答案者の回答：</strong><span data-exam-answer="${q.number}">未回答</span></p><p><strong>正答：</strong>${q.correct.join('')}</p>${LETTERS.map(L=>`<div class="option-comment ${q.correct.includes(L)?'correct':''}"><strong>${L}：</strong>${esc(q.comments[L])}</div>`).join('')}<h4>根拠文献</h4><ul class="refs">${q.refs.map(r=>`<li>${esc(r)}</li>`).join('')}</ul></article>`).join('');QUESTIONS.forEach(q=>updateJudge(q.number))}function setAnswer(n,v){const ans=normalize(v);if(ans)state.answers[n]=ans;else delete state.answers[n];const input=$(`#answer-${n}`);if(input&&input.value!==ans)input.value=ans;updateChoice(n);updateJudge(n);renderSummary();save()}function toggle(n,L){const cur=new Set(normalize(state.answers[n]||'').split('').filter(Boolean));cur.has(L)?cur.delete(L):cur.add(L);setAnswer(n,LETTERS.filter(x=>cur.has(x)).join(''))}function setMemo(n,v){state.memos[n]=v;renderSummary();save()}function updateChoice(n){const ans=normalize(state.answers[n]||'');document.querySelectorAll(`.choice[data-q="${n}"]`).forEach(btn=>{const on=ans.includes(btn.dataset.choice);btn.classList.toggle('selected',on);btn.setAttribute('aria-pressed',on?'true':'false')})}function updateJudge(n){const q=QUESTIONS.find(x=>x.number===Number(n));if(!q)return;const ans=normalize(state.answers[n]||''),a=document.querySelector(`[data-exam-answer="${n}"]`),j=document.querySelector(`[data-judge="${n}"]`);if(a)a.textContent=ans||'未回答';if(j){const ok=ans&&same(ans,q.correct);j.className='judge '+(!ans?'blank':ok?'ok':'bad');j.textContent=!ans?'未回答':ok?'正解':'不正解'}}function renderSummary(){$('#summary-root').innerHTML=QUESTIONS.map(q=>{const ans=normalize(state.answers[q.number]||'')||'未回答',memo=state.memos[q.number]||'';return `<div class="summary-item"><strong>第${q.number}問</strong>
回答：${esc(ans)}
メモ：${esc(memo||'なし')}</div>`}).join('')}function summaryText(){return QUESTIONS.map(q=>{const ans=normalize(state.answers[q.number]||'')||'未回答';const memo=state.memos[q.number]||'なし';return '第'+q.number+'問\n回答：'+ans+'\nメモ：'+memo}).join('\n\n')}async function copySummary(){const t=summaryText(),s=$('#copy-status');try{if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(t);s.textContent='コピーしました。';return}}catch(e){}const ta=document.createElement('textarea');ta.value=t;ta.readOnly=true;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();try{s.textContent=document.execCommand('copy')?'コピーしました。':'コピーできませんでした。'}catch(e){s.textContent='コピーできませんでした。'}document.body.removeChild(ta)}function clearAll(){if(!confirm('入力内容をすべて消去します。よろしいですか？'))return;state={answers:{},memos:{}};try{localStorage.removeItem(STORAGE_KEY)}catch(e){}QUESTIONS.forEach(q=>{const a=$(`#answer-${q.number}`),m=$(`#memo-${q.number}`);if(a)a.value='';if(m)m.value='';updateChoice(q.number);updateJudge(q.number)});renderSummary();save()}document.addEventListener('DOMContentLoaded',()=>{load();renderQuestions();renderSummary();renderExplanations();document.addEventListener('click',e=>{const b=e.target.closest('.choice');if(b)toggle(Number(b.dataset.q),b.dataset.choice)});document.addEventListener('input',e=>{if(e.target.classList.contains('answer-input'))setAnswer(Number(e.target.dataset.q),e.target.value);if(e.target.tagName==='TEXTAREA')setMemo(Number(e.target.dataset.q),e.target.value)});document.addEventListener('keydown',e=>{if(e.target.classList.contains('choice')&&(e.key===' '||e.key==='Enter')){e.preventDefault();toggle(Number(e.target.dataset.q),e.target.dataset.choice)}});$('#copy-btn').addEventListener('click',copySummary);$('#clear-btn').addEventListener('click',clearAll)});</script></body></html>
